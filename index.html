  const canEditUnit = !isCPD() && session && session.unit === activeUnit;
  inner.appendChild(buildStockTable(ustock, 'unit-search', canEditUnit ? (itemId, qty) => {
    if (!unitStock[activeUnit]) unitStock[activeUnit] = {};
    if (!unitStock[activeUnit]) unitStock[activeUnit] = {};
    unitStock[activeUnit][itemId] = qty;
    // Salvar APENAS este item no Firebase (atômico) — evita zerar outros itens
    // que ainda não carregaram na memória local
    const _slug = unitSlug(activeUnit);
    try { localStorage.setItem('pizza_unit_' + _slug, JSON.stringify(unitStock[activeUnit])); } catch(e) {}
    if (window._fb && window._fb.ready && typeof db !== 'undefined') {
      window._fb.localWrite = true;
      clearTimeout(window._fb.localWriteTimer);
      window._fb.localWriteTimer = setTimeout(() => { window._fb.localWrite = false; }, 5000);
      db.ref('dados/pizza_units/' + _slug + '/' + itemId).set(qty)
        .then(() => {
          clearTimeout(window._fb.localWriteTimer);
          window._fb.localWriteTimer = setTimeout(() => { window._fb.localWrite = false; }, 300);
        })
        .catch(e => {
          console.warn('[Firebase] Erro ao salvar item', itemId, e);
          window._fb.localWrite = false;
          // Fallback: salvar objeto completo
          saveUnit(activeUnit, unitStock[activeUnit]);
        });
    } else {
      window._fb = window._fb || { ready: false, pendingWrites: [] };
      window._fb.pendingWrites = window._fb.pendingWrites || [];
      window._fb.pendingWrites.push({ key: 'pizza_units/' + _slug + '/' + itemId, data: qty });
    }
  } : undefined, {
    useMin: false,
    pdfLabel: activeUnit,
    showConfirm: !isCPD(),
    unitName: activeUnit,
    showEnviar: isCPD(),
    unitForDisplay: activeUnit,
    catSource: getUnitCatalog(activeUnit).catalog, // catálogo específico desta unidade
  }));
  tableBlock.appendChild(inner);
  frag.appendChild(tableBlock);

  return frag;
}

// ═══ VALIDADE DE ITENS ════════════════════════════════════════════════════════
function openValidityModal(itemId, itemName) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const isExpired = d => { const dt = new Date(d); dt.setHours(0,0,0,0); return d && dt < today; };
  const isNear    = d => {
    const dt = new Date(d); dt.setHours(0,0,0,0);
    const diff = (dt - today) / (1000*60*60*24);
    return d && diff >= 0 && diff <= 7;
  };

  // Carregar datas atuais (até 5)
  const dates = (validities[itemId] || ['','','','','']).slice(0, 5);
  while (dates.length < 5) dates.push('');

  const overlay = el('div', {cls:'val-modal-overlay'});

  const box = el('div', {cls:'val-modal-box'});

  // Header
  const hdr = el('div', {cls:'val-modal-header'});
  const hdrLeft = el('div', {});
  hdrLeft.appendChild(el('div', {cls:'val-modal-title'}, '\uD83D\uDDD3\uFE0F Datas de Validade'));
  hdrLeft.appendChild(el('div', {cls:'val-modal-subtitle'}, itemName));
  hdr.appendChild(hdrLeft);
  const closeBtn = el('button', {cls:'val-modal-close'}, '\u00D7');
  closeBtn.addEventListener('click', () => overlay.remove());
  hdr.appendChild(closeBtn);
  box.appendChild(hdr);

  // Body — 5 inputs de data
  const body = el('div', {cls:'val-modal-body'});
  const inputs = [];
  for (let i = 0; i < 5; i++) {
    const row = el('div', {cls:'val-date-row'});
    row.appendChild(el('span', {cls:'val-date-label'}, 'Lote ' + (i+1)));
    const inp = el('input', {type:'date', cls:'val-date-input'});
    inp.value = dates[i] || '';
    if (dates[i]) {
      if (isExpired(dates[i]))   inp.classList.add('expired-date');
      else if (isNear(dates[i])) inp.classList.add('near-date');
    }
    inp.addEventListener('change', () => {
      inp.classList.remove('expired-date', 'near-date');
      if (inp.value) {
        if (isExpired(inp.value))   inp.classList.add('expired-date');
        else if (isNear(inp.value)) inp.classList.add('near-date');
      }
    });
    inputs.push(inp);
    row.appendChild(inp);
    body.appendChild(row);
  }
  box.appendChild(body);

  // Footer
  const footer = el('div', {cls:'val-modal-footer'});
  const cancelBtn = el('button', {cls:'btn btn-outline btn-sm'}, 'Cancelar');
  cancelBtn.addEventListener('click', () => overlay.remove());
  const saveBtn = el('button', {cls:'btn btn-sm', style:'background:var(--accent);color:#fff'}, 'Salvar');
  saveBtn.addEventListener('click', () => {
    const newDates = inputs.map(i => i.value).filter(v => v);
    if (newDates.length > 0) {
      validities[itemId] = newDates;
    } else {
      delete validities[itemId];
    }
    save('pizza_validities', validities);
    overlay.remove();
    // Atualizar botão na tela
    const btn = document.querySelector(`.val-btn[data-val-id="${CSS.escape(itemId)}"]`);
    if (btn) {
      const expired = newDates.some(d => isExpired(d));
      const near    = newDates.some(d => isNear(d));
      btn.className = 'val-btn' + (expired ? ' expired' : near ? ' has-val' : newDates.length > 0 ? ' has-val' : '');
      btn.title = newDates.length > 0
        ? 'Validades: ' + newDates.join(', ')
        : 'Adicionar validade';
    }
    toast('Validades salvas');
  });
  footer.appendChild(cancelBtn);
  footer.appendChild(saveBtn);
  box.appendChild(footer);

  overlay.appendChild(box);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

// ═══ PDF DE ENVIOS (PRODUÇÃO / COMPRAS) ══════════════════════════════════════
function gerarPdfEnvios(tipo) {
  // tipo: 'produzido' | 'comprado'
  const day     = nextEnviarDay();
  const dayFull = {SEG:'Segunda-feira', QUA:'Quarta-feira', SEX:'Sexta-feira'}[day] || day;
  const titulo  = tipo === 'produzido' ? 'Lista de Produção' : 'Lista de Compras';
  const _norm   = s => (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();

  // Coletar itens com falta no CPD, filtrados por tipo
  const linhas = [];
  UNIT_NAMES.forEach(unitName => {
    const ucat   = getUnitCatalog(unitName).catalog;
    const ustock = unitStock[unitName] || {};
    const minMap = getMinPerDay(unitName);
    ucat.forEach(item => {
      if (classificarItem(item.name) !== tipo) return;
      const minDia  = (minMap[item.name] && minMap[item.name][day]) || 0;
      if (minDia === 0) return;
      const estUnit = ustock[item.id] || 0;
      const aEnviar = Math.max(0, minDia - estUnit);
      if (aEnviar === 0) return;
      const cpdItem = (catalog || []).find(c => _norm(c.name) === _norm(item.name));
      const estCPD  = cpdItem ? (cpd[cpdItem.id] || 0) : 0;
      const falta   = Math.max(0, aEnviar - estCPD);
      if (falta === 0) return; // CPD já tem — não precisa produzir/comprar
      // Adicionar ou acumular (mesmo item pode aparecer em várias unidades)
      const existing = linhas.find(l => _norm(l.name) === _norm(item.name));
      if (existing) {
        existing.falta += falta;
        existing.detalhe += ', ' + unitName + ' (' + aEnviar + ')';
      } else {
        linhas.push({ name: item.name, unit: item.unit, falta, category: item.category,
                      detalhe: unitName + ' (' + aEnviar + ')' });
      }
    });
  });

  if (linhas.length === 0) {
    toast(tipo === 'produzido'
      ? 'Nenhum item de produção faltando para ' + dayFull
      : 'Nenhum item de compra faltando para ' + dayFull);
    return;
  }

  // Ordenar por categoria (ordem do catálogo da Asa Sul como referência) + posição
  const refCats = getUnitCatalog('Asa Sul').categories;
  linhas.sort((a, b) => {
    const ia = refCats.indexOf(a.category), ib = refCats.indexOf(b.category);
    return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib) || a.name.localeCompare(b.name);
  });

  // ── Gerar PDF ──────────────────────────────────────────────────────────────
  const W = 595, ML = 36, MR = 36, TW = W - ML - MR;
  const colW = [TW*0.5, TW*0.12, TW*0.13, TW*0.25];
  const colX = [ML, ML+colW[0], ML+colW[0]+colW[1], ML+colW[0]+colW[1]+colW[2]];
  const ROW_H = 16, HEAD_H = 24, MARGIN_TOP = 60, MARGIN_BOT = 40;
  const PAGE_H = 842;
  const usableH = PAGE_H - MARGIN_TOP - MARGIN_BOT;

  const ops = [], pages = [];
  let y = PAGE_H - MARGIN_TOP, pageNum = 1;

  function newPage() {
    ops.length = 0;
    // Fundo header
    ops.push(`0.16 0.38 0.29 rg ${ML} ${PAGE_H-32} ${TW} 26 re f`);
    ops.push(`1 1 1 rg`);
    ops.push(`BT /F1 13 Tf ${ML+4} ${PAGE_H-22} Td (${pdfStr(titulo + ' \u2014 ' + dayFull)}) Tj ET`);
    const dateStr = new Date().toLocaleDateString('pt-BR');
    ops.push(`0.6 0.6 0.6 rg BT /F2 8 Tf ${W-MR-60} ${PAGE_H-22} Td (${pdfStr(dateStr)}) Tj ET`);
    // Linha separadora
    ops.push(`0.8 0.8 0.8 rg ${ML} ${PAGE_H-34} ${TW} 0.5 re f`);
    y = PAGE_H - MARGIN_TOP;
    // Cabeçalho da tabela
    ops.push(`0.93 0.95 0.93 rg ${ML} ${y-HEAD_H} ${TW} ${HEAD_H} re f`);
    ops.push(`0 0 0 rg`);
    ['ITEM','UN','FALTA','PARA (UNIDADES)'].forEach((h, i) => {
      ops.push(`BT /F1 8 Tf ${colX[i]+3} ${y-HEAD_H+6} Td (${h}) Tj ET`);
    });
    ops.push(`0.85 0.85 0.85 rg ${ML} ${y-HEAD_H-0.5} ${TW} 0.5 re f`);
    y -= HEAD_H + 2;
  }

  newPage();
  let lastCat = null;

  linhas.forEach(row => {
    // Cabeçalho de categoria
    if (row.category !== lastCat) {
      lastCat = row.category;
      if (y < MARGIN_BOT + ROW_H * 2) { pages.push(ops.slice()); newPage(); pageNum++; }
      ops.push(`0.91 0.96 0.92 rg ${ML} ${y-12} ${TW} 13 re f`);
      ops.push(`0.16 0.38 0.29 rg`);
      ops.push(`BT /F1 8 Tf ${ML+4} ${y-9} Td (${pdfStr(row.category.toUpperCase())}) Tj ET`);
      ops.push(`0 0 0 rg`);
      y -= 14;
    }
    if (y < MARGIN_BOT) { pages.push(ops.slice()); newPage(); pageNum++; }
    // Linha do item
    ops.push(`BT /F2 8 Tf ${colX[0]+3} ${y-11} Td ${pdfStr(row.name)} Tj ET`);
    ops.push(`BT /F2 8 Tf ${colX[1]+3} ${y-11} Td (${pdfStr(row.unit)}) Tj ET`);
    ops.push(`0.7 0.1 0.1 rg BT /F1 9 Tf ${colX[2]+3} ${y-11} Td (${row.falta}) Tj ET 0 0 0 rg`);
    ops.push(`BT /F2 7 Tf ${colX[3]+3} ${y-11} Td ${pdfStr(row.detalhe)} Tj ET`);
    ops.push(`0.9 0.9 0.9 rg ${ML} ${y-ROW_H} ${TW} 0.4 re f 0 0 0 rg`);
    y -= ROW_H;
  });

  pages.push(ops.slice());

  // Montar PDF
  const pdfLines = ['%PDF-1.4'];
  const offsets = [];
  let offset = pdfLines[0].length + 1;

  const fontObj = (id, name) => {
    const s = `${id} 0 obj
<< /Type /Font /Subtype /Type1 /BaseFont /${name} /Encoding /WinAnsiEncoding >>
endobj
`;
    offsets[id] = offset; offset += s.length; pdfLines.push(s); return id;
  };
  const f1 = fontObj(1, 'Helvetica-Bold');
  const f2 = fontObj(2, 'Helvetica');

  pages.forEach((pageOps, pi) => {
    const stream = pageOps.join(String.fromCharCode(10));
    const streamObj = `${4+pi*2} 0 obj
<< /Length ${stream.length} >>
stream
${stream}
endstream
endobj
`;
    offsets[4+pi*2] = offset; offset += streamObj.length; pdfLines.push(streamObj);
    const pageObj = `${5+pi*2} 0 obj
<< /Type /Page /Parent 3 0 R /MediaBox [0 0 ${W} ${PAGE_H}] /Contents ${4+pi*2} 0 R /Resources << /Font << /F1 1 0 R /F2 2 0 R >> >> >>
endobj
`;
    offsets[5+pi*2] = offset; offset += pageObj.length; pdfLines.push(pageObj);
  });

  const pageRefs = pages.map((_, pi) => `${5+pi*2} 0 R`).join(' ');
  const pagesObj = `3 0 obj
<< /Type /Pages /Kids [${pageRefs}] /Count ${pages.length} >>
endobj
`;
  offsets[3] = offset; offset += pagesObj.length; pdfLines.push(pagesObj);

  const NL = String.fromCharCode(10);
  const xrefEntries = offsets.slice(1).map(o => (o||0).toString().padStart(10,'0') + ' 00000 n ').join(NL);
  const xref = 'xref' + NL + '0 ' + (4+pages.length*2) + NL + '0000000000 65535 f ' + NL + xrefEntries + NL;
  const trailer = 'trailer' + NL + '<< /Size ' + (4+pages.length*2) + ' /Root 3 0 R >>' + NL + 'startxref' + NL + offset + NL + '%%EOF';
  const fullPdf = pdfLines.join('') + xref + trailer;

  // Converter para Uint8Array (Latin-1) para PDF binário correto
  const fname = (tipo === 'produzido' ? 'Lista_Producao_' : 'Lista_Compras_') + day + '.pdf';
  const bArr = new Uint8Array(fullPdf.length);
  for (let i = 0; i < fullPdf.length; i++) bArr[i] = fullPdf.charCodeAt(i) & 0xff;
  const blob = new Blob([bArr], {type:'application/pdf'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = fname; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 2000);
  toast('PDF ' + (tipo === 'produzido' ? 'Produção' : 'Compras') + ' gerado!');
}

// ═══ ENVIOS DO DIA ═══════════════════════════════════════════════════════════
function viewEnviosDia() {
  const frag = document.createDocumentFragment();
  const day     = nextEnviarDay();
  const dayFull = {SEG:'Segunda-feira', QUA:'Quarta-feira', SEX:'Sexta-feira'}[day] || day;
  const _norm   = s => (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();

  // ── Cabeçalho ──────────────────────────────────────────────────────────────
  const hdrWrap = el('div', {style:'display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px'});
  hdrWrap.appendChild(el('h2', {cls:'table-title'}, 'Envios do Dia'));
  const dayBadge = el('span', {cls:'envios-dia-day-badge'}, '\uD83D\uDE9A ' + dayFull);
  hdrWrap.appendChild(dayBadge);
  // Botões PDF
  const pdfWrap = el('div', {style:'display:flex;gap:6px;margin-left:auto;flex-wrap:wrap'});
  const btnProd = el('button', {cls:'btn btn-outline btn-sm', style:'font-size:12px;display:flex;align-items:center;gap:5px'});
  btnProd.innerHTML = '\uD83D\uDCC4 PDF Produ\u00E7\u00E3o';
  btnProd.title = 'Lista de itens produzidos que faltam no CPD';
  btnProd.addEventListener('click', () => gerarPdfEnvios('produzido'));
  const btnComp = el('button', {cls:'btn btn-outline btn-sm', style:'font-size:12px;display:flex;align-items:center;gap:5px'});
  btnComp.innerHTML = '\uD83D\uDCC4 PDF Compras';
  btnComp.title = 'Lista de itens comprados que faltam no CPD';
  btnComp.addEventListener('click', () => gerarPdfEnvios('comprado'));
  pdfWrap.appendChild(btnProd);
  pdfWrap.appendChild(btnComp);
  hdrWrap.appendChild(pdfWrap);
  frag.appendChild(hdrWrap);

  // ── Coletar todos os itens que precisam de envio ───────────────────────────
  // Um item entra na tabela se ao menos uma unidade tiver A Enviar > 0 neste dia
  // Estrutura: Map de itemName → { unit, aEnviar, estoqueUnidade } por unidade
  const itemMap = new Map(); // itemName → { category, unit, cpdId, perUnit: {unitName: {est, aEnv}} }

  UNIT_NAMES.forEach(unitName => {
    const ucat   = getUnitCatalog(unitName).catalog;
    const ustock = unitStock[unitName] || {};
    const minMap = getMinPerDay(unitName);

    ucat.forEach(item => {
      const minDia = (minMap[item.name] && minMap[item.name][day]) || 0;
      if (minDia === 0) return;
      const est     = ustock[item.id] || 0;
      const aEnviar = Math.max(0, minDia - est);
      if (aEnviar === 0) return; // unidade já tem — não incluir

      if (!itemMap.has(item.name)) {
        // Localizar item no catálogo CPD pelo nome (para pegar estoque CPD)
        const cpdItem = catalog.find(c => _norm(c.name) === _norm(item.name));
        itemMap.set(item.name, {
          name: item.name, unit: item.unit, category: item.category,
          estCPD: cpdItem ? (cpd[cpdItem.id] || 0) : 0,
          perUnit: {}
        });
      }
      itemMap.get(item.name).perUnit[unitName] = { est, aEnviar };
    });
  });

  // Enriquecer com totais e situação
  const rows = [];
  itemMap.forEach(row => {
    const totalAEnviar = UNIT_NAMES.reduce((s, u) => s + (row.perUnit[u] ? row.perUnit[u].aEnviar : 0), 0);
    const falta   = Math.max(0, totalAEnviar - row.estCPD);
    row.totalAEnviar = totalAEnviar;
    row.falta    = falta;
    row.situacao = falta > 0 ? 'falta' : 'ok';
    rows.push(row);
  });

  // Ordenar pela posição exata no catálogo das unidades (ordem de produção)
  // Usa a posição da primeira unidade que tiver o item (Asa Sul → SIG → VP → Delivery)
  const _getUnitCatalogPos = (itemName) => {
    for (const u of UNIT_NAMES) {
      const uc = getUnitCatalog(u).catalog;
      const idx = uc.findIndex(c => _norm(c.name) === _norm(itemName));
      if (idx > -1) return { cat: uc[idx].category, pos: idx };
    }
    return { cat: '', pos: 99999 };
  };
  rows.forEach(r => {
    const pos = _getUnitCatalogPos(r.name);
    r._catOrder = pos.cat;
    r._pos = pos.pos;
  });
  rows.sort((a, b) => {
    // Primeiro ordenar por categoria (pela ordem em que aparece no catálogo)
    const catA = a._catOrder, catB = b._catOrder;
    if (catA !== catB) {
      // Usar a ordem da primeira unidade que tiver ambas as categorias
      for (const u of UNIT_NAMES) {
        const cats = getUnitCatalog(u).categories;
        const ia = cats.indexOf(catA);
        const ib = cats.indexOf(catB);
        if (ia > -1 && ib > -1) return ia - ib;
        if (ia > -1) return -1;
        if (ib > -1) return 1;
      }
    }
    // Dentro da mesma categoria, pela posição no catálogo
    return a._pos - b._pos;
  });

  // ── Sumário ────────────────────────────────────────────────────────────────
  const totalItems  = rows.length;
  const totalFaltas = rows.filter(r => r.situacao === 'falta').length;
  const totalOk     = rows.filter(r => r.situacao === 'ok').length;

  const summaryRow = el('div', {cls:'envios-summary-row'});
  [['Total a enviar', totalItems, ''],
   ['CPD tem estoque', totalOk, 'ok'],
   ['Faltam no CPD',  totalFaltas, 'falta']].forEach(([lbl, val, cls]) => {
    const card = el('div', {cls:'envios-summary-card' + (cls ? ' ' + cls : '')});
    card.appendChild(el('div', {cls:'e-lbl'}, lbl));
    card.appendChild(el('div', {cls:'e-val'}, String(val)));
    summaryRow.appendChild(card);
  });
  frag.appendChild(summaryRow);

  if (rows.length === 0) {
    const empty = el('div', {cls:'table-wrap', style:'padding:32px;text-align:center;color:var(--text-3)'});
    empty.textContent = '\u2705 Nenhum item a enviar para ' + dayFull + '. Todas as unidades t\u00EAm estoque suficiente.';
    frag.appendChild(empty);
    return frag;
  }

  // ── Filtros ────────────────────────────────────────────────────────────────
  let activeFilter = 'todos';
  const filterTabs = el('div', {cls:'envios-filter-tabs'});
  const tableWrap  = el('div', {});
  frag.appendChild(filterTabs);
  frag.appendChild(tableWrap);

  function buildMatrix() {
    tableWrap.innerHTML = '';
    const filtered = activeFilter === 'todos' ? rows :
                     rows.filter(r => r.situacao === activeFilter);

    if (filtered.length === 0) {
      const empty = el('div', {style:'padding:24px;text-align:center;color:var(--text-3);font-size:13px'});
      empty.textContent = 'Nenhum item neste filtro.';
      tableWrap.appendChild(empty);
      return;
    }

    const wrap  = el('div', {cls:'envios-wrap'});
    const table = el('table', {cls:'envios-matrix'});

    // ── Thead linha 1: ITEM | EST CPD | ASA SUL(2) | SIG(2) | VP(2) | DLV(2) | SITUAÇÃO
    const thead = el('thead');
    const tr1   = el('tr');
    const thItem = el('th', {}, 'Item');
    thItem.setAttribute('rowspan', '2');
    tr1.appendChild(thItem);
    const thCpd = el('th', {}, 'Est. CPD');
    thCpd.setAttribute('rowspan', '2');
    tr1.appendChild(thCpd);
    UNIT_NAMES.forEach(u => {
      const th = el('th', {cls:'unit-hdr'}, u);
      th.setAttribute('colspan', '2');
      tr1.appendChild(th);
    });
    const thSit = el('th', {cls:'u-sep'}, 'Situa\u00E7\u00E3o');
    thSit.setAttribute('rowspan', '2');
    tr1.appendChild(thSit);
    thead.appendChild(tr1);

    // ── Thead linha 2: Est. | A Env. × 4 unidades
    const tr2 = el('tr');
    UNIT_NAMES.forEach((u, i) => {
      const thEst = el('th', {cls: i === 0 ? 'sub-first' : 'sub-first'}, 'Est.');
      const thEnv = el('th', {}, 'A env.');
      tr2.appendChild(thEst);
      tr2.appendChild(thEnv);
    });
    thead.appendChild(tr2);
    table.appendChild(thead);

    // ── Tbody — agrupado por categoria
    const tbody = el('tbody');
    let lastCat = null;
    filtered.forEach(row => {
      // Inserir linha de categoria quando mudar
      const rowCat = row._catOrder || row.category;
      if (rowCat !== lastCat) {
        lastCat = rowCat;
        const catTr = el('tr');
        const catTd = el('td');
        catTd.setAttribute('colspan', String(2 + UNIT_NAMES.length * 2 + 1));
        catTd.style.cssText = 'background:#EAF2EC;color:var(--accent-dark,#2a6049);font-family:Lato,sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:7px 10px;border-bottom:1px solid var(--border);border-top:1px solid var(--border)';
        catTd.textContent = rowCat;
        catTr.appendChild(catTd);
        tbody.appendChild(catTr);
      }
      const tr = el('tr');
      // Nome
      const tdName = el('td', {}, row.name);
      tr.appendChild(tdName);
      // Est. CPD
      const tdCpd = el('td');
      tdCpd.textContent = String(row.estCPD);
      if (row.estCPD < row.totalAEnviar) tdCpd.className = 'val-cpd-low';
      tr.appendChild(tdCpd);
      // Por unidade
      UNIT_NAMES.forEach(u => {
        const pu = row.perUnit[u];
        const tdEst = el('td', {cls:'u-sep'});
        const tdEnv = el('td');
        if (pu) {
          tdEst.textContent = String(pu.est);
          tdEnv.textContent = String(pu.aEnviar);
          tdEnv.className = 'val-env';
        } else {
          tdEst.textContent = '\u2014';
          tdEst.className = 'val-dash u-sep';
          tdEnv.textContent = '\u2014';
          tdEnv.className = 'val-dash';
        }
        tr.appendChild(tdEst);
        tr.appendChild(tdEnv);
      });
      // Situação
      const tdSit = el('td', {cls:'u-sep'});
      const badge = el('span', {cls:'envios-badge ' + row.situacao});
      badge.textContent = row.situacao === 'ok' ? '\u2705 OK' : '\u26A0\uFE0F Falta ' + row.falta;
      tdSit.appendChild(badge);
      tr.appendChild(tdSit);
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    wrap.appendChild(table);
    tableWrap.appendChild(wrap);
  }

  // Montar botões de filtro
  [['todos', 'Todos (' + totalItems + ')'],
   ['falta', '\u26A0\uFE0F Falta no CPD (' + totalFaltas + ')'],
   ['ok',    '\u2705 CPD tem estoque (' + totalOk + ')']].forEach(([key, lbl]) => {
    const btn = el('button', {cls:'envios-filter-tab' + (key === activeFilter ? ' active' : '')});
    btn.textContent = lbl;
    btn.addEventListener('click', () => {
      activeFilter = key;
      filterTabs.querySelectorAll('.envios-filter-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      buildMatrix();
    });
    filterTabs.appendChild(btn);
  });

  buildMatrix();
  return frag;
}

function viewCatalogo() {
  const frag = document.createDocumentFragment();

  // ── Unit selector tabs (CPD only) ──────────────────────────────
  // CPD: 'cpd' = CPD catalog | unit name = that unit's catalog
  let activeTab = 'cpd'; // 'cpd' or unit name

  const tabsWrap = el('div', {style:'display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap'});

  const buildTabs = () => {
    tabsWrap.innerHTML = '';
    const tabs = isCPD() ? ['cpd', ...UNIT_NAMES] : [session.unit];
    tabs.forEach(tab => {
      const label = tab === 'cpd' ? '\uD83C\uDFED CPD' : tab;
      const btn = el('button', {
        cls: 'unit-tab' + (tab === activeTab ? ' active' : ''),
        style: 'font-size:12px;padding:6px 14px',
        onclick: () => {
          activeTab = tab;
          window._catActiveTab = tab;
          buildTabs();
          buildTable();
        }
      }, label);
      tabsWrap.appendChild(btn);
    });
  };

  if (isCPD()) {
    frag.appendChild(tabsWrap);
    buildTabs();
  }

  // Add form (CPD only, only on CPD tab)
  const formCard = el('div', {cls:'form-card', style:'margin-bottom:24px'});
  formCard.appendChild(el('div', {cls:'form-title'}, 'Adicionar novo item'));
  const nameGrp = el('div', {cls:'form-group'});
  nameGrp.appendChild(el('label', {}, 'Nome do item'));
  nameGrp.appendChild(el('input', {type:'text', id:'cat-name', placeholder:'Ex: Farinha de Trigo'}));
  formCard.appendChild(nameGrp);

  const rowGrp = el('div', {cls:'form-row'});
  const catGrp = el('div', {cls:'form-group', style:'margin-bottom:0'});
  catGrp.appendChild(el('label', {}, 'Categoria'));
  const catSel = el('select', {id:'cat-cat'});
  const formCats = (isCPD() && (!window._catActiveTab || window._catActiveTab === 'cpd')) ? CATEGORIES : UNIT_CATEGORIES;
  formCats.forEach(c => catSel.appendChild(el('option', {value:c}, c)));
  catGrp.appendChild(catSel);
  const unitGrp = el('div', {cls:'form-group', style:'margin-bottom:0'});
  unitGrp.appendChild(el('label', {}, 'Unidade de medida'));
  const unitSel = el('select', {id:'cat-unit'});
  MEASURES.forEach(u => unitSel.appendChild(el('option', {value:u}, u)));
  unitGrp.appendChild(unitSel);
  rowGrp.appendChild(catGrp);
  rowGrp.appendChild(unitGrp);
  formCard.appendChild(rowGrp);

  formCard.appendChild(el('button', {cls:'btn btn-primary', style:'margin-top:18px', onclick: () => {
    const name = document.getElementById('cat-name').value.trim();
    if (!name) { alert('Informe o nome do item.'); return; }
    const isCpdForm = !window._catActiveTab || window._catActiveTab === 'cpd';
    const targetCat2 = isCpdForm ? catalog : unitCatalog;
    const targetKey2 = isCpdForm ? 'pizza_catalog' : ('pizza_unit_catalog/' + unitSlug(window._catActiveTab || 'asa_sul'));
    if (targetCat2.find(i => i.name.toLowerCase() === name.toLowerCase())) { alert('J\u00E1 existe um item com esse nome.'); return; }
    const item = {id: Date.now().toString(), name, category: catSel.value, unit: unitSel.value};
    targetCat2.push(item);
    save(targetKey2, targetCat2);
    document.getElementById('cat-name').value = '';
    toast('Item "'+name+'" adicionado ao cat\u00E1logo!');
    render();
  }}, svgCheck(), ' Adicionar ao Cat\u00E1logo'));

  if (isCPD()) frag.appendChild(formCard);

  // ── Table container (rebuilt when tab changes) ──────────────────
  const tableContainer = el('div');
  frag.appendChild(tableContainer);

  function buildTable() {
    tableContainer.innerHTML = '';

    const isCpdTab   = activeTab === 'cpd';
    const showPrices = isCpdTab && isCPD();
    const tabUnit    = isCpdTab ? null : activeTab;

    // Stock source for this tab
    const stockObj = isCpdTab ? cpd : (unitStock[activeTab] || {});

    // Minimums: per-unit minimums stored in unitMinimums[unitName]
    // For CPD tab use global minimums; for unit tabs use unit-specific minimums
    if (!window.unitMinimums) window.unitMinimums = {};
    const activeMins = isCpdTab ? minimums : (window.unitMinimums[activeTab] || {});

    // Catálogo e categorias ativos para esta aba
    const _tabUnit   = isCpdTab ? null : activeTab;
    const _tabInfo   = _tabUnit ? getUnitCatalog(_tabUnit) : null;
    const tabCatalog = isCpdTab ? catalog    : _tabInfo.catalog;
    const tabCats    = isCpdTab ? CATEGORIES : _tabInfo.categories;
    // Catalog table
    const tableBlock = el('div', {cls:'table-wrap'});
    const thead = el('div', {cls:'table-header'});
    const tabLabel = isCpdTab ? 'CPD' : activeTab;
    thead.appendChild(el('span', {cls:'table-title'}, `${tabCatalog.length} itens \u2014 ${tabLabel}`));

    if (showPrices) {
      const totalVal = tabCatalog.reduce((s, i) => s + (cpd[i.id]||0) * (prices[i.id]||0), 0);
      const withPrice = tabCatalog.filter(i => prices[i.id] > 0).length;
      if (withPrice > 0) {
        const badge = el('div', {style:'display:flex;flex-direction:column;align-items:flex-end;gap:2px'});
        badge.appendChild(el('span', {style:'font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px'}, 'Valor total CPD'));
        badge.appendChild(el('span', {style:'font-size:15px;font-weight:700;color:var(--accent-dark);font-family:"Playfair Display",serif'},
          totalVal.toLocaleString('pt-BR', {style:'currency', currency:'BRL'})));
        thead.appendChild(badge);
      }
    }
    tableBlock.appendChild(thead);

    const searchWrap = el('div', {cls:'search-wrap', style:'padding:14px 18px 0'});
    searchWrap.appendChild(el('span', {cls:'search-icon', html:'<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>'}));
    const searchInp = el('input', {type:'text', placeholder:'Buscar item...'});
    searchWrap.appendChild(searchInp);
    tableBlock.appendChild(searchWrap);

    const table = el('table', {cls:'catalog-table', style:'margin-top:8px'});

    if (showPrices) {
      table.innerHTML = '<thead><tr>' +
        '<th style="width:26%">Nome</th>' +
        '<th class="col-unit" style="width:7%">Medida</th>' +
        '<th style="width:7%;text-align:right">Qtd CPD</th>' +
        '<th class="col-min" style="width:8%;text-align:right;font-size:10px;color:var(--text-3)">M\u00CDN.</th>' +
        '<th style="width:14%;text-align:right">Pre\u00E7o unit.</th>' +
        '<th style="width:14%;text-align:right">Valor total</th>' +
        '<th style="width:24%;text-align:right" colspan="2">A\u00E7\u00F5es</th>' +
        '</tr></thead>';
    } else if (isCpdTab) {
      table.innerHTML = '<thead><tr>' +
        '<th style="width:38%">Nome</th>' +
        '<th class="col-unit" style="width:9%">Medida</th>' +
        '<th style="width:9%;text-align:right">Qtd CPD</th>' +
        '<th class="col-min" style="width:9%;text-align:right;font-size:10px;color:var(--text-3)">M\u00CDN.</th>' +
        '<th style="width:35%;text-align:right" colspan="2">A\u00E7\u00F5es</th>' +
        '</tr></thead>';
    } else {
      // Unit tab — show unit stock + unit-specific minimum (editable by CPD)
      table.innerHTML = '<thead><tr>' +
        `<th style="width:38%">Nome \u2014 ${activeTab}</th>` +
        '<th class="col-unit" style="width:9%">Medida</th>' +
        `<th style="width:9%;text-align:right">Qtd</th>` +
        '<th class="col-min" style="width:9%;text-align:right;font-size:10px;color:var(--text-3)">M\u00CDN.</th>' +
        '<th style="width:35%;text-align:right" colspan="2">A\u00E7\u00F5es</th>' +
        '</tr></thead>';
    }

    const tbody = el('tbody', {});
    // openCats persiste entre renders usando um mapa global keyed por tableId
  // Assim categorias abertas não fecham quando o Firebase atualiza dados
  // _tableId = searchInp.id para garantir consistência com o setAttribute acima
  const _tableId = searchInp.id;
  if (!window._openCatsMap) window._openCatsMap = {};
  if (!window._openCatsMap[_tableId]) {
    window._openCatsMap[_tableId] = {};
  }
  const openCats = window._openCatsMap[_tableId];

  // Cache de linhas DOM por categoria — evita recriar elementos já montados
  if (!window._rowCache) window._rowCache = {};
  if (!window._rowCache[_tableId]) window._rowCache[_tableId] = {};
  const rowCache = window._rowCache[_tableId];

    const renderRows = (search) => {
      tbody.innerHTML = '';
      const q = search.toLowerCase().trim();
      const filtered = tabCatalog.filter(i => !q || i.name.toLowerCase().includes(q) || i.category.toLowerCase().includes(q));
      if (!filtered.length) {
        tbody.appendChild(el('tr', {}, el('td', {colspan:'6', cls:'empty'}, 'Nenhum item encontrado')));
        return;
      }
      // Derivar categorias do catálogo ativo da aba (CPD ou Unidades)
      const allCatsInSource = [...new Set(tabCatalog.map(i => i.category))];
      const catOrder = (isCpdTab ? CATEGORIES : UNIT_CATEGORIES).filter(c => allCatsInSource.includes(c));
      const extraCats = allCatsInSource.filter(c => !catOrder.includes(c));
      const usedCats = [...catOrder, ...extraCats].filter(cat => filtered.some(i => i.category === cat));
      usedCats.forEach(cat => {
        const catItems = filtered.filter(i => i.category === cat);
        const isOpen = openCats[cat] === true; // fechado por padrão

        const catTr = el('tr', {cls:'cat-row'});
        const catTd = document.createElement('td');
        catTd.setAttribute('colspan', showPrices ? '7' : '6');
        catTd.style.cssText = 'padding:0;width:100%;';
        const togBtn = el('button', {cls:'cat-toggle' + (isOpen ? ' open' : '')});
        const alertCount = catItems.filter(i => (stockObj[i.id]||0) === 0 && (activeMins[i.id]||0) > 0).length;
        togBtn.innerHTML = `<span class="cat-name">${cat}</span><span class="cat-count">${catItems.length} itens${alertCount > 0 ? ` \u00B7 \u26A0 ${alertCount}` : ''}</span><span class="cat-chevron">\u25B2</span>`;
        togBtn.addEventListener('click', () => {
          openCats[cat] = !openCats[cat];
          togBtn.classList.toggle('open', openCats[cat]);
          rows.forEach(r => { r.style.display = openCats[cat] ? '' : 'none'; });
        });
        catTd.appendChild(togBtn); catTr.appendChild(catTd); tbody.appendChild(catTr);

        const rows = [];
        catItems.forEach(item => {
          const qty   = stockObj[item.id] || 0;
          const min   = activeMins[item.id] || 0;
          const isZero = qty === 0 && min > 0;
          const isLow  = min > 0 && qty < min && !isZero;

          const tr = el('tr', {style: isZero ? 'background:var(--danger-bg)' : isLow ? 'background:var(--warning-bg)' : ''});
          if (!isOpen) tr.style.display = 'none';

          // Name cell
          const nameTd = el('td', {cls:'item-name'});
          const nameLabel = el('span', {}, item.name);
          const nameInp   = el('input', {type:'text', value:item.name, style:'display:none;width:100%;padding:3px 6px;border:1.5px solid var(--accent);border-radius:4px;font-size:13px;outline:none'});
          const catInline = el('span', {cls:'item-unit-inline', style: (isZero||isLow)?`color:${isZero?'var(--danger)':'#E8A020'};font-weight:600`:''}, item.unit);
          const saveNameFn = () => {
            const v = nameInp.value.trim() || item.name;
            item.name = v; nameLabel.textContent = v;
            isCpdTab ? save('pizza_catalog', tabCatalog) : saveUnitCatalog(activeTab, tabCatalog);
            nameInp.style.display='none'; nameLabel.style.display='';
          };
          nameLabel.addEventListener('click', () => { nameLabel.style.display='none'; nameInp.style.display=''; nameInp.focus(); nameInp.select(); });
          nameInp.addEventListener('blur', saveNameFn);
          nameInp.addEventListener('keydown', e => { if(e.key==='Enter') saveNameFn(); if(e.key==='Escape'){nameInp.style.display='none';nameLabel.style.display='';} });
          nameTd.appendChild(nameLabel); nameTd.appendChild(nameInp); nameTd.appendChild(catInline);
          tr.appendChild(nameTd);

          // Medida cell (editable)
          const unitTd = el('td', {cls:'muted col-unit', style:'cursor:pointer;white-space:nowrap'});
          const unitSpan = el('span', {style:'font-size:12px;color:var(--text-2);border-bottom:1px dashed var(--border)'}, item.unit);
          const unitInp  = el('input', {type:'text', value:item.unit, style:'display:none;width:70px;padding:2px 5px;border:1.5px solid var(--accent);border-radius:4px;font-size:12px;outline:none'});
          unitSpan.addEventListener('click', () => { unitSpan.style.display='none'; unitInp.style.display=''; unitInp.focus(); unitInp.select(); });
          const saveUnitFn = () => {
            const v = unitInp.value.trim() || item.unit;
            item.unit = v; unitSpan.textContent = v; catInline.textContent = v;
            isCpdTab ? save('pizza_catalog', tabCatalog) : saveUnitCatalog(activeTab, tabCatalog);
            unitInp.style.display='none'; unitSpan.style.display='';
          };
          unitInp.addEventListener('blur', saveUnitFn);
          unitInp.addEventListener('keydown', e => { if(e.key==='Enter') saveUnitFn(); if(e.key==='Escape'){unitInp.style.display='none';unitSpan.style.display='';} });
          unitTd.appendChild(unitSpan); unitTd.appendChild(unitInp);
          tr.appendChild(unitTd);

          // Qty cell (read-only in catalog)
          tr.appendChild(el('td', {cls: qty===0&&min>0?'danger':qty>0&&isLow?'warn':'', style:'text-align:right;font-weight:700'}, String(qty)));

          // Min cell — editable, per-tab (CPD = global minimums, unit = unit minimums)
          const minTd = el('td', {cls:'col-min', style:'text-align:right;cursor:pointer;padding-right:8px'});
          const minSpan = el('span', {style:'font-size:12px;color:var(--text-3);border-bottom:1px dashed var(--border)'}, min > 0 ? String(min) : '\u2014');
          const minInp  = el('input', {type:'number', inputmode:'decimal', value: min > 0 ? String(min) : '0',
            style:'display:none;width:54px;padding:3px 6px;border:1.5px solid #B8922A;border-radius:4px;font-size:12px;text-align:right;outline:none'});
          minSpan.addEventListener('click', () => { minSpan.style.display='none'; minInp.style.display=''; minInp.focus(); minInp.select(); });
          const saveMinFn = () => {
            const v = Math.max(0, parseFloat(minInp.value)||0);
            if (isCpdTab) {
              minimums[item.id] = v;
              save('pizza_minimums', minimums);
            } else {
              if (!window.unitMinimums[activeTab]) window.unitMinimums[activeTab] = {};
              window.unitMinimums[activeTab][item.id] = v;
              save('pizza_unit_minimums', window.unitMinimums);
            }
            minSpan.textContent = v > 0 ? String(v) : '\u2014';
            catInline.style.color = '';
            catInline.style.fontWeight = '';
            minInp.style.display='none'; minSpan.style.display='';
          };
          minInp.addEventListener('blur', saveMinFn);
          minInp.addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault();saveMinFn();} if(e.key==='Escape'){minInp.style.display='none';minSpan.style.display='';} });
          minTd.appendChild(minSpan); minTd.appendChild(minInp);
          tr.appendChild(minTd);

          // Price cell (CPD only)
          if (showPrices) {
            const price = prices[item.id] || 0;
            const priceTd = el('td', {style:'text-align:right;cursor:pointer'});
            const priceSpan = el('span', {style:'font-size:12px;color:var(--text-2);border-bottom:1px dashed var(--border)'},
              price > 0 ? price.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}) : '\u2014');
            const priceInp = el('input', {type:'number', inputmode:'decimal', value: price > 0 ? String(price) : '',
              style:'display:none;width:80px;padding:2px 5px;border:1.5px solid var(--accent);border-radius:4px;font-size:12px;text-align:right;outline:none'});
            priceSpan.addEventListener('click', () => { priceSpan.style.display='none'; priceInp.style.display=''; priceInp.focus(); priceInp.select(); });
            const savePriceFn = () => {
              const v = parseFloat(priceInp.value)||0;
              prices[item.id] = v; save('pizza_prices', prices);
              priceSpan.textContent = v > 0 ? v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}) : '\u2014';
              priceInp.style.display='none'; priceSpan.style.display='';
            };
            priceInp.addEventListener('blur', savePriceFn);
            priceInp.addEventListener('keydown', e => { if(e.key==='Enter') savePriceFn(); if(e.key==='Escape'){priceInp.style.display='none';priceSpan.style.display='';} });
            priceTd.appendChild(priceSpan); priceTd.appendChild(priceInp);
            tr.appendChild(priceTd);
            const totalVal2 = qty * (prices[item.id]||0);
            tr.appendChild(el('td', {style:'text-align:right;font-size:12px;color:var(--text-2)'},
              totalVal2 > 0 ? totalVal2.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}) : '\u2014'));
          }

          // Actions
          const actionsTd = el('td', {style:'text-align:right;white-space:nowrap;gap:4px;display:flex;align-items:center;justify-content:flex-end'});

          // ── Mover categoria (apenas unidades, apenas CPD logado) ──────────
          if (!isCpdTab && isCPD()) {
            const moveCatBtn = el('button', {
              cls:'btn btn-outline btn-sm',
              style:'font-size:11px;padding:2px 7px',
              title:'Mover para outra categoria'
            }, '\uD83D\uDCC2 Categoria');
            moveCatBtn.addEventListener('click', () => {
              // Modal inline para escolha de categoria
              const modal = el('div', {style:'position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center'});
              const box   = el('div', {style:'background:var(--surface);border-radius:var(--radius);padding:24px;min-width:280px;max-width:340px;box-shadow:var(--shadow-lg,0 8px 32px rgba(0,0,0,.25))'});
              box.appendChild(el('div', {style:'font-weight:700;font-size:15px;margin-bottom:4px'}, 'Mover categoria'));
              box.appendChild(el('div', {style:'font-size:12px;color:var(--text-3);margin-bottom:16px'}, item.name));
              tabCats.forEach(c => {
                const btn = el('button', {
                  style:'display:block;width:100%;text-align:left;padding:9px 12px;margin-bottom:6px;border-radius:6px;border:1.5px solid ' + (c === item.category ? 'var(--accent)' : 'var(--border)') + ';background:' + (c === item.category ? 'var(--accent-light,#e6f4ec)' : 'var(--surface)') + ';font-size:13px;cursor:pointer;font-weight:' + (c === item.category ? '700' : '400')
                }, (c === item.category ? '\u2713 ' : '') + c);
                if (c !== item.category) {
                  btn.addEventListener('click', () => {
                    item.category = c;
                    isCpdTab ? save('pizza_catalog', tabCatalog) : saveUnitCatalog(activeTab, tabCatalog);
                    document.body.removeChild(modal);
                    buildTable();
                    toast('Item movido para ' + c);
                  });
                }
                box.appendChild(btn);
              });
              const cancelBtn = el('button', {cls:'btn btn-outline btn-sm', style:'width:100%;margin-top:4px'}, 'Cancelar');
              cancelBtn.addEventListener('click', () => document.body.removeChild(modal));
              box.appendChild(cancelBtn);
              modal.appendChild(box);
              modal.addEventListener('click', e => { if (e.target === modal) document.body.removeChild(modal); });
              document.body.appendChild(modal);
            });
            actionsTd.appendChild(moveCatBtn);
          }

          // ── Reordenar ↑ ↓ (apenas unidades, apenas CPD logado) ───────────
          if (!isCpdTab && isCPD()) {
            const moveUp = el('button', {
              cls:'btn btn-outline btn-sm',
              style:'font-size:12px;padding:2px 7px',
              title:'Mover para cima'
            }, '\u2191');
            const moveDn = el('button', {
              cls:'btn btn-outline btn-sm',
              style:'font-size:12px;padding:2px 7px',
              title:'Mover para baixo'
            }, '\u2193');
            const moveItem = (delta) => {
              // Itens da mesma categoria
              const catItems = tabCatalog.filter(i => i.category === item.category);
              const globalIdx = tabCatalog.indexOf(item);
              const catIdx    = catItems.indexOf(item);
              const targetCatIdx = catIdx + delta;
              if (targetCatIdx < 0 || targetCatIdx >= catItems.length) return;
              // Achar posição global do vizinho
              const neighbor   = catItems[targetCatIdx];
              const neighborGi = tabCatalog.indexOf(neighbor);
              // Trocar no array global
              tabCatalog[globalIdx]    = neighbor;
              tabCatalog[neighborGi]   = item;
              isCpdTab ? save('pizza_catalog', tabCatalog) : saveUnitCatalog(activeTab, tabCatalog);
              buildTable();
            };
            moveUp.addEventListener('click', () => moveItem(-1));
            moveDn.addEventListener('click', () => moveItem(+1));
            actionsTd.appendChild(moveUp);
            actionsTd.appendChild(moveDn);
          }

          // ── Remover ───────────────────────────────────────────────────────
          const removeBtn = el('button', {cls:'btn btn-outline btn-sm', style:'color:var(--danger);border-color:var(--danger);font-size:11px', onclick:()=>{
            if (!confirm(`Remover "${item.name}" do cat\u00E1logo?`)) return;
            const idx = tabCatalog.indexOf(item);
            if (idx >= 0) tabCatalog.splice(idx, 1);
            isCpdTab ? save('pizza_catalog', tabCatalog) : saveUnitCatalog(activeTab, tabCatalog);
            tr.remove();
            toast('Item removido');
          }}, 'Remover');
          actionsTd.appendChild(removeBtn);
          tr.appendChild(actionsTd);

          rows.push(tr);
          tbody.appendChild(tr);
        });
      });
    };

    searchInp.addEventListener('input', () => renderRows(searchInp.value));
    renderRows('');
    table.appendChild(tbody);
    tableBlock.appendChild(table);
    tableContainer.appendChild(tableBlock);
  }

  buildTable();
  return frag;
}

// ═══ PATCH CIRÚRGICO DE VALORES ══════════════════════════════════════════════
// Atualiza apenas os números no DOM já existente quando o Firebase sincroniza.
// Preserva: foco do teclado, categorias abertas, estado de digitação.
// Usado pelo listener Firebase em vez de render() completo.
function patchStockValues(stockObj, useMin, unitMins) {
  useMin  = useMin  || false;
  unitMins = unitMins || {};

  // Elemento com foco atual — não tocar nele
  const focused = document.activeElement;
  const focusedItemId = focused ? focused.getAttribute('data-qty-input') : null;

  // Percorrer todos os <tr> marcados com data-item-id
  const rows = document.querySelectorAll('tr[data-item-id]');
  rows.forEach(tr => {
    const itemId = tr.getAttribute('data-item-id');
    if (!itemId) return;

    const newQty = stockObj[itemId] || 0;
    const inp = tr.querySelector('[data-qty-input]');

    // Atualizar input apenas se: não está com foco E valor mudou
    if (inp && inp.getAttribute('data-qty-input') !== focusedItemId) {
      const curVal = parseFloat(inp.value.replace(',','.')) || 0;
      if (curVal !== newQty) {
        inp.value = String(newQty);
        // Atualizar classe visual do input
        const uMin = useMin ? (unitMins[itemId] || 0) : 0;
        if (newQty === 0 && uMin > 0) inp.className = 'qty-inp-sm has-error';
        else if (newQty > 0)         inp.className = 'qty-inp-sm has-val';
        else                          inp.className = 'qty-inp-sm';
      }
    }

    // Atualizar classe da linha (cor de fundo) sem recriar
    const uMin = useMin ? (unitMins[itemId] || 0) : 0;
    const newQtyN = stockObj[itemId] || 0;
    const isZero = newQtyN === 0;
    const isLow  = uMin > 0 && newQtyN < uMin && !isZero;

    // Só mudar se a classe realmente mudou (evita reflow desnecessário)
    const wantClass = isZero ? 'count-danger' : isLow ? 'count-warn' : '';
    const curClass  = tr.className || '';
    if (wantClass && !curClass.includes(wantClass)) {
      tr.className = wantClass;
      tr.style.background = '';
    } else if (!wantClass && (curClass.includes('count-'))) {
      tr.className = '';
      if (!useMin) tr.style.background = '';
    }
  });
}

// Versão especializada para o painel de unidades (read-only, coluna A Enviar)
function patchUnitReadValues(unitStockObj, unitName) {
  const focused = document.activeElement;
  const rows = document.querySelectorAll('tr[data-item-id]');
  const uMins = (window.unitMinimums && window.unitMinimums[unitName]) || {};

  rows.forEach(tr => {
    const itemId = tr.getAttribute('data-item-id');
    if (!itemId) return;
    const qty = unitStockObj[itemId] || 0;

    // Célula de quantidade (read-only: td com font-weight:700, não input)
    const qtyTd = tr.querySelector('td[data-qty-cell]');
    if (qtyTd) qtyTd.textContent = String(qty);

    // Célula A Enviar
    const envTd = tr.querySelector('td[data-aenviar-cell]');
    if (envTd) {
      const uMin = uMins[itemId] || 0;
      const aEnviar = Math.max(0, uMin - qty);
      envTd.textContent = aEnviar > 0 ? String(aEnviar) : '\u2014';
      envTd.style.color = aEnviar > 0 ? 'var(--accent-dark,#2a6049)' : 'var(--text-3)';
    }
  });
}

  window._rowCache = {};

  if (currentView === 'cpd')         node = viewCpd();

  else if (currentView === 'catalogo')   node = viewCatalogo();
  else if (currentView === 'envios-dia') node = viewEnviosDia();
  else if (currentView === 'dashboard')  node = viewDashboard();
  if (node) contentEl.appendChild(node);

  // Restaurar scroll após render (evita que a tela "pule" para o topo)
  if (prevScrollY > 0) {
    requestAnimationFrame(() => window.scrollTo(0, prevScrollY));
  }

  // Notificações de recebimento pendentes
}

// FERRAMENTA DE MIGRA\u00C7\u00C3O \u2014 use no console do browser (F12)
// para enviar dados do localStorage para o Firebase
// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
window.migrarParaFirebase = function() {
  const chaves = [
    'pizza_cpd', 'pizza_units', 'pizza_minimums',
    'pizza_orders', 'pizza_movements', 'pizza_catalog',
    'pizza_prices', 'pizza_templates'
  ];
  let migrados = 0;
  chaves.forEach(chave => {
    const dados = localStorage.getItem(chave);
    if (dados) {
      try {
        const parsed = JSON.parse(dados);
        db.ref('dados/' + chave).set(parsed)
          .then(() => {
            migrados++;
            console.log('[Migracao] OK:', chave);
            if (migrados === chaves.filter(c => localStorage.getItem(c)).length) {
              console.log('[Migracao] COMPLETA! Todos os dados foram enviados ao Firebase.');
              alert('Migracao concluida! ' + migrados + ' chaves enviadas ao Firebase.');
            }
          })
          .catch(e => console.error('[Migracao] ERRO:', chave, e));
      } catch(e) {
        console.error('[Migracao] Erro ao parsear:', chave);
      }
    }
  });
  console.log('[Migracao] Iniciada para', chaves.filter(c => localStorage.getItem(c)).length, 'chaves...');
};

window.verificarFirebase = function() {
  db.ref('dados').once('value').then(snap => {
    const data = snap.val();
    if (!data) { console.log('[Firebase] Banco vazio'); return; }
    Object.keys(data).forEach(k => {
      const val = data[k];
      const size = JSON.stringify(val).length;
      console.log('[Firebase]', k, '-', Array.isArray(val) ? val.length + ' itens' : size + ' bytes');
    });
  });
};

console.log('  verificarFirebase()  - lista o que esta no banco');
</script>
