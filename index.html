function setView(v) {
  currentView = v;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.view === v));
  document.querySelectorAll('#drawer-nav-content .drawer-item[data-view]').forEach(b => b.classList.toggle('active', b.dataset.view === v));
  const titleEl = document.getElementById('topbar-title');
  if (titleEl) titleEl.textContent = VIEW_TITLES[v] || v;
  window.scrollTo(0, 0);
  render();
}

// HELPERS
function el(tag, attrs={}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'cls') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else if (k === 'value' && (tag === 'input' || tag === 'textarea')) {
      e.setAttribute(k, v);
      e.value = v; // set live value too, not just HTML attribute
    }
    else e.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}function buildStockTable(stockObj, searchInputId, onUpdate, opts) {
  opts = opts || {};
  const useMin        = opts.useMin !== false;
  const pdfLabel      = opts.pdfLabel     || null;
  const lockByWindow  = opts.lockByWindow === true;
  const unitForConf   = opts.unitForConf  || null;
  const unitMins      = opts.unitMins     || {};
  const unitName      = opts.unitName     || null;  // unidade para botão confirmar
  const showConfirm   = opts.showConfirm === true;  // mostrar botão ✓ por item
  const catSource     = opts.catSource || catalog;   // catálogo a usar (padrão: CPD)
  const editable = typeof onUpdate === 'function';
  const showMin  = false; // M\u00CDN column removed from stock table \u2014 editable only in Cat\u00E1logo
  const wrap = el('div', {});

  const searchWrap = el('div', {cls:'search-wrap', style:'margin-bottom:14px'});
  const searchIcon = el('span', {cls:'search-icon', html:'<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>'});
  const searchInp = el('input', {type:'text', placeholder:'Buscar item...', id: searchInputId || 'search-'+Date.now()});
  searchWrap.appendChild(searchIcon);
  searchWrap.appendChild(searchInp);
  wrap.appendChild(searchWrap);

  const colCount = editable ? (showMin ? '4' : '3') : '4';
  const tableWrap = el('div', {cls:'table-wrap'});
  const table = el('table', {cls: 'stock-table'});
  const thead = el('thead', {});
  const hasEnviarCol = !!(opts && opts.showEnviar);
  if (editable) {
    thead.innerHTML = showMin
      ? '<tr><th>Item</th><th class="col-unit" style="width:12%">Medida</th><th class="col-min" style="width:10%;text-align:right;font-size:10px;color:var(--text-3)">M\u00CDN.</th><th style="width:40%;text-align:right">Quantidade</th></tr>'
      : (showConfirm
        ? '<tr><th>Item</th><th class="col-unit" style="width:12%">Medida</th><th style="width:38%;text-align:right">Quantidade</th><th style="width:38px"></th></tr>'
        : '<tr><th>Item</th><th class="col-unit" style="width:14%">Medida</th><th style="width:46%;text-align:right">Quantidade</th></tr>');
  } else {
    thead.innerHTML = hasEnviarCol
      ? '<tr><th>Item</th><th style="width:15%;text-align:right">Qtd</th><th style="width:16%;text-align:right;color:var(--accent-dark,#2a6049);font-size:11px">A Enviar</th><th class="col-unit" style="width:15%">Medida</th><th style="width:8%"></th></tr>'
      : '<tr><th>Item</th><th style="width:18%;text-align:right">Qtd</th><th class="col-unit" style="width:18%">Medida</th><th style="width:8%"></th></tr>';
  }
  const tbody = el('tbody', {id:'tbody-'+searchInp.id});
  tbody.setAttribute('data-stock-table', searchInp.id);
  table.appendChild(thead);
  table.appendChild(tbody);
  tableWrap.appendChild(table);
  wrap.appendChild(tableWrap);

  let saveTimer = {};

  function updateQty(itemId, newQty, inp, tr, inlineSpan) {
    // Trava de janela: recusa gravação fora do horário/dia de contagem
    if (lockByWindow) {
      const it = catSource.find(i => i.id === itemId);
      if (it && !categoriaLiberada(it.category)) {
        toast('\uD83D\uDD12 Contagem de ' + it.category + ' dispon\u00EDvel ' + proximaJanela(it.category) + '.');
        return;
      }
    }
    const raw = typeof newQty === 'string' ? parseFloat(newQty.replace(',', '.')) : newQty;
    const q = Math.max(0, isNaN(raw) ? 0 : raw);
    stockObj[itemId] = q;
    inp.value = String(q);
    const min = unitForConf ? (unitMins[itemId] || 0) : (useMin ? (minimums[itemId] || 0) : 0);
    const isZero = q === 0;
    const isLow  = min > 0 && q < min && !isZero;

    // Update input class
    if (isZero && min > 0) inp.className = 'qty-inp-sm has-error';
    else                   inp.className = 'qty-inp-sm has-val';

    // Update row background instantly (alertas de cor s\u00F3 com m\u00EDnimos ativos)
    if (tr) {
      tr.style.background = useMin ? (isZero ? 'var(--danger-bg)' : isLow ? 'var(--warning-bg)' : '') : '';
    }

    // Update inline min text color instantly
    if (inlineSpan) {
      const dotColor = isZero ? 'var(--danger)' : isLow ? '#E8A020' : '';
      inlineSpan.style.color = dotColor || 'var(--text-3)';
      inlineSpan.style.fontWeight = dotColor ? '600' : '400';
    }

    clearTimeout(saveTimer[itemId]);
    saveTimer[itemId] = setTimeout(() => onUpdate(itemId, q), 1000);
  }

  // track open state per table instance -- all closed by default
  // openCats persiste entre renders usando um mapa global keyed por tableId
  // Assim categorias abertas não fecham quando o Firebase atualiza dados
  // _tableId = searchInp.id para garantir consistência com o setAttribute acima
  const _tableId = searchInp.id;
  if (!window._openCatsMap) window._openCatsMap = {};
  if (!window._openCatsMap[_tableId]) {
    window._openCatsMap[_tableId] = {};
  }
  const openCats = window._openCatsMap[_tableId];

  // Cache de linhas DOM por categoria — evita recriar elementos já montados
  if (!window._rowCache) window._rowCache = {};
  if (!window._rowCache[_tableId]) window._rowCache[_tableId] = {};
  const rowCache = window._rowCache[_tableId];

  function renderRows(q) {
    const isSearch = q && q.length > 0;

    // Com busca: mostrar/ocultar linhas existentes sem recriar DOM
    if (isSearch) {
      const qLow = q.toLowerCase();
      let visCount = 0;
      tbody.querySelectorAll('tr[data-item-id]').forEach(tr => {
        const name = (tr.getAttribute('data-item-name') || '').toLowerCase();
        const show = name.includes(qLow);
        tr.style.display = show ? '' : 'none';
        if (show) visCount++;
      });
      // cabeçalhos de categoria: mostrar se têm itens visíveis
      tbody.querySelectorAll('tr.cat-row').forEach(catTr => {
        const cat = catTr.querySelector('[data-cat-name]');
        if (!cat) return;
        const catName = cat.getAttribute('data-cat-name');
        const hasVisible = !!tbody.querySelector(`tr[data-cat="${CSS.escape(catName)}"]:not([style*="display: none"])`);
        catTr.style.display = hasVisible ? '' : 'none';
      });
      let emptyRow = tbody.querySelector('tr.empty-search-row');
      if (visCount === 0) {
        if (!emptyRow) {
          emptyRow = document.createElement('tr'); emptyRow.className = 'empty-search-row';
          const td = document.createElement('td');
          td.colSpan = colCount; td.style.cssText = 'text-align:center;color:var(--text-3);padding:16px;font-size:13px';
          td.textContent = 'Nenhum item encontrado'; emptyRow.appendChild(td); tbody.appendChild(emptyRow);
        }
        emptyRow.style.display = '';
      } else if (emptyRow) emptyRow.style.display = 'none';
      return;
    }

    // Sem busca: restaurar visibilidade normal (sem recriar DOM se já existe)
    tbody.querySelectorAll('tr.empty-search-row').forEach(r => r.remove());
    if (tbody.querySelectorAll('tr[data-item-id]').length > 0) {
      // Linhas já existem — só ajustar visibilidade
      tbody.querySelectorAll('tr[data-item-id]').forEach(tr => {
        const cat = tr.getAttribute('data-cat');
        tr.style.display = openCats[cat] === true ? '' : 'none';
      });
      tbody.querySelectorAll('tr.cat-row').forEach(catTr => { catTr.style.display = ''; });
      return;
    }

    // Primeira vez: montar todo o DOM
    const filtered = catSource;
    if (!filtered.length) {
      tbody.appendChild(el('tr', {}, el('td', {colspan: colCount, cls:'empty'}, 'Nenhum item encontrado')));
      return;
    }
    // Derivar categorias do próprio catSource (suporta CPD e Unidades com listas diferentes)
    const allCatsInSource = [...new Set(catSource.map(i => i.category))];
    const catOrder = (catSource === catalog ? CATEGORIES : UNIT_CATEGORIES)
      .filter(c => allCatsInSource.includes(c));
    // Categorias sem ordem definida ficam no fim
    const extraCats = allCatsInSource.filter(c => !catOrder.includes(c));
    const usedCats = [...catOrder, ...extraCats].filter(cat => filtered.some(i => i.category === cat));
    usedCats.forEach(cat => {
      const catItems = filtered.filter(i => i.category === cat);
      const isOpen = openCats[cat] === true; // fechado por padrão

      // Header row with toggle button
      const catTr = el('tr', {cls:'cat-row'});
      catTr.setAttribute('data-cat-row', cat); // para busca
      const catTd = document.createElement('td');
      catTd.setAttribute('colspan', colCount);
      catTd.setAttribute('data-cat-name', cat); // referência para busca
      catTd.style.cssText = 'padding:0;width:100%;';
      const catJanela = (lockByWindow && !isCPD())
        ? (categoriaLiberada(cat) ? ' janela-aberta' : ' janela-fechada')
        : '';
      const togBtn = el('button', {cls:'cat-toggle' + (isOpen ? ' open' : '') + catJanela});
      togBtn.appendChild(document.createTextNode(cat));

      // Alert count
      const alertCount = !useMin ? 0 : catItems.filter(i => {
        const qty = stockObj[i.id]||0; const min = minimums[i.id]||0;
        return min>0 && qty<min;
      }).length;
      const catLocked = lockByWindow && !categoriaLiberada(cat);
      const countText = catLocked
        ? `\uD83D\uDD12 Contagem ${proximaJanela(cat)}`
        : (alertCount > 0
          ? `${catItems.length} itens \u00B7 \u26A0\uFE0F ${alertCount}`
          : `${catItems.length} itens`);
      const countSpan = el('span', {cls:'cat-count', style: catLocked ? 'color:var(--text-3)' : (alertCount>0?'color:var(--warning);font-weight:700':'')}, countText);
      const chevron = el('span', {cls:'cat-chevron'}, '\u25BC');
      togBtn.appendChild(countSpan);
      togBtn.appendChild(chevron);
      togBtn.addEventListener('click', () => {
        openCats[cat] = !openCats[cat];
        togBtn.classList.toggle('open', openCats[cat]);
        // Mostrar/ocultar linhas diretamente — sem chamar renderRows (evita duplo clique)
        const rows = tbody.querySelectorAll(`[data-cat="${CSS.escape(cat)}"]`);
        rows.forEach(r => { r.style.display = openCats[cat] ? '' : 'none'; });
      });
      if (pdfLabel) {
        // Bot\u00E3o de PDF da categoria, ao lado do toggle
        const catWrap = el('div', {style:'display:flex;align-items:stretch;gap:6px;width:100%'});
        togBtn.style.flex = '1';
        const catPdfBtn = el('button', {
          cls:'btn btn-outline btn-sm',
          style:'flex:0 0 auto;align-self:center;padding:4px 10px;font-size:11px;white-space:nowrap',
          title:'Gerar PDF apenas desta categoria'
        });
        catPdfBtn.innerHTML = '\uD83D\uDCC4';
        catPdfBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          printStockPdf(pdfLabel, stockObj, cat);
        });
        catWrap.appendChild(togBtn);
        catWrap.appendChild(catPdfBtn);
        catTd.appendChild(catWrap);
      } else {
        catTd.appendChild(togBtn);
      }
      catTr.appendChild(catTd);
      tbody.appendChild(catTr);

      catItems.forEach(item => {
        const qty = stockObj[item.id] || 0;
        const min = useMin ? (minimums[item.id] || 0) : 0;
        const isZero = qty === 0;
        const isLow  = min > 0 && qty < min && !isZero;
        const isOk   = !isZero && !isLow;

        // Estado de confirmação da contagem desta janela
        const confirmed = showConfirm && unitName ? isConfirmed(unitName, item.id) : false;
        const uMin = (showConfirm && unitName && window.unitMinimums && window.unitMinimums[unitName])
          ? (window.unitMinimums[unitName][item.id] || 0) : 0;
        let confirmState = 'none';
        if (confirmed) {
          confirmState = qty === 0 ? 'danger' : (uMin > 0 && qty < uMin ? 'warn' : 'ok');
        }

        const tr = el('tr', {});
        tr.setAttribute('data-cat', cat);
        tr.setAttribute('data-item-id', item.id);   // patch cirúrgico
        tr.setAttribute('data-item-name', item.name); // busca sem recriar DOM
        if (!isOpen) tr.style.display = 'none';
        // Cor da linha: confirmados → classes CSS; CPD → background direto
        if (showConfirm && confirmed) {
          tr.className = 'count-' + (confirmState === 'ok' ? 'ok' : confirmState === 'warn' ? 'warn' : 'danger');
        } else if (useMin && isZero) tr.style.background = 'var(--danger-bg)';
        else if (useMin && isLow) tr.style.background = 'var(--warning-bg)';

        const nameTd = el('td', {cls:'item-name'});
        nameTd.textContent = item.name;
        nameTd.style.fontWeight = qty>0?'500':'400';
        const dotColor = isZero ? 'var(--danger)' : isLow ? '#E8A020' : '';
        const inlineText = item.unit + (min>0 ? ` \u00B7 m\u00EDn: ${min}` : '');
        const inlineUnit = el('span', {cls:'item-unit-inline', style: dotColor?`color:${dotColor};font-weight:600`:''}, inlineText);
        nameTd.appendChild(inlineUnit);
        tr.appendChild(nameTd);

        if (editable) {
          // Medida (read-only in CPD panel \u2014 edit in Cat\u00E1logo)
          tr.appendChild(el('td', {cls:'muted col-unit'}, item.unit));

          // M\u00EDnimo cell (read-only in CPD panel -- edit in Cat\u00E1logo)
          if (showMin) {
            const minTd = el('td', {cls:'col-min', style:'text-align:right;padding-right:10px'});
            const curMin = minimums[item.id] || 0;
            minTd.appendChild(el('span', {style:'font-size:12px;color:var(--text-3)'}, curMin > 0 ? String(curMin) : '\u2014'));
            tr.appendChild(minTd);
          }

          const ctrlTd = el('td', {cls:'qty-controls-cell', style:'text-align:right; padding: 6px 16px;'});
          const wrap2 = el('div', {cls:'qty-controls'});
          const rowLocked = lockByWindow && !categoriaLiberada(item.category);
          if (rowLocked) wrap2.style.opacity = '0.45';
          const minBtn = el('button', {cls:'qty-btn-sm'}, '-');
          if (rowLocked) minBtn.disabled = true;

          // Colour input based on stock status
          let inpCls = 'qty-inp-sm';
          if (qty > 0 && isOk) inpCls += ' has-val';
          else if (isLow) inpCls += ' has-val'; // will show orange via row bg
          else if (isZero && min > 0) inpCls += ' has-error';
          else if (qty > 0) inpCls += ' has-val';

          const inp = el('input', {
            type: 'text', inputmode: 'decimal', pattern: '[0-9]*',
            cls: inpCls, value: String(qty)
          });
          inp.setAttribute('data-qty-input', item.id); // para patch cirúrgico
          if (rowLocked) { inp.disabled = true; inp.title = 'Contagem dispon\u00EDvel ' + proximaJanela(item.category); }
          const plusBtn = el('button', {cls:'qty-btn-sm'}, '+');
          if (rowLocked) plusBtn.disabled = true;
          minBtn.addEventListener('click', () => {
            const cur = parseFloat(inp.value.replace(',', '.')) || 0;
            updateQty(item.id, cur - 1, inp, tr, inlineUnit);
          });
          plusBtn.addEventListener('click', () => {
            const cur = parseFloat(inp.value.replace(',', '.')) || 0;
            updateQty(item.id, cur + 1, inp, tr, inlineUnit);
          });
          inp.addEventListener('change', () => { updateQty(item.id, inp.value, inp, tr, inlineUnit); });
          inp.addEventListener('blur',   () => { updateQty(item.id, inp.value, inp, tr, inlineUnit); });
          wrap2.appendChild(minBtn); wrap2.appendChild(inp); wrap2.appendChild(plusBtn);
          ctrlTd.appendChild(wrap2);
          tr.appendChild(ctrlTd);

          // Botão confirmar contagem (apenas nas unidades, quando showConfirm=true)
          if (showConfirm && unitName) {
            const confTd = el('td', {style:'width:38px;padding:4px 8px 4px 2px;text-align:center'});
            const confBtn = el('button', {
              cls: 'confirm-btn' + (confirmed ? ' confirmed-' + confirmState : ''),
              title: confirmed ? 'Confirmado — clique para desfazer' : 'Confirmar contagem deste item'
            });
            confBtn.innerHTML = '\u2713';
            confBtn.addEventListener('click', () => {
              const nowConfirmed = isConfirmed(unitName, item.id);
              const newState = !nowConfirmed;
              setConfirmed(unitName, item.id, newState);
              pruneCountedMap();
              if (newState) {
                const curQty = parseFloat(inp.value.replace(',','.')) || 0;
                const curUMin = (window.unitMinimums && window.unitMinimums[unitName])
                  ? (window.unitMinimums[unitName][item.id] || 0) : 0;
                const st = curQty === 0 ? 'danger' : (curUMin > 0 && curQty < curUMin ? 'warn' : 'ok');
                confBtn.className = 'confirm-btn confirmed-' + st;
                tr.className = 'count-' + st;
                tr.style.background = '';
              } else {
                confBtn.className = 'confirm-btn';
                tr.className = '';
                tr.style.background = '';
              }
            });
            confTd.appendChild(confBtn);
            tr.appendChild(confTd);
          }
        } else {
          // Read-only: show qty with status colour + min as small text
          const qtyColor = isZero ? 'var(--danger)' : isLow ? '#E8A020' : 'var(--success)';
          const qtyTd = el('td', {style:`text-align:right;font-weight:700;color:${qtyColor}`});
          qtyTd.setAttribute('data-qty-cell', item.id);
          qtyTd.textContent = String(qty);
          if (min > 0) {
            const minLabel = el('div', {style:'font-size:10px;color:var(--text-3);font-weight:400'}, `m\u00EDn: ${min}`);
            qtyTd.appendChild(minLabel);
          }
          tr.appendChild(qtyTd);
          if (hasEnviarCol) {
            const uMins = (window.unitMinimums && window.unitMinimums[opts.unitForDisplay]) || {};
            const uMin  = uMins[item.id] || 0;
            const aEnviar = Math.max(0, uMin - qty);
            const envTd = el('td', {style:'text-align:right;font-weight:700;color:' + (aEnviar > 0 ? 'var(--accent-dark,#2a6049)' : 'var(--text-3)')});
            envTd.setAttribute('data-aenviar-cell', item.id);
            envTd.textContent = aEnviar > 0 ? String(aEnviar) : '—';
            if (uMin > 0) envTd.title = 'Mín: ' + uMin + ' | Estoque: ' + qty;
            tr.appendChild(envTd);
          }
          tr.appendChild(el('td', {cls:'muted col-unit'}, item.unit));
          tr.appendChild(el('td', {}));
        }
        tbody.appendChild(tr);
      });
      rowCache[cat] = true; // marcar como montado no primeiro render
    });
  }

  renderRows('');
  searchInp.addEventListener('input', e => renderRows(e.target.value));
  return wrap;
}

// BATCHMOVEMENTHELPERS

function groupMovementsByBatch(movs) {
  // Group by batchId; solo movements (no batchId) get their own group keyed by id
  const grouped = new Map();
  movs.forEach(m => {
    const key = m.batchId || String(m.id);
    if (!grouped.has(key)) grouped.set(key, []);
    grouped.get(key).push(m);
  });
  // Return array of batch groups sorted by most recent first
  return Array.from(grouped.values()).sort((a, b) =>
    new Date(b[0].date) - new Date(a[0].date)
  );
}

function buildBatchMovList(movs, limit) {
  const wrap = el('div', {});
  const batches = groupMovementsByBatch(movs).slice(0, limit || 15);

  if (!batches.length) {
    wrap.appendChild(el('div', {cls:'empty'}, 'Nenhuma movimenta\u00E7\u00E3o registrada.'));
    return wrap;
  }

  batches.forEach(batch => {
    const first   = batch[0];
    const type    = first.type;
    const dest    = first.unitName || '';
    const date    = new Date(first.date);
    const count   = batch.length;

    const timeStr = date.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
    const dateStr = date.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit', year:'2-digit'});

    const row = el('div', {cls:'batch-mov-row', onclick: () => openBatchModal(batch)});

    // Badge
    const badge = el('span', {cls:'badge ' + type}, type === 'entrada' ? 'Entrada' : 'Sa\u00EDda');

    // Info
    const info = el('div', {cls:'batch-mov-info'});
    const title = el('div', {cls:'batch-mov-title'});
    title.appendChild(badge);
    title.appendChild(document.createTextNode(
      `${count} ${count === 1 ? 'produto' : 'produtos'}${dest ? ' \u2192 ' + dest : ''}`
    ));
    info.appendChild(title);

    // Sub: first 2 item names + "e mais X"
    const preview = batch.slice(0, 2).map(m => {
      const item = catalog.find(i => i.id === m.itemId);
      return item ? item.name : '\u2014';
    });
    let subText = preview.join(', ');
    if (batch.length > 2) subText += ` e mais ${batch.length - 2}`;
    const sub = el('div', {cls:'batch-mov-sub'}, `${dateStr} \u0060s ${timeStr}  \u00B7  ${subText}`);
    info.appendChild(sub);

    // Arrow
    const arrow = el('span', {cls:'batch-mov-arrow'}, '\u203A');

    row.append(info, arrow);
    wrap.appendChild(row);
  });

  return wrap;
}

function openBatchModal(batch) {
  const first   = batch[0];
  const type    = first.type;
  const dest    = first.unitName || '';
  const date    = new Date(first.date);
  const dateStr = date.toLocaleDateString('pt-BR', {day:'2-digit', month:'long', year:'numeric'});
  const timeStr = date.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
  const count   = batch.length;

  const overlay = el('div', {cls:'modal-overlay'});

  const box     = el('div', {cls:'modal-box'});

  // Header
  const header  = el('div', {cls:'modal-header'});
  const titleEl = el('div', {cls:'modal-title'},
    (type === 'entrada' ? 'Entrada CPD' : `Sa\u00EDda \u2192 ${dest}`)
  );
  const closeBtn = el('button', {cls:'modal-close', onclick: () => overlay.remove()}, '\u0057');
  header.append(titleEl, closeBtn);
  box.appendChild(header);

  // Body
  const body = el('div', {cls:'modal-body'});

  // Meta info
  const meta = el('div', {style:'margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border-light)'});

  meta.appendChild(el('p', {style:'font-size:13px;font-weight:600;color:var(--text)'},

  ));

  const table = el('table', {style:'width:100%;border-collapse:collapse'});

  const tbody = el('tbody', {});
  batch.forEach((m, i) => {
    const item = catalog.find(c => c.id === m.itemId);
    const tr = el('tr', {style: i % 2 === 0 ? '' : 'background:var(--surface-2)'});
    tr.appendChild(el('td', {style:'padding:9px 10px;font-size:13px;font-weight:500;border-bottom:1px solid var(--border-light)'}, item?.name || '\u2014'));
    tr.appendChild(el('td', {style:'padding:9px 10px;font-size:13px;font-weight:700;color:var(--accent);text-align:right;border-bottom:1px solid var(--border-light)'}, String(m.qty)));
    tr.appendChild(el('td', {style:'padding:9px 10px;font-size:12px;color:var(--text-3);border-bottom:1px solid var(--border-light)'}, item?.unit || ''));
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  body.appendChild(table);
  box.appendChild(body);

  // Footer
  const footer = el('div', {cls:'modal-footer'});
  const pdfBtn = el('button', {cls:'btn btn-primary', onclick: () => printBatchPdf(batch)},
    '\uD83D\uDCC4 Gerar PDF'
  );
  const cancelBtn = el('button', {cls:'btn btn-outline', onclick: () => overlay.remove()}, 'Fechar');
  footer.append(cancelBtn, pdfBtn);
  box.appendChild(footer);

  overlay.appendChild(box);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

// PURE-JSPDFGENERATOR
// Builds a valid PDF/1.4 file from scratch \u2014 no external libraries needed.
// Works offline, file://, Safari, Chrome, Firefox, iOS, Android.

function printBatchPdf(batch) {
  const first    = batch[0];
  const type     = first.type;
  const dest     = first.unitName || '';
  const date     = new Date(first.date);
  const dateStr  = date.toLocaleDateString('pt-BR', {day:'2-digit', month:'long', year:'numeric'});
  const timeStr  = date.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
  const count    = batch.length;
  const typeLabel = type === 'entrada' ? 'Entrada  -  CPD' : `Saida  -  CPD  ->  ${dest}`;
  const subLabel  = `${dateStr}  as  ${timeStr}    ${count} ${count===1?'produto':'produtos'}`;
  const typeTag   = type === 'entrada' ? 'ENTRADA' : 'SAIDA';

  // Build row data
  const rows = batch.map(m => {
    const item = catalog.find(c => c.id === m.itemId);
    return { name: item?.name || '-', qty: String(m.qty), unit: item?.unit || '' };
  });

  // PDFLatin-1encoder
  // Converts UTF-8 string to PDF octal-escaped Latin-1 string literal.
  // This is the correct way to handle accented chars with standard PDF fonts.
  function pdfStr(str) {
    // Encoder Latin-1/WinAnsi correto: ASCII passa direto,
    // chars 0x80-0xFF viram escape octal (suporta acentos PT-BR)
    let out = '';
    for (const ch of String(str)) {
      const code = ch.charCodeAt(0);
      if (ch === '(') out += '\\(';
      else if (ch === ')') out += '\\)';
      else if (ch === '\\') out += '\\\\';
      else if (code < 128) out += ch;
      else if (code <= 0xFF) out += '\\' + code.toString(8).padStart(3, '0');
      else {
        // Acima de latin-1: normaliza para base ASCII (ex: \u0161 -> s)
        const norm = ch.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        out += (norm && norm.charCodeAt(0) < 128) ? norm : '?';
      }
    }
    return `(${out})`;
  }

  // Dimensions
  const W = 595.28, H = 841.89;
  const ml = 50, mr = 50;
  const col1x = ml + 4;
  const col2x = W - mr - 115;
  const col3x = W - mr - 60;

  function rgb(r,g,b) { return `${(r/255).toFixed(3)} ${(g/255).toFixed(3)} ${(b/255).toFixed(3)}`; }

  const cmds = [];
  const c = (...p) => cmds.push(p.join(' '));

  // Header
  c(`${rgb(12,26,15)} rg`, `${ml-10} ${H-70} ${W-80} 56 re f`);

  // Green circle
  const cx=ml+14, cy=H-48, cr=12, k=0.5523;
  c(`${rgb(38,116,62)} rg`);
  c(`${cx+cr} ${cy} m ${cx+cr} ${cy+cr*k} ${cx+cr*k} ${cy+cr} ${cx} ${cy+cr} c`);
  c(`${cx-cr*k} ${cy+cr} ${cx-cr} ${cy+cr*k} ${cx-cr} ${cy} c`);
  c(`${cx-cr} ${cy-cr*k} ${cx-cr*k} ${cy-cr} ${cx} ${cy-cr} c`);
  c(`${cx+cr*k} ${cy-cr} ${cx+cr} ${cy-cr*k} ${cx+cr} ${cy} c f`);

  c(`BT /F1 11 Tf ${rgb(255,255,255)} rg ${cx-3} ${cy-4.5} Td (S) Tj ET`);
  c(`BT /F1 14 Tf ${rgb(240,237,224)} rg ${cx+20} ${cy+3} Td ${pdfStr("Sesconetto's Pizzeria")} Tj ET`);
  c(`BT /F2 8 Tf ${rgb(168,196,174)} rg ${cx+20} ${cy-12} Td (CONTROLE DE ESTOQUE) Tj ET`);

  // Badge
  const badgeY = H - 105;
  const badgeW = type === 'entrada' ? 54 : 46;
  const badgeRgb = type === 'entrada' ? rgb(38,116,62) : rgb(138,90,16);
  c(`${badgeRgb} rg ${ml} ${badgeY} ${badgeW} 14 re f`);
  c(`BT /F1 8 Tf ${rgb(255,255,255)} rg ${ml+4} ${badgeY+4} Td (${typeTag}) Tj ET`);

  // Title
  c(`BT /F1 20 Tf ${rgb(26,26,18)} rg ${ml} ${badgeY-28} Td ${pdfStr(typeLabel)} Tj ET`);
  c(`BT /F2 10 Tf ${rgb(90,87,64)} rg ${ml} ${badgeY-44} Td ${pdfStr(subLabel)} Tj ET`);

  // Gold line
  const lineY = badgeY - 56;
  c(`${rgb(184,146,42)} RG 0.8 w ${ml} ${lineY} m ${W-mr} ${lineY} l S`);

  // Tableheader
  const thY = lineY - 24;
  c(`${rgb(38,116,62)} rg ${ml} ${thY} ${W-ml-mr} 20 re f`);
  c(`BT /F1 9 Tf ${rgb(255,255,255)} rg ${col1x} ${thY+6} Td (ITEM) Tj ET`);
  c(`BT /F1 9 Tf ${rgb(255,255,255)} rg ${col2x} ${thY+6} Td (QUANTIDADE) Tj ET`);
  c(`BT /F1 9 Tf ${rgb(255,255,255)} rg ${col3x} ${thY+6} Td (UNIDADE) Tj ET`);

  // Tablerows
  const rowH = 22;
  let rowY = thY - rowH;

  rows.forEach((row, i) => {
    if (i % 2 === 1) {
      c(`${rgb(245,242,232)} rg ${ml} ${rowY} ${W-ml-mr} ${rowH} re f`);
    } else {
      c(`${rgb(253,252,247)} rg ${ml} ${rowY} ${W-ml-mr} ${rowH} re f`);
    }
    c(`${rgb(218,215,197)} RG 0.3 w ${ml} ${rowY} m ${W-mr} ${rowY} l S`);

    // Truncate long names
    const maxName = 52;
    const dispName = row.name.length > maxName ? row.name.substring(0, maxName) + '...' : row.name;

    c(`BT /F2 10 Tf ${rgb(26,26,18)} rg ${col1x} ${rowY+7} Td ${pdfStr(dispName)} Tj ET`);
    c(`BT /F1 11 Tf ${rgb(38,116,62)} rg ${col2x+18} ${rowY+7} Td ${pdfStr(row.qty)} Tj ET`);
    c(`BT /F2 9 Tf ${rgb(154,152,128)} rg ${col3x} ${rowY+7} Td ${pdfStr(row.unit)} Tj ET`);

    rowY -= rowH;
  });

  // Bottom border
  c(`${rgb(218,215,197)} RG 0.3 w ${ml} ${rowY+rowH} m ${W-mr} ${rowY+rowH} l S`);

  // Summary
  const sumY = rowY - 8;
  c(`${rgb(232,242,234)} rg ${ml} ${sumY} ${W-ml-mr} 20 re f`);
  const sumText = `Total: ${count} ${count===1?'produto movimentado':'produtos movimentados'}`;
  c(`BT /F1 10 Tf ${rgb(26,58,32)} rg ${ml+6} ${sumY+6} Td ${pdfStr(sumText)} Tj ET`);

  // Signature block
  const sigY = sumY - 50;
  c(`${rgb(200,196,170)} RG 0.5 w ${ml} ${sigY+20} m ${W-mr} ${sigY+20} l S 0 0 0 RG`);
  c(`BT /F1 9 Tf ${rgb(26,26,18)} rg ${ml} ${sigY+8} Td (Assinaturas) Tj ET`);
  const sigLW = (W - ml - mr - 40) / 2;
  const sig1x = ml, sig2x = ml + sigLW + 40;
  const sigLineY = sigY - 24;
  c(`${rgb(90,87,64)} RG 0.5 w ${sig1x} ${sigLineY} m ${sig1x+sigLW} ${sigLineY} l S`);
  c(`${rgb(90,87,64)} RG 0.5 w ${sig2x} ${sigLineY} m ${sig2x+sigLW} ${sigLineY} l S`);
  c(`BT /F1 9 Tf ${rgb(26,26,18)} rg ${sig1x} ${sigLineY-14} Td (Estoquista) Tj ET`);
  c(`BT /F1 9 Tf ${rgb(26,26,18)} rg ${sig2x} ${sigLineY-14} Td (Gerente da Unidade) Tj ET`);
  c(`BT /F2 7 Tf ${rgb(154,152,128)} rg ${sig1x} ${sigLineY-24} Td (Nome e assinatura) Tj ET`);
  c(`BT /F2 7 Tf ${rgb(154,152,128)} rg ${sig2x} ${sigLineY-24} Td (Nome e assinatura) Tj ET`);

  // Footer
  c(`${rgb(218,215,197)} RG 0.5 w ${ml} 40 m ${W-mr} 40 l S`);
  c(`BT /F2 8 Tf ${rgb(154,152,128)} rg ${ml} 28 Td ${pdfStr("Sesconetto's Pizzeria  -  Sistema de Estoque")} Tj ET`);
  const genDate = `Gerado em ${new Date().toLocaleDateString('pt-BR')} as ${new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}`;
  c(`BT /F2 8 Tf ${rgb(154,152,128)} rg ${W-mr-130} 28 Td ${pdfStr(genDate)} Tj ET`);

  // AssemblePDF
  const streamContent = cmds.join('\n');

  // Convert stream to binary bytes correctly
  const bytes = [];
  for (let i = 0; i < streamContent.length; i++) {
    bytes.push(streamContent.charCodeAt(i) & 0xff);
  }

  const objs = [];
  function addObj(content) {
    const id = objs.length + 1;
    objs.push({ id, content });
    return id;
  }

  const f1id = addObj(`<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold /Encoding /WinAnsiEncoding >>`);
  const f2id = addObj(`<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding >>`);
  const streamId = addObj(`<< /Length ${bytes.length} >>\nstream\n${streamContent}\nendstream`);
  const pageId   = addObj(`<< /Type /Page /Parent 5 0 R /MediaBox [0 0 ${W} ${H}] /Contents ${streamId} 0 R /Resources << /Font << /F1 ${f1id} 0 R /F2 ${f2id} 0 R >> >> >>`);
  const pagesId  = addObj(`<< /Type /Pages /Kids [${pageId} 0 R] /Count 1 >>`);
  const catId    = addObj(`<< /Type /Catalog /Pages ${pagesId} 0 R >>`);

  let out = '%PDF-1.4\n%\xFF\xFF\xFF\xFF\n';
  const offsets = [];
  objs.forEach(obj => {
    offsets.push(out.length);
    out += `${obj.id} 0 obj\n${obj.content}\nendobj\n`;
  });

  const xrefOff = out.length;
  out += `xref\n0 ${objs.length+1}\n`;
  out += '0000000000 65535 f \n';
  offsets.forEach(o => { out += String(o).padStart(10,'0') + ' 00000 n \n'; });
  out += `trailer\n<< /Size ${objs.length+1} /Root ${catId} 0 R >>\nstartxref\n${xrefOff}\n%%EOF`;

  // Use Latin-1 encoding for the blob so byte values survive intact
  const binaryStr = out;
  const bArr = new Uint8Array(binaryStr.length);
  for (let i = 0; i < binaryStr.length; i++) bArr[i] = binaryStr.charCodeAt(i) & 0xff;

  const blob = new Blob([bArr], { type: 'application/pdf' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const typeSlug = type === 'entrada' ? 'Entrada' : `Saida-${dest.replace(/\s+/g,'-')}`;
  const dateSlug = date.toISOString().slice(0,10);
  a.href     = url;
  a.download = `Sesconettos-${typeSlug}-${dateSlug}.pdf`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 3000);
  toast('PDF gerado e baixado!');
}function showOrderConfirmModal(order, entries, unitName) {

}function printStockPdf(unitLabel, stockObj, onlyCategory) {
  const now = new Date();
  const dateStr = now.toLocaleDateString('pt-BR', {day:'2-digit', month:'long', year:'numeric'});
  const timeStr = now.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
  const user = session?.name || '';

  // Group items by category — TODOS os itens, inclusive zerados e sem mínimo
  const pdfCatSrc = (unitLabel === 'CPD') ? catalog : unitCatalog;
  const pdfCats   = (unitLabel === 'CPD') ? CATEGORIES : UNIT_CATEGORIES;
  const byCategory = {};
  pdfCats.forEach(cat => { byCategory[cat] = []; });
  pdfCatSrc.forEach(item => {
    if (onlyCategory && item.category !== onlyCategory) return;
    const qty = stockObj[item.id] || 0;
    const min = minimums[item.id] || 0;
    if (!byCategory[item.category]) byCategory[item.category] = [];
    byCategory[item.category].push({name: item.name, unit: item.unit, qty, min});
  });
  // Remove categorias sem nenhum item cadastrado (ou fora do filtro)
  pdfCats.forEach(cat => { if (byCategory[cat].length === 0) delete byCategory[cat]; });

  // Build PDF rows
  const W = 595, ML = 40, MR = 40, TW = W - ML - MR;
  // Coluna MIN só aparece no CPD; unidades não usam estoque mínimo
  const showMinCol = unitLabel === 'CPD';
  const colW = showMinCol
    ? [TW*0.55, TW*0.15, TW*0.15, TW*0.15]
    : [TW*0.64, TW*0.18, TW*0.18];
  const colX = showMinCol
    ? [ML, ML+colW[0], ML+colW[0]+colW[1], ML+colW[0]+colW[1]+colW[2]]
    : [ML, ML+colW[0], ML+colW[0]+colW[1]];
  let y = 0;
  const ops = [];
  const pages = [];
  // --- Bloco de assinaturas ---
  function addSignatureBlock() {
    if (y < 120) { if (ops.length) pages.push(ops.splice(0)); y = 760; }
    y -= 20;
    ops.push(ML + ' ' + y + ' m ' + (W-MR) + ' ' + y + ' l 0.6 0.6 0.6 RG S 0 0 0 RG');
    y -= 16;
    ops.push('BT /F1 9 Tf ' + ML + ' ' + y + ' Td (Assinaturas) Tj ET');
    y -= 30;
    var lw = (TW - 40) / 2;
    var x1 = ML, x2 = ML + lw + 40;
    ops.push(x1 + ' ' + y + ' m ' + (x1+lw) + ' ' + y + ' l S');
    ops.push(x2 + ' ' + y + ' m ' + (x2+lw) + ' ' + y + ' l S');
    y -= 14;
    ops.push('BT /F2 8 Tf ' + x1 + ' ' + y + ' Td (Estoquista) Tj ET');
    ops.push('BT /F2 8 Tf ' + x2 + ' ' + y + ' Td (Gerente da Unidade) Tj ET');
    y -= 6;
    ops.push('BT /F2 7 Tf ' + x1 + ' ' + y + ' Td (Nome e assinatura) Tj ET');
    ops.push('BT /F2 7 Tf ' + x2 + ' ' + y + ' Td (Nome e assinatura) Tj ET');
  }


  function newPage() {
    if (ops.length) pages.push(ops.splice(0));
    y = 780;
    // Header
    ops.push(`BT /F1 16 Tf ${ML} ${y} Td ${pdfStr("Sesconetto's - Contagem de Estoque" + (onlyCategory ? ' - ' + onlyCategory : ''))} Tj ET`);
    y -= 20;
    ops.push(`BT /F2 10 Tf ${ML} ${y} Td ${pdfStr(unitLabel + '  |  ' + dateStr + ' as ' + timeStr + '  |  ' + user)} Tj ET`);
    y -= 8;
    ops.push(`${ML} ${y} m ${W-MR} ${y} l S`);
    y -= 14;
    // Col headers
    ops.push(`BT /F1 9 Tf ${colX[0]} ${y} Td (ITEM) Tj ET`);
    ops.push(`BT /F1 9 Tf ${colX[1]} ${y} Td (UN.) Tj ET`);
    if (showMinCol) {
      ops.push(`BT /F1 9 Tf ${colX[2]} ${y} Td (MIN.) Tj ET`);
      ops.push(`BT /F1 9 Tf ${colX[3]} ${y} Td (QTD) Tj ET`);
    } else {
      ops.push(`BT /F1 9 Tf ${colX[2]} ${y} Td (QTD) Tj ET`);
    }
    y -= 6;
    ops.push(`${ML} ${y} m ${W-MR} ${y} l S`);
    y -= 12;
  }

  function pdfStr(s) {
    // WinAnsiEncoding: latin-1 chars (0x00-0xFF) são suportados pelo Helvetica
    // Chars acima de 0xFF são substituídos pelo equivalente mais próximo
    const latin1Map = {
      '\u0100':'A','\u0101':'a','\u0102':'A','\u0103':'a','\u0104':'A','\u0105':'a',
      '\u0106':'C','\u0107':'c','\u010C':'C','\u010D':'c',
      '\u0110':'D','\u0111':'d','\u011A':'E','\u011B':'e',
      '\u0118':'E','\u0119':'e','\u011E':'G','\u011F':'g',
      '\u0130':'I','\u0131':'i','\u0141':'L','\u0142':'l',
      '\u0143':'N','\u0144':'n','\u0147':'N','\u0148':'n',
      '\u0150':'O','\u0151':'o','\u0152':'OE','\u0153':'oe',
      '\u0158':'R','\u0159':'r','\u015A':'S','\u015B':'s',
      '\u015E':'S','\u015F':'s','\u0160':'S','\u0161':'s',
      '\u0164':'T','\u0165':'t','\u016E':'U','\u016F':'u',
      '\u0170':'U','\u0171':'u','\u0178':'Y','\u0179':'Z',
      '\u017A':'z','\u017B':'Z','\u017C':'z','\u017D':'Z','\u017E':'z',
    };
    let o = '(';
    for (const ch of String(s)) {
      const c = ch.charCodeAt(0);
      if (ch === '(') o += '\\(';
      else if (ch === ')') o += '\\)';
      else if (ch === '\\') o += '\\\\';
      else if (c < 128) o += ch;
      else if (c <= 0xFF) {
        // Latin-1: emite como octal escape — WinAnsiEncoding mapeia direto
        o += '\\' + c.toString(8).padStart(3, '0');
      } else if (latin1Map[ch]) {
        o += latin1Map[ch];
      } else {
        // Tenta normalizar para NFD e pegar só a base ASCII
        const norm = ch.normalize('NFD').replace(/[\u0300-\u036f]/g,'');
        o += norm.length > 0 && norm.charCodeAt(0) < 128 ? norm : '_';
      }
    }
    return o + ')';
  }

  newPage();
  Object.keys(byCategory).forEach(cat => {
    if (y < 80) newPage();
    // Category header
    ops.push(`0.85 0.93 0.87 rg ${ML} ${y-2} ${TW} 14 re f 0 0 0 rg`);
    ops.push(`BT /F1 9 Tf ${ML+3} ${y+2} Td ${pdfStr(cat.toUpperCase())} Tj ET`);
    y -= 16;
    byCategory[cat].forEach(item => {
      if (y < 60) newPage();
      const isLow = showMinCol && item.min > 0 && item.qty < item.min;
      const isZero = showMinCol && item.qty === 0 && item.min > 0;
      if (isZero) ops.push(`1 0.9 0.9 rg ${ML} ${y-2} ${TW} 13 re f 0 0 0 rg`);
      else if (isLow) ops.push(`1 0.97 0.87 rg ${ML} ${y-2} ${TW} 13 re f 0 0 0 rg`);
      // Verificar se item foi confirmado na janela atual
      const itemConfirmed = !showMinCol && unitLabel !== 'CPD'
        ? isConfirmed(unitLabel, (catalog.find(i => i.name === item.name) || {}).id || '')
        : true; // CPD sempre "confirmado" (não usa esse sistema)
      const itemName = itemConfirmed ? item.name : ('! nao contado ! ' + item.name);
      ops.push(`BT /F2 8 Tf ${colX[0]+3} ${y+1} Td ${pdfStr(itemName)} Tj ET`);
      ops.push(`BT /F2 8 Tf ${colX[1]+3} ${y+1} Td ${pdfStr(item.unit)} Tj ET`);
      if (showMinCol) {
        ops.push(`BT /F2 8 Tf ${colX[2]+3} ${y+1} Td (${item.min > 0 ? item.min : '-'}) Tj ET`);
        ops.push(`BT /F1 9 Tf ${colX[3]+3} ${y+1} Td (${item.qty}) Tj ET`);
      } else {
        ops.push(`BT /F1 9 Tf ${colX[2]+3} ${y+1} Td (${item.qty !== undefined ? item.qty : '-'}) Tj ET`);
      }
      ops.push(`${ML} ${y-3} m ${W-MR} ${y-3} l 0.9 0.9 0.9 RG S 0 0 0 RG`);
      y -= 14;
    });
    y -= 4;
  });
  addSignatureBlock();
  if (ops.length) pages.push(ops.splice(0));

  // Build PDF
  const font1 = '<<\n/Type /Font\n/Subtype /Type1\n/BaseFont /Helvetica-Bold\n/Encoding /WinAnsiEncoding\n>>';
  const font2 = '<<\n/Type /Font\n/Subtype /Type1\n/BaseFont /Helvetica\n/Encoding /WinAnsiEncoding\n>>';
  let pdf = '%PDF-1.4\n';
  const offsets = [];
  let offset = pdf.length;

  function addObj(n, content) {
    offsets[n] = offset;
    const obj = `${n} 0 obj\n${content}\nendobj\n`;
    pdf += obj; offset += obj.length;
  }

  addObj(1, font1);
  addObj(2, font2);
  addObj(3, `<<\n/Type /Resources\n/Font <<\n/F1 1 0 R\n/F2 2 0 R\n>>\n>>`);

  const pageIds = [];
  const baseObj = 4;
  pages.forEach((pageOps, pi) => {
    const stream = pageOps.join('\n');
    const lenObj = baseObj + pi*2;
    const pageObj = baseObj + pi*2 + 1;
    addObj(lenObj, `<<\n/Length ${stream.length}\n>>\nstream\n${stream}\nendstream`);
    addObj(pageObj, `<<\n/Type /Page\n/Parent ${baseObj + pages.length*2} 0 R\n/MediaBox [0 0 ${W} 842]\n/Contents ${lenObj} 0 R\n/Resources 3 0 R\n>>`);
    pageIds.push(pageObj);
  });

  const pagesObj = baseObj + pages.length*2;
  addObj(pagesObj, `<<\n/Type /Pages\n/Kids [${pageIds.map(i=>`${i} 0 R`).join(' ')}]\n/Count ${pages.length}\n>>`);
  const catObj = pagesObj + 1;
  addObj(catObj, `<<\n/Type /Catalog\n/Pages ${pagesObj} 0 R\n>>`);

  const xrefOffset = offset;
  const total = catObj + 1;
  let xref = `xref\n0 ${total}\n0000000000 65535 f \n`;
  for (let i = 1; i < total; i++) xref += `${String(offsets[i]||0).padStart(10,'0')} 00000 n \n`;
  pdf += xref + `trailer\n<<\n/Size ${total}\n/Root ${catObj} 0 R\n>>\nstartxref\n${xrefOffset}\n%%EOF`;

  const blob = new Blob([pdf], {type:'application/pdf'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const catSlug = onlyCategory ? '-' + onlyCategory.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'-') : '';
  a.download = `contagem-${unitLabel.toLowerCase().replace(/\s+/g,'-')}${catSlug}-${now.toISOString().slice(0,10)}.pdf`;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 3000);
}

function printLogPdf(entries) {
  const now = new Date();
  const dateStr = now.toLocaleDateString('pt-BR', {day:'2-digit', month:'long', year:'numeric'});
  const W = 595, ML = 40, MR = 40, TW = W - ML - MR;
  let y = 0;
  const ops = [];
  const pages = [];
  // --- Bloco de assinaturas ---
  function addSignatureBlock() {
    if (y < 120) { if (ops.length) pages.push(ops.splice(0)); y = 760; }
    y -= 20;
    ops.push(ML + ' ' + y + ' m ' + (W-MR) + ' ' + y + ' l 0.6 0.6 0.6 RG S 0 0 0 RG');
    y -= 16;
    ops.push('BT /F1 9 Tf ' + ML + ' ' + y + ' Td (Assinaturas) Tj ET');
    y -= 30;
    var lw = (TW - 40) / 2;
    var x1 = ML, x2 = ML + lw + 40;
    ops.push(x1 + ' ' + y + ' m ' + (x1+lw) + ' ' + y + ' l S');
    ops.push(x2 + ' ' + y + ' m ' + (x2+lw) + ' ' + y + ' l S');
    y -= 14;
    ops.push('BT /F2 8 Tf ' + x1 + ' ' + y + ' Td (Estoquista) Tj ET');
    ops.push('BT /F2 8 Tf ' + x2 + ' ' + y + ' Td (Gerente da Unidade) Tj ET');

    ops.push('BT /F2 7 Tf ' + x2 + ' ' + y + ' Td (Nome e assinatura) Tj ET');
  }


  function pdfStr(s) {
    // Encoder Latin-1/WinAnsi (retorna sem parenteses externos)
    let o = '';
    for (const ch of (s||'').toString()) {
      const c = ch.charCodeAt(0);
      if (ch==='(') o+='\\(';
      else if (ch===')') o+='\\)';
      else if (ch==='\\') o+='\\\\';
      else if (c<128) o+=ch;
      else if (c<=0xFF) o+='\\' + c.toString(8).padStart(3,'0');
      else {
        const norm = ch.normalize('NFD').replace(/[\u0300-\u036f]/g,'');
        o += (norm && norm.charCodeAt(0)<128) ? norm : '?';
      }
    }
    return o;
  }

  function newPage() {
    if (ops.length) pages.push(ops.splice(0));

    ops.push(`BT /F1 16 Tf ${ML} ${y} Td (Sesconetto's - Movimentacoes do Dia) Tj ET`);

    y -= 13;
    ops.push(`BT /F2 8 Tf ${ML+8} ${y} Td (${pdfStr(entry.description)}) Tj ET`);
    ops.push(`${ML} ${y-4} m ${W-MR} ${y-4} l 0.9 0.9 0.9 RG S 0 0 0 RG`);
    y -= 18;
  });
  addSignatureBlock();
  if (ops.length) pages.push(ops.splice(0));

  const font1 = '<<\n/Type /Font\n/Subtype /Type1\n/BaseFont /Helvetica-Bold\n/Encoding /WinAnsiEncoding\n>>';
  const font2 = '<<\n/Type /Font\n/Subtype /Type1\n/BaseFont /Helvetica\n/Encoding /WinAnsiEncoding\n>>';
  let pdf = '%PDF-1.4\n';
  const offsets = [];
  let offset = pdf.length;

  function addObj(n, content) {
    offsets[n] = offset;
    const obj = `${n} 0 obj\n${content}\nendobj\n`;
    pdf += obj; offset += obj.length;
  }

  addObj(1, font1); addObj(2, font2);
  addObj(3, `<<\n/Type /Resources\n/Font <<\n/F1 1 0 R\n/F2 2 0 R\n>>\n>>`);

  const pageIds = [];
  const baseObj = 4;
  pages.forEach((pageOps, pi) => {
    const stream = pageOps.join('\n');
    const lenObj = baseObj + pi*2;
    const pageObj = baseObj + pi*2 + 1;
    addObj(lenObj, `<<\n/Length ${stream.length}\n>>\nstream\n${stream}\nendstream`);
    addObj(pageObj, `<<\n/Type /Page\n/Parent ${baseObj + pages.length*2} 0 R\n/MediaBox [0 0 ${W} 842]\n/Contents ${lenObj} 0 R\n/Resources 3 0 R\n>>`);
    pageIds.push(pageObj);
  });

  const pagesObj = baseObj + pages.length*2;
  addObj(pagesObj, `<<\n/Type /Pages\n/Kids [${pageIds.map(i=>`${i} 0 R`).join(' ')}]\n/Count ${pages.length}\n>>`);
  const catObjN = pagesObj + 1;
  addObj(catObjN, `<<\n/Type /Catalog\n/Pages ${pagesObj} 0 R\n>>`);

  const xrefOffset = offset;
  const total = catObjN + 1;
  let xref = `xref\n0 ${total}\n0000000000 65535 f \n`;
  for (let i = 1; i < total; i++) xref += `${String(offsets[i]||0).padStart(10,'0')} 00000 n \n`;
  pdf += xref + `trailer\n<<\n/Size ${total}\n/Root ${catObjN} 0 R\n>>\nstartxref\n${xrefOffset}\n%%EOF`;

  const blob = new Blob([pdf], {type:'application/pdf'});

      else if (code < 128) out += ch;

  const objs=[];
  function addObj(content){const id=objs.length+1;objs.push({id,content});return id;}
  const f1=addObj(`<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold /Encoding /WinAnsiEncoding >>`);
  const f2=addObj(`<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding >>`);
  const sid=addObj(`<< /Length ${sc.length} >>\nstream\n${sc}\nendstream`);
  const pid=addObj(`<< /Type /Page /Parent 5 0 R /MediaBox [0 0 ${W} ${H}] /Contents ${sid} 0 R /Resources << /Font << /F1 ${f1} 0 R /F2 ${f2} 0 R >> >> >>`);
  const pgid=addObj(`<< /Type /Pages /Kids [${pid} 0 R] /Count 1 >>`);
  const cid=addObj(`<< /Type /Catalog /Pages ${pgid} 0 R >>`);
  let out='%PDF-1.4\n%\xFF\xFF\xFF\xFF\n';
  const offs=[];
  objs.forEach(o=>{offs.push(out.length);out+=`${o.id} 0 obj\n${o.content}\nendobj\n`;});
  const xo=out.length;
  out+=`xref\n0 ${objs.length+1}\n0000000000 65535 f \n`;

  out+=`trailer\n<< /Size ${objs.length+1} /Root ${cid} 0 R >>\nstartxref\n${xo}\n%%EOF`;
  const ba=new Uint8Array(out.length);
  for(let i=0;i<out.length;i++) ba[i]=out.charCodeAt(i)&0xff;

  const url=URL.createObjectURL(blob);

// Feature1:Stockminimumalerts
function getLowStockItems(stockObj) {
  return catalog.filter(item => {
    const min = minimums[item.id];
    if (!min || min <= 0) return false;
    const qty = stockObj[item.id] || 0;
    return qty < min;
  });
}

function buildAlerts(stockObj, label) {
  const low = getLowStockItems(stockObj);
  if (!low.length) return null;
  const zero = low.filter(i => (stockObj[i.id]||0) === 0);
  const frag = document.createDocumentFragment();
  if (zero.length) {
    const b = el('div', {cls:'alert-banner danger'});
    b.appendChild(el('span', {cls:'alert-banner-icon'}, '\uD83D\uDEA8'));
    const bd = el('div', {cls:'alert-banner-body'});
    bd.appendChild(el('div', {cls:'alert-banner-title'}, `${zero.length} ${zero.length===1?'item':'itens'} SEM estoque no ${label}`));
    b.appendChild(bd); frag.appendChild(b);
  }
  const low2 = low.filter(i => (stockObj[i.id]||0) > 0);
  if (low2.length) {
    const b = el('div', {cls:'alert-banner warn'});
    b.appendChild(el('span', {cls:'alert-banner-icon'}, '\u26A0\uFE0F'));
    const bd = el('div', {cls:'alert-banner-body'});
    bd.appendChild(el('div', {cls:'alert-banner-title'}, `${low2.length} ${low2.length===1?'item':'itens'} abaixo do m\u00EDnimo no ${label}`));
    b.appendChild(bd); frag.appendChild(b);
  }
  return frag;
}

// Feature6:Consumptionanalysis
function getConsumptionData(weeks=8) {
  const now = Date.now();
  const msPerWeek = 7*24*60*60*1000;
  const data = [];
  for (let w=weeks-1; w>=0; w--) {
    const from = now - (w+1)*msPerWeek;
    const to   = now - w*msPerWeek;
    const label = `Sem ${weeks-w}`;
    const total = movements.filter(m => {
      const t = new Date(m.date).getTime();
      return m.type==='saida' && t>=from && t<to;
    }).reduce((s,m)=>s+m.qty, 0);
    data.push({label, total});
  }
  return data;
}

function getCategoryConsumption(weeks=4) {
  const now = Date.now();
  const from = now - weeks*7*24*60*60*1000;
  const result = {};
  CATEGORIES.forEach(cat => { result[cat] = 0; });
  movements.filter(m => m.type==='saida' && new Date(m.date).getTime()>=from).forEach(m => {
    const item = catalog.find(i=>i.id===m.itemId);
    if (item) result[item.category] = (result[item.category]||0) + m.qty;
  });
  return result;
}

function showIncompleteModal(order) {
  const overlay = el('div', {cls:'modal-overlay'});
  const box = el('div', {cls:'modal-box', style:'max-width:500px'});

  const header = el('div', {cls:'modal-header'});
  header.appendChild(el('div', {cls:'modal-title'}, '\u26A0\uFE0F Pedido Incompleto'));
  header.appendChild(el('button', {cls:'modal-close', onclick:()=>overlay.remove()}, '\u00D7'));
  box.appendChild(header);

  const body = el('div', {cls:'modal-body', style:'max-height:60vh'});
  body.appendChild(el('p', {style:'font-size:13px;color:var(--text-2);margin-bottom:14px'}, 'Para cada item que n\u00E3o chegou corretamente, informe a quantidade recebida. Deixe igual ao pedido se chegou certo.'));

  const inputs = [];
  order.items.forEach(({itemId, qty}) => {
    const item = catalog.find(c=>c.id===itemId);
    const row = el('div', {cls:'checklist-row'});
    row.appendChild(el('span', {cls:'check-name'}, item?.name||'\u2014'));
    row.appendChild(el('span', {cls:'check-sent'}, `Pedido: ${qty} ${item?.unit||''}`));
    const inp = el('input', {type:'text', inputmode:'decimal', cls:'check-recv-inp', value:String(qty)});
    inp.addEventListener('input', () => {
      const v = parseFloat(inp.value)||0;
      inp.className = 'check-recv-inp' + (v===qty?' ok':v<qty?' diff':'');
    });
    inp.dispatchEvent(new Event('input'));
    inputs.push({itemId, sent:qty, inp, item});
    row.appendChild(inp);
    body.appendChild(row);
  });
  box.appendChild(body);

  const footer = el('div', {cls:'modal-footer'});
  footer.appendChild(el('button', {cls:'btn btn-outline', onclick:()=>{overlay.remove(); showReceiptModal(order);}}, '\u2190 Voltar'));
  footer.appendChild(el('button', {cls:'btn btn-primary', style:'background:var(--danger)', onclick:()=>{
    const divergences = inputs
      .filter(({sent,inp})=> (parseFloat(inp.value)||0) !== sent)
      .map(({itemId,sent,inp,item})=>({itemId, sent, recv:parseFloat(inp.value)||0, diff:sent-(parseFloat(inp.value)||0)}));

    // Update unit stock with actually received quantities
    if (!unitStock[order.unit]) unitStock[order.unit]={};
    inputs.forEach(({itemId,inp})=>{
      const recv = parseFloat(inp.value)||0;
      unitStock[order.unit][itemId] = (unitStock[order.unit][itemId]||0) + recv;
    });
    // Salvar estoque de cada unidade afetada individualmente (granular)
    Object.keys(unitStock).forEach(u => saveUnit(u, unitStock[u]));

    // Mark original order as received incomplete
    order.status = 'recebido_incompleto';
    order.receivedAt = new Date().toISOString();
    order.divergences = divergences;

    // Create a NEW follow-up order with only the missing items
    if (divergences.length > 0) {
      const followUp = {
        id: 'order_' + Date.now(),
        unit: order.unit,
        userName: order.userName,
        role: order.role,
        date: new Date().toISOString(),
        status: 'pendente',
        parentOrderId: order.id,  // reference to original order
        isFollowUp: true,
        items: divergences.map(d => ({ itemId: d.itemId, qty: d.diff }))
      };
      orders.unshift(followUp);
    }

    save('pizza_orders', orders);
    logAction('recebimento_incompleto',
      `${session.name} registrou recebimento incompleto em ${order.unit}: ${divergences.length} item${divergences.length!==1?'s':''} com diverg\u00EAncia${divergences.length>0?' \u2014 novo pedido de reenvio criado':''}`,
      {orderId: order.id, unit: order.unit, divergences: divergences.length}
    );
    overlay.remove();
    render();

    const divCount = divergences.length;
    const msg = divCount > 0
      ? `${order.unit} reportou recebimento incompleto. ${divCount} item${divCount!==1?'s':''} com diverg\u00EAncia \u2014 novo pedido criado automaticamente com os itens faltantes.`
      : `${order.unit} confirmou recebimento completo.`;
    showPushNotif(
      divCount > 0 ? '\u26A0\uFE0F Pedido incompleto \u2014 ' + order.unit : '\u2705 Recebido \u2014 ' + order.unit,
      msg,
      []
    );
    toast(divCount > 0 ? `Novo pedido criado com ${divCount} item${divCount!==1?'s':''} faltantes` : 'Recebimento confirmado!');
  }}, 'Confirmar'));
  box.appendChild(footer);
  overlay.appendChild(box);
  overlay.addEventListener('click', e=>{if(e.target===overlay)overlay.remove();});
  document.body.appendChild(overlay);
}

    card.appendChild(el('div', {cls:'dash-card-hint'}, 'Clique para ver detalhes \u2192'));
    return card;
  }

  const grid = el('div', {cls:'dash-grid'});
  grid.appendChild(buildSummaryCard('CPD', cpd));

// ═══ ENVIOS ÀS UNIDADES ═══
// Plano de envios: quantidades por item × unidade × dia de entrega.
// Editável apenas pelo CPD; salvo em pizza_envios (Firebase + localStorage).
let enviosActiveUnit = 'Asa Sul';

// Monta o preload da Saída do Estoque a partir do plano de envios + pendências
function separarParaEnvio(unit, dayCode) {
  const itemsMap = {}; // itemId -> qty

  // 1. Quantidades do plano para o dia
  Object.keys(envios).forEach(catName => {
    const catData = envios[catName];
    if (!catData.days.includes(dayCode)) return;
    (catData.items || []).forEach(planItem => {
      const q = (planItem.qty && planItem.qty[unit] && planItem.qty[unit][dayCode]) || 0;
      if (q <= 0) return;
      // Mapear item do plano para item do catálogo (por nome normalizado)
      const norm = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
      const catItem = unitCatalog.find(i => norm(i.name) === norm(planItem.name));
      if (catItem) {
        itemsMap[catItem.id] = (itemsMap[catItem.id] || 0) + q;
      }
    });
  });

  // 2. Somar pendências da unidade
  const unitPend = pendencias[unit] || {};
  Object.entries(unitPend).forEach(([itemId, q]) => {
    if (q > 0) itemsMap[itemId] = (itemsMap[itemId] || 0) + q;
  });

  const items = Object.entries(itemsMap).map(([itemId, qty]) => ({itemId, qty}));
  if (items.length === 0) {
    toast('Nenhum item planejado para ' + unit + ' neste dia.');
    return;
  }

  saidaPreload = { unit, items, fromEnvios: true, day: dayCode };
  setView('saida');
}

    const btn = el('button', {
      cls: 'unit-tab' + (enviosActiveUnit === u ? ' active' : ''),
      onclick: () => { enviosActiveUnit = u; render(); }
    }, u);
    tabs.appendChild(btn);
  });
  frag.appendChild(tabs);

  // Info do cronograma
  const info = el('div', {cls:'table-wrap', style:'padding:12px 18px;margin-bottom:14px;font-size:12px;color:var(--text-3)'},
    'Quantidades a enviar para ' + enviosActiveUnit + ' em cada dia de entrega. Altera\u00E7\u00F5es s\u00E3o salvas automaticamente.');
  frag.appendChild(info);

  // ─── Pend\u00EAncias da unidade (itens faltantes de entregas anteriores) ───
  const unitPend = pendencias[enviosActiveUnit] || {};
  const pendCount = Object.keys(unitPend).filter(k => unitPend[k] > 0).length;
  if (pendCount > 0) {
    const pendBox = el('div', {cls:'table-wrap', style:'padding:12px 18px;margin-bottom:14px;border-color:var(--warning);background:var(--warning-bg)'});
    pendBox.appendChild(el('div', {style:'font-weight:700;font-size:13px;color:var(--warning);margin-bottom:6px'},
      '\u26A0\uFE0F ' + pendCount + (pendCount===1?' item pendente':' itens pendentes') + ' de entregas anteriores'));
    const pendList = Object.entries(unitPend).filter(([,q])=>q>0).map(([id,q]) => {
      const it = unitCatalog.find(i=>i.id===id);
      return (it?it.name:id) + ' (' + q + ')';
    }).join(' \u00B7 ');
    pendBox.appendChild(el('div', {style:'font-size:12px;color:var(--text-2)'}, pendList));
    pendBox.appendChild(el('div', {style:'font-size:11px;color:var(--text-3);margin-top:6px'},
      'Estes itens ser\u00E3o somados automaticamente ao pr\u00F3ximo "Separar para Envio".'));
    frag.appendChild(pendBox);
  }

  // ─── Bot\u00F5es Separar para Envio (um por dia de entrega) ───
  const sepBox = el('div', {cls:'table-wrap', style:'padding:14px 18px;margin-bottom:14px'});
  sepBox.appendChild(el('div', {style:'font-weight:700;font-size:13px;margin-bottom:10px'}, '\uD83D\uDE9A Separar para Envio \u2014 ' + enviosActiveUnit));
  const dayBtns = el('div', {style:'display:flex;gap:8px;flex-wrap:wrap'});
  const ALL_DAYS = [['SEG','Segunda'],['QUA','Quarta'],['SEX','Sexta']];
  ALL_DAYS.forEach(([code, label]) => {
    const btn = el('button', {cls:'btn btn-primary btn-sm', style:'flex:1;min-width:90px'}, label);
    btn.addEventListener('click', () => separarParaEnvio(enviosActiveUnit, code));
    dayBtns.appendChild(btn);
  });
  sepBox.appendChild(dayBtns);
  sepBox.appendChild(el('div', {style:'font-size:11px;color:var(--text-3);margin-top:8px'},
    'Abre a Sa\u00EDda do Estoque com as quantidades do dia j\u00E1 pr\u00E9-selecionadas (+ pend\u00EAncias).'));
  frag.appendChild(sepBox);

  const saveEnvios = () => save('pizza_envios', envios);
  let envioSaveTimer = null;
  const debouncedSave = () => {
    clearTimeout(envioSaveTimer);
    envioSaveTimer = setTimeout(saveEnvios, 500);
  };

  // estado de abas abertas (persistente por sessão de view)
  if (!window._enviosOpenCats) window._enviosOpenCats = {};
  const openCats = window._enviosOpenCats;

  Object.keys(envios).forEach(catName => {
    const catData = envios[catName];
    const days = catData.days || [];
    const items = catData.items || [];
    if (!items.length) return;
    const isOpen = openCats[catName] === true;

    const block = el('div', {cls:'table-wrap', style:'margin-bottom:12px'});

    // Header da categoria (toggle)
    const hdr = el('button', {cls:'cat-toggle' + (isOpen ? ' open' : ''), style:'width:100%;border-radius:10px 10px 0 0'});
    hdr.appendChild(document.createTextNode(catName));
    const schedNote = (catData.schedule || '').replace(/Contagem:.*?\|/,'').trim();
    hdr.appendChild(el('span', {cls:'cat-count'}, items.length + ' itens \u00B7 ' + days.join('/')));
    hdr.appendChild(el('span', {cls:'cat-chevron'}, '\u25BC'));
    block.appendChild(hdr);

    // Corpo
    const body = el('div', {style: isOpen ? '' : 'display:none'});
    hdr.addEventListener('click', () => {
      openCats[catName] = !openCats[catName];
      hdr.classList.toggle('open', openCats[catName]);
      body.style.display = openCats[catName] ? '' : 'none';
    });

    const table = el('table', {cls:'stock-table'});
    const thead = el('thead', {});
    let headHtml = '<tr><th>Item</th><th class="col-unit" style="width:11%">Emb.</th>';
    days.forEach(d => { headHtml += '<th style="width:' + Math.floor(40/days.length) + '%;text-align:center">' + d + '</th>'; });
    headHtml += '</tr>';
    thead.innerHTML = headHtml;
    table.appendChild(thead);

    const tbody = el('tbody', {});
    items.forEach((item, idx) => {
      const tr = el('tr', {});
      const nameTd = el('td', {cls:'item-name'});
      nameTd.textContent = item.name;
      tr.appendChild(nameTd);
      tr.appendChild(el('td', {cls:'muted col-unit'}, item.emb || 'Un'));

      days.forEach(day => {
        const td = el('td', {style:'text-align:center;padding:5px 4px'});
        const qty = (item.qty && item.qty[enviosActiveUnit] && item.qty[enviosActiveUnit][day]) || 0;
        const inp = el('input', {
          type:'text', inputmode:'decimal', pattern:'[0-9]*',
          cls:'qty-inp-sm' + (qty > 0 ? ' has-val' : ''),
          value: String(qty),
          style:'width:54px;text-align:center'
        });
        inp.addEventListener('change', () => {
          const raw = parseFloat((inp.value||'0').replace(',','.'));
          const q = Math.max(0, isNaN(raw) ? 0 : raw);
          inp.value = String(q);
          inp.className = 'qty-inp-sm' + (q > 0 ? ' has-val' : '');
          if (!item.qty) item.qty = {};
          if (!item.qty[enviosActiveUnit]) item.qty[enviosActiveUnit] = {};
          item.qty[enviosActiveUnit][day] = q;
          debouncedSave();
        });
        inp.addEventListener('blur', () => inp.dispatchEvent(new Event('change')));
        td.appendChild(inp);
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    body.appendChild(table);
    block.appendChild(body);
    frag.appendChild(block);
  });

  return frag;
}

function viewEntrada() { return viewBatchOperation('entrada'); }
// ═══ RECEBIMENTO DE ENVIOS (lado unidade) ═══
function getMyTransitShipments() {
  if (!session || isCPD()) return [];
  return shipments.filter(s => s.unit === session.unit && s.status === 'em_transito');
}

function buildShipmentBanner() {
  const transit = getMyTransitShipments();
  if (transit.length === 0) return null;
  const isGerente = true; // Opção D: qualquer usuário pode confirmar recebimento

  const box = el('div', {cls:'table-wrap', style:'padding:14px 18px;margin-bottom:14px;border-color:var(--accent);background:var(--accent-light);cursor:' + (isGerente?'pointer':'default')});
  const title = el('div', {style:'font-weight:700;font-size:14px;color:var(--accent-dark);display:flex;align-items:center;gap:8px'});
  title.innerHTML = '\uD83D\uDE9A <span>Entrega a caminho!</span>';
  box.appendChild(title);
  const totalItems = transit.reduce((s, sh) => s + sh.items.length, 0);
  box.appendChild(el('div', {style:'font-size:12px;color:var(--text-2);margin-top:4px'},
    transit.length + (transit.length===1?' envio':' envios') + ' com ' + totalItems + (totalItems===1?' item':' itens') + ' aguardando recebimento.'));
  if (isGerente) {
    box.appendChild(el('div', {style:'font-size:12px;color:var(--accent-dark);margin-top:6px;font-weight:700'}, 'Toque para conferir e confirmar \u2192'));
    box.addEventListener('click', () => showShipmentReceiptModal(transit[0]));
  } else {
    box.appendChild(el('div', {style:'font-size:11px;color:var(--text-3);margin-top:6px'},
      'Apenas o gerente pode confirmar o recebimento.'));

}

function showShipmentReceiptModal(shipment) {
  const overlay = el('div', {cls:'modal-overlay', style:'position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px'});
  const box = el('div', {style:'background:var(--surface);border-radius:14px;max-width:520px;width:100%;max-height:88vh;overflow-y:auto;padding:22px'});

  box.appendChild(el('div', {style:'font-family:"Playfair Display",serif;font-size:19px;font-weight:700;margin-bottom:4px'}, '\uD83D\uDCE6 Conferir Recebimento'));
  const sentDate = new Date(shipment.date);
  box.appendChild(el('div', {style:'font-size:12px;color:var(--text-3);margin-bottom:14px'},
    'Enviado por ' + (shipment.sentBy||'CPD') + ' em ' + sentDate.toLocaleDateString('pt-BR') + ' \u00E0s ' + sentDate.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})));

  // Modo: 'ok' (padrão) ou 'faltantes'
  let mode = 'ok';
  const received = {}; // itemId -> qty recebida (modo faltantes)
  shipment.items.forEach(({itemId, qty}) => { received[itemId] = qty; });

  // Tabela de itens
  const table = el('table', {cls:'stock-table', style:'margin-bottom:14px'});
  const thead = el('thead', {});
  thead.innerHTML = '<tr><th>Item</th><th style="width:20%;text-align:center">Enviado</th><th class="recv-col" style="width:26%;text-align:center;display:none">Recebido</th></tr>';
  table.appendChild(thead);
  const tbody = el('tbody', {});
  shipment.items.forEach(({itemId, qty}) => {
    const item = activeCatalog().find(i => i.id === itemId);
    const tr = el('tr', {});
    tr.appendChild(el('td', {cls:'item-name'}, item ? item.name : itemId));
    tr.appendChild(el('td', {style:'text-align:center;font-weight:700'}, String(qty)));
    const recvTd = el('td', {cls:'recv-col', style:'text-align:center;display:none;padding:4px'});
    const inp = el('input', {type:'text', inputmode:'decimal', cls:'qty-inp-sm has-val', value:String(qty), style:'width:54px;text-align:center'});
    inp.addEventListener('change', () => {
      const raw = parseFloat((inp.value||'0').replace(',','.'));
      const q = Math.max(0, Math.min(qty, isNaN(raw) ? 0 : raw));
      inp.value = String(q);
      received[itemId] = q;
      inp.className = 'qty-inp-sm ' + (q < qty ? 'has-error' : 'has-val');
    });
    recvTd.appendChild(inp);
    tr.appendChild(recvTd);
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  box.appendChild(table);

  // Botões de modo
  const modeBox = el('div', {style:'display:flex;gap:8px;margin-bottom:14px'});
  const okBtn = el('button', {cls:'btn btn-primary', style:'flex:1'}, '\u2705 Tudo OK');
  const faltBtn = el('button', {cls:'btn btn-outline', style:'flex:1'}, '\u26A0\uFE0F Itens faltantes');
  modeBox.appendChild(okBtn);
  modeBox.appendChild(faltBtn);
  box.appendChild(modeBox);

  const confirmBtn = el('button', {cls:'btn btn-primary', style:'width:100%;display:none'}, 'Confirmar Recebimento');
  box.appendChild(confirmBtn);
  const cancelBtn = el('button', {cls:'btn btn-outline', style:'width:100%;margin-top:8px'}, 'Fechar');
  cancelBtn.addEventListener('click', () => overlay.remove());
  box.appendChild(cancelBtn);

  function finalize() {
    const faltantes = [];
    shipment.items.forEach(({itemId, qty}) => {
      const recv = mode === 'ok' ? qty : (received[itemId] || 0);
      const falta = qty - recv;
      // Entra no estoque da unidade o que foi recebido
      if (!unitStock[shipment.unit]) unitStock[shipment.unit] = {};
      unitStock[shipment.unit][itemId] = (unitStock[shipment.unit][itemId] || 0) + recv;
      if (falta > 0) {
        faltantes.push({itemId, qty: falta});
        // Quantidade faltante volta ao estoque do CPD
        cpd[itemId] = (cpd[itemId] || 0) + falta;
      }
      movements.unshift({id: Date.now()+Math.random(), batchId: shipment.batchId, type:'recebimento', itemId, qty: recv, unitName: shipment.unit, note: falta>0 ? ('Falta: '+falta) : 'Recebido', date: new Date().toISOString()});
    });

    shipment.status = faltantes.length > 0 ? 'divergencia' : 'recebido';
    shipment.receivedBy = session.name;
    shipment.receivedAt = new Date().toISOString();
    if (faltantes.length > 0) shipment.faltantes = faltantes;

    // Salvar estoque de cada unidade afetada individualmente
    const affectedUnits = new Set([shipment.unit]);
    affectedUnits.forEach(u => saveUnit(u, unitStock[u] || {}));
    save('pizza_cpd', cpd);
    save('pizza_shipments', shipments);
    save('pizza_movements', movements);
    logAction('recebimento', session.name + ' confirmou recebimento de envio em ' + shipment.unit + (faltantes.length>0 ? ' com ' + faltantes.length + ' falta(s)' : ' (completo)'), {shipmentId: shipment.id, faltas: faltantes.length});

    overlay.remove();
    toast(faltantes.length > 0 ? 'Recebimento confirmado com ' + faltantes.length + ' item(ns) faltante(s). O CPD foi notificado.' : 'Recebimento confirmado! Estoque atualizado.');
    render();
  }

  okBtn.addEventListener('click', () => {
    mode = 'ok';
    if (confirm('Confirmar que TODOS os itens chegaram nas quantidades enviadas?')) finalize();
  });

  faltBtn.addEventListener('click', () => {
    mode = 'faltantes';
    // Mostrar coluna de recebido e botão confirmar
    box.querySelectorAll('.recv-col').forEach(td => td.style.display = '');
    confirmBtn.style.display = '';
    okBtn.style.opacity = '0.5';
    faltBtn.classList.remove('btn-outline');
    faltBtn.classList.add('btn-primary');
  });

  confirmBtn.addEventListener('click', () => {
    if (confirm('Confirmar o recebimento com as quantidades informadas? Itens faltantes voltar\u00E3o ao CPD.')) finalize();
  });

  overlay.appendChild(box);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

// ═══ DIVERGÊNCIAS (lado CPD) ═══
function buildDivergenceBanner() {
  if (!isCPD()) return null;
  const divs = shipments.filter(s => s.status === 'divergencia' && !s._pendAdded);
  if (divs.length === 0) return null;

  const box = el('div', {cls:'table-wrap', style:'padding:14px 18px;margin-bottom:14px;border-color:var(--danger);background:var(--danger-bg)'});
  box.appendChild(el('div', {style:'font-weight:700;font-size:14px;color:var(--danger)'},
    '\u26A0\uFE0F ' + divs.length + (divs.length===1?' entrega com itens faltantes':' entregas com itens faltantes')));

  divs.forEach(sh => {
    const row = el('div', {style:'margin-top:10px;padding-top:10px;border-top:1px solid var(--border)'});
    row.appendChild(el('div', {style:'font-size:13px;font-weight:700'}, sh.unit + ' \u2014 ' + new Date(sh.receivedAt||sh.date).toLocaleDateString('pt-BR')));
    const list = (sh.faltantes||[]).map(f => {
      const it = activeCatalog().find(i=>i.id===f.itemId);
      return (it?it.name:f.itemId) + ' (' + f.qty + ')';
    }).join(' \u00B7 ');
    row.appendChild(el('div', {style:'font-size:12px;color:var(--text-2);margin:4px 0 8px'}, 'Faltou: ' + list));
    const addBtn = el('button', {cls:'btn btn-primary btn-sm'}, '\u2795 Adicionar \u00E0 pr\u00F3xima sa\u00EDda');
    addBtn.addEventListener('click', () => {
      if (!pendencias[sh.unit]) pendencias[sh.unit] = {};
      (sh.faltantes||[]).forEach(f => {
        pendencias[sh.unit][f.itemId] = (pendencias[sh.unit][f.itemId] || 0) + f.qty;
      });
      sh._pendAdded = true;
      save('pizza_pendencias', pendencias);
      save('pizza_shipments', shipments);
      toast('Itens adicionados \u00E0s pend\u00EAncias de ' + sh.unit + '. Ser\u00E3o somados no pr\u00F3ximo envio.');
      render();
    });
    row.appendChild(addBtn);
    box.appendChild(row);
  });
  return box;
}
