<script>
// \u2500\u2500 iOS: Se aberto pelo app Arquivos (quick look), redireciona para Safari \u2500\u2500
(function() {
  var ua = navigator.userAgent;
  var isIOS = /iPhone|iPad|iPod/.test(ua);
  var isFileProtocol = location.protocol === 'file:';
  
  // Detecta o quick look viewer do iOS (tem limita\u00E7\u00F5es de JS)
  // A forma mais confi\u00E1vel: verificar se localStorage est\u00E1 dispon\u00EDvel
  if (isIOS && isFileProtocol) {
    try {
      localStorage.setItem('_test', '1');
      localStorage.removeItem('_test');
      // localStorage funciona - estamos no Safari, tudo certo
    } catch(e) {
      // localStorage bloqueado = estamos no Quick Look do app Arquivos
      // Mostrar instru\u00E7\u00E3o para abrir no Safari
      document.addEventListener('DOMContentLoaded', function() {
        var overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;background:#0C1A0F;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;font-family:sans-serif';
        overlay.innerHTML = '<div style="font-size:48px;margin-bottom:20px">\uD83C\uDF55</div>' +
          '<div style="color:#E8F2EA;font-size:22px;font-weight:700;margin-bottom:12px">Sesconetto\'s Estoque</div>' +
          '<div style="color:#5A7A62;font-size:15px;margin-bottom:32px;line-height:1.5">Para usar o app, abra no <strong style="color:#26743E">Safari</strong></div>' +
          '<div style="background:#1A3020;border-radius:12px;padding:20px;max-width:300px;width:100%">' +
          '<div style="color:#A8C4AE;font-size:13px;line-height:1.8;text-align:left">' +
          '1. Toque em <strong style="color:#E8F2EA">\u22EF</strong> (3 pontos) no canto superior direito<br>' +
          '2. Toque em <strong style="color:#E8F2EA">"Abrir com..."</strong><br>' +
          '3. Escolha <strong style="color:#26743E">Safari</strong>' +
          '</div></div>' +
          '<div style="color:#2A4030;font-size:11px;margin-top:24px">ou copie o arquivo para o iCloud Drive<br>e abra pelo Safari</div>';
        document.body.appendChild(overlay);
      });
    }
  }
})();
</script>
<script>
  // window.screen.width retorna pixels f\u00EDsicos no Android (devicePixelRatio > 1),
  // ent\u00E3o normalizamos para pixels l\u00F3gicos (CSS pixels) antes de decidir a escala.
  (function() {
    const dpr = window.devicePixelRatio || 1;
    const physW = window.screen.width;
    const logicalW = Math.round(physW / dpr); // largura em CSS pixels

    let scale = 1.0;

    if (logicalW <= 320) scale = 0.78;      // iPhone SE 1\u00AA gen, Android compacto
    else if (logicalW <= 360) scale = 0.82; // Galaxy S (base), Pixel 6a, Moto G
    else if (logicalW <= 375) scale = 0.83; // iPhone 6/7/8/SE 2\u00AA/3\u00AA
    else if (logicalW <= 390) scale = 0.85; // iPhone 12/13/14 Pro, Pixel 7
    else if (logicalW <= 393) scale = 0.85; // iPhone 14/15, Pixel 8
    else if (logicalW <= 400) scale = 0.86; // Galaxy S22, Pixel 6
    else if (logicalW <= 412) scale = 0.87; // Pixel 6 Pro, Galaxy S21+
    else if (logicalW <= 414) scale = 0.88; // iPhone 8 Plus, XR, 11
    else if (logicalW <= 420) scale = 0.88; // Galaxy S23+, OnePlus
    else if (logicalW <= 430) scale = 0.90; // iPhone 14/15 Pro Max
    else if (logicalW <= 448) scale = 0.90; // Galaxy S23 Ultra, Pixel Fold (fechado)
    else if (logicalW <= 480) scale = 0.92; // tablets pequenos, Android landscape
    else if (logicalW <= 600) scale = 0.95; // tablets 7" e Android landscape grande
    // acima de 600px = tablet/desktop, escala 1.0

    const meta = document.createElement('meta');
    meta.name = 'viewport';
    meta.content = `width=device-width, initial-scale=${scale}, maximum-scale=1.0, user-scalable=no, viewport-fit=cover`;
    document.head.appendChild(meta);
  })();
</script>
<title>Estoque — Sesconetto's Pizzeria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── Touch global: elimina delay de 300ms em todo o app ─────────────────── */
  html { touch-action: manipulation; }
  button, [role="button"], input, select, a {
    touch-action: manipulation;   /* sem double-tap zoom nos controles */
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
  }

  /* Remove native number spinners */
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; }

  :root {
    /* Sesconetto's brand: deep Italian green + warm parchment */
    --accent: #26743E;
    --accent-light: #E6F2EB;
    --accent-dark: #1A5229;
    --accent-hover: #1E5E32;
    --gold: #B8922A;
    --gold-light: #F5EDD8;

    --sidebar-bg: #0C1A0F;
    --sidebar-border: #1A3020;
    --sidebar-text: #A8C4AE;
    --sidebar-label: #2D4A34;
    --sidebar-active-bg: #1A3A20;
    --sidebar-active: #5DBF7A;

    --bg: #EDEAD8;
    --bg-2: #E4E0CC;
    --surface: #FDFCF7;
    --surface-2: #F5F2E8;
    --border: #C8C4AA;
    --border-light: #DAD7C5;

    --text: #1A1A12;
    --text-2: #5A5740;
    --text-3: #9A9880;
    --text-inv: #F0EDE0;

    --success: #26743E;
    --success-bg: #E8F5EC;
    --warning: #8A6A10;
    --warning-bg: #FBF3DC;
    --danger: #8B2020;
    --danger-bg: #FDEAEA;

    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 2px 8px rgba(10,30,15,.10), 0 0 0 1px rgba(10,30,15,.06);
  }

  body {
    font-family: 'Lato', 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* SIDEBAR */
  #sidebar {
    width: 220px;
    min-height: 100vh;
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
    border-right: 1px solid var(--sidebar-border);
  }

  .sidebar-logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--sidebar-border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 18px;
  }

  .logo-label {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    color: #E8F2EA;
    letter-spacing: 0.2px;
    line-height: 1.2;
    display: block;
  }

  .logo-sub {
    font-size: 10px;
    color: var(--sidebar-label);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-top: 2px;
    display: block;
  }

  .nav-section {
    padding: 16px 12px 8px;
  }

  .nav-label {
    font-size: 10px;
    color: var(--sidebar-label);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    padding: 0 10px;
    margin-bottom: 4px;
    display: block;
    font-weight: 700;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    color: var(--sidebar-text);
    font-size: 13.5px;
    transition: background 0.15s, color 0.15s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    font-family: 'Lato', sans-serif;
  }

  .nav-item:hover { background: rgba(255,255,255,.05); color: #C8E8CE; }
  .nav-item.active { background: var(--sidebar-active-bg); color: var(--sidebar-active); font-weight: 700; }
  .nav-item svg { flex-shrink: 0; }

  .sidebar-footer {
    margin-top: auto;
    padding: 14px 20px;
    border-top: 1px solid var(--sidebar-border);
    font-size: 10px;
    color: var(--sidebar-label);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* MAIN */
  #main {
    margin-left: 220px;
    flex: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .topbar {
    background: var(--surface);
    border-bottom: 1.5px solid var(--border);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .topbar-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
  }

  .topbar-date {
    font-size: 12px;
    color: var(--text-3);
  }

  .content {
    padding: 28px 32px;
    flex: 1;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior-y: contain;
  }

  /* CARDS */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }

  .metric-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    box-shadow: var(--shadow);
  }

  .metric-label {
    font-size: 11px;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .metric-value {
    font-family: 'Playfair Display', serif;
    font-size: 34px;
    line-height: 1;
    color: var(--text);
  }

  .metric-value.success { color: var(--success); }
  .metric-value.danger { color: var(--danger); }
  .metric-value.accent { color: var(--accent); }

  /* TABLE */
  .table-wrap {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .table-header {
    padding: 14px 18px;
    border-bottom: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    background: var(--surface-2);
  }

  .table-title {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    background: var(--surface-2);
    padding: 10px 16px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1.5px solid var(--border);
  }

  tbody tr { border-bottom: 1px solid var(--border-light); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #F8F6EF; }

  td {
    padding: 11px 16px;
    font-size: 13px;
    color: var(--text);
  }

  td.muted { color: var(--text-3); }
  td.secondary { color: var(--text-2); }

  /* Collapsible category header */
  .cat-toggle {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 11px 16px; /* +3px para área de toque maior */
    min-height: 48px;   /* mínimo recomendado para touch */
    background: #EAF2EC;
    border: none;
    border-bottom: 1.5px solid var(--border);
    cursor: pointer;
    font-family: 'Lato', sans-serif;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--accent-dark);
    text-align: left;
    transition: background .12s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .cat-toggle:hover { background: #DDF0E3; }
  .cat-toggle .cat-chevron {
    margin-left: auto;
    font-size: 10px;
    color: var(--accent);
    transition: transform .2s;
    display: inline-block;
  }
  .cat-toggle.open .cat-chevron { transform: rotate(180deg); }

  /* Janelas de contagem — cores no cabeçalho de categoria (unidades) */
  .cat-toggle.janela-aberta {
    background: rgba(56, 161, 105, 0.14);
    border-left: 3px solid var(--success, #38A169);
    color: var(--success, #276749);
  }
  .cat-toggle.janela-aberta .cat-count { color: #276749; font-weight: 700; }
  .cat-toggle.janela-fechada {
    background: rgba(214, 158, 46, 0.10);
    border-left: 3px solid #D69E2E;
  }
  .cat-toggle.janela-fechada .cat-count { color: #975A16; }

  /* Banner de atualização disponível */
  #update-banner { animation: slideUp .3s ease; }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: .5; transform: scale(.85); }
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  /* ── Tela de carregamento ─────────────────────────────────────────────────── */
  #loading-gate {
    position: fixed; inset: 0; z-index: 2000;
    background: #0C1A0F;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px;
    transition: opacity .4s ease;
  }
  #loading-gate.hiding {
    opacity: 0;
    pointer-events: none;
  }
  .loading-logo {
    width: 64px; height: 64px;
    background: var(--accent, #2a6049);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 34px;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
    animation: loadPulse 1.8s ease-in-out infinite;
  }
  @keyframes loadPulse {
    0%, 100% { transform: scale(1);    box-shadow: 0 8px 32px rgba(42,96,73,.3); }
    50%       { transform: scale(1.06); box-shadow: 0 12px 40px rgba(42,96,73,.6); }
  }
  .loading-bar-wrap {
    width: 200px; height: 3px;
    background: rgba(255,255,255,.1);
    border-radius: 99px; overflow: hidden;
  }
  .loading-bar {
    height: 100%; width: 0%;
    background: var(--accent, #2a6049);
    border-radius: 99px;
    transition: width .3s ease;
  }
  .loading-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500;
    color: rgba(255,255,255,.45);
    letter-spacing: .4px;
    min-height: 18px;
    transition: opacity .2s;
  }
  .loading-steps {
    display: flex; gap: 6px; align-items: center;
  }
  .loading-step {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(255,255,255,.15);
    transition: background .3s ease, transform .2s ease;
  }
  .loading-step.done    { background: #38A169; }
  .loading-step.active  { background: #68D391; transform: scale(1.3); }
  .loading-step.error   { background: #FC8181; }

  /* ── Painel Envios do Dia ───────────────────────────────────────────────── */
  .envios-wrap { border: 1.5px solid var(--border); border-radius: var(--radius); overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .envios-matrix { width: 100%; border-collapse: collapse; min-width: 680px; }
  .envios-matrix th, .envios-matrix td { padding: 7px 10px; text-align: center; vertical-align: middle; font-size: 12px; }
  .envios-matrix thead tr:first-child th { background: var(--surface-2); color: var(--text-3); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1.5px solid var(--border); }
  .envios-matrix thead tr:first-child th:first-child { text-align: left; }
  .envios-matrix thead tr:first-child th.unit-hdr { background: #EAF2EC; color: var(--accent-dark, #2a6049); border-left: 1.5px solid var(--border); }
  .envios-matrix thead tr:nth-child(2) th { background: var(--surface-2); color: var(--text-3); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; border-bottom: 1.5px solid var(--border); }
  .envios-matrix thead tr:nth-child(2) th.sub-first { border-left: 1.5px solid var(--border); }
  .envios-matrix tbody td { border-bottom: 1px solid var(--border); color: var(--text); }
  .envios-matrix tbody td:first-child { text-align: left; font-weight: 500; }
  .envios-matrix tbody tr:last-child td { border-bottom: none; }
  .envios-matrix tbody tr:nth-child(even) td { background: var(--surface-2); }
  .envios-matrix .u-sep { border-left: 1.5px solid var(--border); }
  .envios-matrix .val-env { font-weight: 700; color: var(--accent-dark, #2a6049); }
  .envios-matrix .val-dash { color: var(--text-3); }
  .envios-matrix .val-cpd-low { font-weight: 700; color: #C53030; }
  .envios-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; white-space: nowrap; }
  .envios-badge.ok    { background: rgba(56,161,105,.12); color: #276749; }
  .envios-badge.falta { background: rgba(197,48,48,.12);  color: #C53030; }
  .envios-summary-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 18px; }
  .envios-summary-card { flex: 1; min-width: 110px; padding: 12px 16px; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); text-align: center; }
  .envios-summary-card .e-lbl { font-size: 11px; color: var(--text-3); font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
  .envios-summary-card .e-val { font-size: 26px; font-weight: 700; margin-top: 4px; color: var(--text); }
  .envios-summary-card.ok    .e-val { color: #276749; }
  .envios-summary-card.falta .e-val { color: #C53030; }
  .envios-filter-tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .envios-filter-tab { padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border); background: var(--surface); color: var(--text-2); transition: all .15s; touch-action: manipulation; }
  .envios-filter-tab.active { background: var(--accent, #2a6049); color: #fff; border-color: var(--accent, #2a6049); }
  .envios-dia-day-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 11px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; background: #EAF2EC; color: var(--accent-dark, #2a6049); border: 1px solid var(--accent, #2a6049); }

  /* ── Validade dos itens ─────────────────────────────────────────────────── */
  .val-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 20px; height: 20px; border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--surface); cursor: pointer;
    font-size: 11px; color: var(--text-3);
    flex-shrink: 0; margin-left: 6px;
    transition: border-color .12s, color .12s, background .12s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    vertical-align: middle;
  }
  .val-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light, #e6f4ec); }
  .val-btn.has-val { border-color: #E8A020; color: #E8A020; background: rgba(232,160,32,.08); }
  .val-btn.expired { border-color: var(--danger); color: var(--danger); background: var(--danger-bg, rgba(197,48,48,.08)); }
  .val-modal-overlay {
    position: fixed; inset: 0; z-index: 3000;
    background: rgba(0,0,0,.45); display: flex;
    align-items: center; justify-content: center; padding: 16px;
  }
  .val-modal-box {
    background: var(--surface); border-radius: var(--radius);
    padding: 0; min-width: 300px; max-width: 360px; width: 100%;
    box-shadow: 0 8px 32px rgba(0,0,0,.25); overflow: hidden;
  }
  .val-modal-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
  }
  .val-modal-title { font-weight: 700; font-size: 14px; color: var(--text); }
  .val-modal-subtitle { font-size: 11px; color: var(--text-3); margin-top: 2px; }
  .val-modal-close {
    background: none; border: none; font-size: 18px; color: var(--text-3);
    cursor: pointer; padding: 0 4px; line-height: 1; flex-shrink: 0;
  }
  .val-modal-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
  .val-date-row { display: flex; align-items: center; gap: 8px; }
  .val-date-label { font-size: 12px; color: var(--text-3); min-width: 48px; font-weight: 600; }
  .val-date-input {
    flex: 1; height: 34px; padding: 0 10px;
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    font-size: 13px; color: var(--text); background: var(--surface);
    outline: none; transition: border-color .12s;
  }
  .val-date-input:focus { border-color: var(--accent); }
  .val-date-input.expired-date { border-color: var(--danger); color: var(--danger); }
  .val-date-input.near-date { border-color: #E8A020; color: #E8A020; }
  .val-modal-footer {
    padding: 12px 20px; border-top: 1px solid var(--border);
    display: flex; gap: 8px; justify-content: flex-end;
  }

  /* Botão confirmar item */
  .confirm-btn {
    display: flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; min-width: 30px;
    border-radius: 50%; border: 2px solid var(--border);
    background: transparent; cursor: pointer; font-size: 14px;
    transition: all .15s ease; color: var(--text-3);
  }
  .confirm-btn:hover { border-color: var(--accent); color: var(--accent); }
  .confirm-btn.confirmed-ok     { background: rgba(56,161,105,.18); border-color: #38A169; color: #276749; }
  .confirm-btn.confirmed-warn   { background: rgba(214,158,46,.18); border-color: #D69E2E; color: #975A16; }
  .confirm-btn.confirmed-danger { background: rgba(197,48,48,.18);  border-color: #C53030; color: #9B2C2C; }

  /* Linha confirmada: cor de fundo suave */
  tr.count-ok     { background: rgba(56,161,105,.08) !important; }
  tr.count-warn   { background: rgba(214,158,46,.10) !important; }
  tr.count-danger { background: rgba(197,48,48,.10)  !important; }
  .cat-toggle .cat-count {
    font-weight: 400;
    color: var(--accent);
    font-size: 10px;
    margin-left: 4px;
    text-transform: none;
    letter-spacing: 0;
    opacity: 0.7;
  }
  /* Receipt checklist modal */
  .checklist-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid var(--border-light);
    font-size: 13px;
  }
  .checklist-row:last-child { border-bottom: none; }
  .check-name { flex: 1; font-weight: 500; }
  .check-sent { font-size: 11px; color: var(--text-3); min-width: 90px; text-align: right; }
  .check-recv-inp {
    width: 64px; padding: 4px 8px; border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); font-size: 13px; font-weight: 600;
    text-align: center; outline: none; background: var(--surface); color: var(--text);
  }
  .check-recv-inp.ok { border-color: var(--success); color: var(--success); }
  .check-recv-inp.diff { border-color: var(--danger); color: var(--danger); }

  /* Category row stretches full width */
  .cat-row { background: none; }
  .cat-row:hover { background: none !important; }
  .cat-row > td { padding: 0 !important; border: none; }
  .cat-toggle { box-sizing: border-box; width: 100%; }
  .cat-toggle.janela-aberta  { background: rgba(34,139,34,.10); border-left: 4px solid #2a9148; color: #1e7a38; }
  .cat-toggle.janela-fechada { background: rgba(200,150,0,.08); border-left: 4px solid #C89600; color: #8a6500; }
  .cat-toggle.janela-aberta .cat-count  { color: #2a9148 !important; }
  .cat-toggle.janela-fechada .cat-count { color: #C89600 !important; }
  .confirm-btn { flex:0 0 auto; width:32px; height:32px; border-radius:50%; border:2px solid var(--border); background:transparent; font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .18s; }
  .confirm-btn:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }
  .confirm-btn.conf-ok   { border-color:#2a9148; background:rgba(34,139,34,.12); color:#2a9148; }
  .confirm-btn.conf-low  { border-color:#E8A020; background:rgba(232,160,32,.12); color:#C88000; }
  .confirm-btn.conf-zero { border-color:var(--danger); background:var(--danger-bg); color:var(--danger); }
  .confirm-btn:disabled  { opacity:0.4; cursor:default; }

  .qty-controls { display: flex; align-items: center; gap: 5px; justify-content: flex-end; }
  .qty-btn-sm {
    width: 26px; height: 26px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text-2);
    font-size: 16px; font-weight: 500;
    cursor: pointer; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    /* Sem transition no active — feedback tátil instantâneo */
    transition: border-color .12s, color .12s, background .12s;
    flex-shrink: 0;
    user-select: none;
    /* Área de toque maior que o visual (padding invisível) */
    position: relative;
  }
  .qty-btn-sm::before {
    content: '';
    position: absolute;
    inset: -8px; /* 8px extra em cada direção = 42px+ de área touch */
  }
  .qty-btn-sm:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .qty-btn-sm:active {
    transform: scale(0.88);
    background: var(--accent-light);
    border-color: var(--accent);
    color: var(--accent);
    transition: transform 0s, background 0s, border-color 0s, color 0s; /* instantâneo */
  }
  .qty-inp-sm {
    width: 52px; height: 32px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    text-align: center;
    font-size: 15px; font-weight: 600;
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    color: var(--text);
    background: var(--surface);
    outline: none;
    transition: border-color .12s;
    user-select: text;          /* seleção ok no input */
    -webkit-user-select: text;
    caret-color: var(--accent); /* cursor visível */
  }
  .qty-inp-sm:focus { border-color: var(--accent); }
  .qty-inp-sm.has-val { border-color: var(--success); color: var(--success); }
  .qty-inp-sm.has-error { border-color: var(--danger); color: var(--danger); background: var(--danger-bg); }

  /* Post-confirmation modal */
  .confirm-modal-overlay {
    position: fixed; inset: 0;
    background: rgba(10,20,12,.6);
    z-index: 600;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .confirm-modal-box {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: 0 12px 48px rgba(0,0,0,.3);
    width: 100%; max-width: 420px;
    overflow: hidden;
  }
  .confirm-modal-top {
    background: var(--accent);
    padding: 24px 24px 20px;
    text-align: center;
  }
  .confirm-modal-icon {
    font-size: 40px; line-height: 1; margin-bottom: 10px;
  }
  .confirm-modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px; font-weight: 700;
    color: #fff; margin-bottom: 4px;
  }
  .confirm-modal-sub {
    font-size: 13px; color: rgba(255,255,255,.8);
  }
  .confirm-modal-body {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border-light);
    max-height: 220px; overflow-y: auto;
  }
  .confirm-modal-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid var(--border-light);
    font-size: 13px;
  }
  .confirm-modal-row:last-child { border-bottom: none; }
  .confirm-modal-item { color: var(--text); font-weight: 500; flex: 1; }
  .confirm-modal-qty  { color: var(--accent); font-weight: 700; margin-left: 12px; white-space: nowrap; }
  .confirm-modal-actions {
    padding: 16px 20px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .confirm-modal-actions .btn {
    width: 100%; justify-content: center; padding: 11px;
    font-size: 14px;
  }

  /* Price input inline */
  .price-cell { position: relative; }

  /* -- FEATURES 1-9 ---------------------------------------- */

  /* Alert banner (stock minimum warnings) */
  .alert-banner {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 11px 14px; border-radius: var(--radius-sm);
    margin-bottom: 10px; font-size: 13px; cursor: default;
  }
  .alert-banner.warn  { background: var(--warning-bg); border: 1px solid #D4A017; color: var(--warning); }
  .alert-banner.danger{ background: var(--danger-bg);  border: 1px solid #C07070; color: var(--danger); }
  .alert-banner-icon  { font-size: 16px; flex-shrink: 0; }
  .alert-banner-body  { flex: 1; }
  .alert-banner-title { font-weight: 700; margin-bottom: 2px; }
  .alert-banner-items { font-size: 12px; opacity: .85; }

  /* Dashboard grid */
  .dash-unit-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
    margin-bottom: 16px;
  }
  .dash-unit-header {
    padding: 12px 16px; background: var(--surface-2);
    border-bottom: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700;
  }
  .dash-semaphore {
    display: flex; gap: 6px; align-items: center;
  }
  .sem-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .sem-red    { background: var(--danger); }
  .sem-yellow { background: #E8A020; }
  .sem-green  { background: var(--success); }
  .dash-items-grid {
    padding: 10px 16px 14px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px;
  }
  .dash-item-chip {
    display: flex; align-items: center; gap: 7px;
    padding: 6px 9px; border-radius: 6px;
    background: var(--surface-2); font-size: 12px;
    border: 1px solid var(--border-light);
  }
  .dash-item-chip .sem-dot { width: 8px; height: 8px; }
  .dash-item-name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dash-item-qty  { font-weight: 700; font-size: 12px; }

  /* Template button */
  .template-btn {
    background: var(--gold-light); border: 1.5px solid var(--gold);
    color: var(--gold); border-radius: var(--radius-sm);
    padding: 8px 14px; font-family: 'Lato', sans-serif;
    font-size: 13px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
  }
  .template-btn:hover { background: #EFE3C0; }

  /* Min qty field in catalog */
  .min-inp {
    width: 52px; padding: 3px 6px;
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    font-family: 'Lato', sans-serif; font-size: 12px; text-align: right;
    outline: none; background: var(--surface); color: var(--text);
  }
  .min-inp:focus { border-color: var(--gold); }

  /* Chart bars */
  .chart-bar-wrap { display: flex; align-items: flex-end; gap: 4px; height: 80px; margin-top: 8px; }
  .chart-bar-col  { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
  .chart-bar      { width: 100%; border-radius: 3px 3px 0 0; min-height: 2px; background: var(--accent); transition: height .3s; }
  .chart-label    { font-size: 10px; color: var(--text-3); white-space: nowrap; }
  .chart-value    { font-size: 11px; font-weight: 700; color: var(--text-2); }

  /* Notification dot */
  .nav-item-notif { position: relative; }
  .notif-dot {
    position: absolute; top: 6px; right: 6px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--danger); border: 1.5px solid var(--sidebar-bg);
  }

  /* Push notification toast variant */
  #push-toast {
    position: fixed; top: 80px; right: 16px; left: 16px;
    max-width: 360px; margin: 0 auto;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); box-shadow: 0 8px 32px rgba(0,0,0,.2);
    padding: 14px 16px; z-index: 800;
    display: none; flex-direction: column; gap: 6px;
    animation: slideDown .25s ease;
  }
  @keyframes slideDown { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .push-toast-title { font-weight: 700; font-size: 14px; color: var(--text); display: flex; align-items: center; gap: 7px; }
  .push-toast-body  { font-size: 13px; color: var(--text-2); }
  .push-toast-actions { display: flex; gap: 8px; margin-top: 4px; }

  /* Checklist for feature 9 */
  .checklist-row {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 0; border-bottom: 1px solid var(--border-light);
    font-size: 13px;
  }
  .checklist-row:last-child { border-bottom: none; }
  .check-name { flex: 1; }
  .check-sent { color: var(--text-3); font-size: 12px; min-width: 60px; text-align: right; }
  .check-recv-inp {
    width: 52px; padding: 3px 6px;
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    font-family: 'Lato', sans-serif; font-size: 13px; font-weight: 600;
    text-align: center; outline: none;
    -webkit-appearance: none; -moz-appearance: textfield;
  }
  .check-recv-inp:focus { border-color: var(--accent); }
  .check-recv-inp.ok   { border-color: var(--success); color: var(--success); }
  .check-recv-inp.diff { border-color: var(--danger);  color: var(--danger); }

  /* Receipt divergence */
  .divergence-banner {
    background: var(--danger-bg); border: 1.5px solid #C07070;
    border-radius: var(--radius-sm); padding: 10px 14px;
    font-size: 13px; color: var(--danger); margin-top: 10px;
    font-weight: 600;
  }
  .order-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 14px;
  }
  .order-card-header {
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; flex-wrap: wrap;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border-light);
  }
  .order-meta { flex: 1; min-width: 0; }
  .order-unit { font-size: 15px; font-weight: 700; color: var(--text); font-family: 'Playfair Display', serif; }
  .order-sub  { font-size: 11px; color: var(--text-3); margin-top: 2px; }
  .order-badge {
    padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .3px;
  }
  .order-badge.pendente  { background: #FEF3E2; color: #8A5A0A; }
  .order-badge.separando { background: #E8F5EC; color: #26743E; }
  .order-badge.enviado   { background: #EAF0FF; color: #2A4B9A; }
  .order-items-list { padding: 10px 16px; }
  .order-item-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 5px 0; border-bottom: 1px solid var(--border-light);
    font-size: 13px;
  }
  .order-item-row:last-child { border-bottom: none; }
  .order-item-name { color: var(--text); font-weight: 500; flex: 1; }
  .order-item-qty  { color: var(--accent); font-weight: 700; margin-left: 12px; white-space: nowrap; }
  .order-actions   { padding: 10px 16px; display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
  .empty-orders { padding: 40px; text-align: center; color: var(--text-3); font-size: 14px; }
  .empty-orders svg { opacity: .3; margin-bottom: 12px; }
  .price-view { cursor: pointer; display: flex; align-items: center; gap: 4px; justify-content: flex-end; }
  .price-view:hover .price-edit-icon { opacity: 1; }
  .price-edit-icon { opacity: 0; font-size: 11px; color: var(--accent); transition: opacity .15s; }
  .price-inp {
    width: 90px; padding: 3px 6px;
    border: 1.5px solid var(--accent);
    border-radius: var(--radius-sm);
    font-family: 'Lato', sans-serif;
    font-size: 12px; font-weight: 600;
    text-align: right; outline: none;
    background: var(--surface);
    color: var(--text);
  }
  .price-total { font-weight: 600; color: var(--accent-dark); }

  /* -- BATCH OPERATION UI ------------------------------ */
  .dest-box {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
  }
  .dest-box select {
    margin-top: 4px;
    background: var(--surface-2);
    font-weight: 600;
    color: var(--accent-dark);
  }

  .batch-summary {
    position: sticky;
    top: 0;
    z-index: 30;
    background: var(--surface);
    border: 1.5px solid var(--accent);
    border-radius: var(--radius);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    box-shadow: 0 2px 12px rgba(38,116,62,.18);
  }

  .batch-info {
    font-size: 14px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 1;
    min-width: 0;
  }

  .batch-count {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .batch-empty {
    color: var(--text-3);
    font-style: italic;
    font-size: 13px;
  }

  .batch-actions {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .batch-actions .btn-primary {
    padding: 9px 18px;
    font-size: 13px;
  }

  @media (max-width: 599px) {
    .batch-summary {
      padding: 10px 12px;
      gap: 8px;
    }
    .batch-info { font-size: 12px; }
    .batch-count { font-size: 18px; }
    .batch-actions .btn-primary { padding: 8px 12px; font-size: 12px; }
  }

  /* Mobile table fixes */
  @media (max-width: 599px) {
    .qty-inp-sm {
      width: 58px; min-width: 58px; max-width: 58px;
      height: 40px; font-size: 16px; font-weight: 700;
    }
    .qty-btn-sm {
      width: 40px; min-width: 40px; height: 40px;
      font-size: 22px; font-weight: 400;
      border-radius: 8px;
    }
    .qty-btn-sm::before { inset: -4px; } /* área menor no mobile pois botão já é grande */
    .qty-controls { gap: 6px; flex-wrap: nowrap; }

    /* Hide MÍN column on mobile stock-table */
    .stock-table .col-min { display: none; }
    .stock-table td.col-min { display: none; }
    .stock-table .col-unit { display: none; }
    .stock-table td.col-unit { display: none; }

    /* Catalog table mobile — keep MÍN col, hide Medida */
    .catalog-table .col-unit  { display: none; }
    .catalog-table td.col-unit { display: none; }
    .catalog-table .col-min   { display: table-cell; }
    .catalog-table td.col-min  { display: table-cell; }
    .catalog-table { table-layout: auto; width: 100%; font-size: 11px; }
    .catalog-table td, .catalog-table th { padding: 5px 3px; }
    .catalog-table .cat-inline-min { display: none; } /* hide inline min on mobile */

    /* Fix table layout on mobile */
    .stock-table { table-layout: auto; width: 100%; }
    .stock-table th:first-child,
    .stock-table td.item-name { width: auto; }
    .stock-table td.qty-controls-cell {
      width: 1px;
      white-space: nowrap;
      padding: 6px 4px 6px 0 !important;
    }

    /* Hide separate Un. column on mobile - unit shown inline with item name */
    .stock-table .col-unit { display: none; }
    .stock-table td.item-name { padding-right: 4px; }
    .stock-table td.qty-controls-cell { padding: 6px 8px 6px 0 !important; }
    .item-unit-inline {
      display: block;
      font-size: 11px;
      color: var(--text-3);
      font-weight: 400;
      margin-top: 2px;
      text-transform: lowercase;
    }
  }

  /* Show unit/min info inline below item name - always visible */
  .item-unit-inline {
    display: block;
    font-size: 11px;
    color: var(--text-3);
    font-weight: 400;
    margin-top: 2px;
  }

  /* MÍN column: hidden in stock-table (CPD panel), visible in catalog-table */
  .stock-table .col-min    { display: none; }
  .stock-table td.col-min  { display: none; }
  /* catalog-table: MÍN always visible (desktop + mobile) */
  .catalog-table .col-min    { display: table-cell; }
  .catalog-table td.col-min  { display: table-cell; }

  @media (max-width: 599px) {
    .item-unit-inline { text-transform: lowercase; }
  }

  .qty-cell { font-weight: 600; font-size: 14px; }
  .qty-cell.zero { color: var(--danger); }
  .qty-cell.low { color: var(--warning); }
  .qty-cell.ok { color: var(--success); }

  /* BADGE */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .badge.entrada { background: var(--success-bg); color: var(--success); }
  .badge.saida { background: var(--warning-bg); color: var(--warning); }

  /* FORM */
  .form-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 28px;
    max-width: 520px;
    box-shadow: var(--shadow);
  }

  .form-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1.5px solid var(--border);
    color: var(--text);
  }

  .form-group { margin-bottom: 16px; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-2);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  input[type="text"],
  input[type="number"],
  select,
  textarea {
    width: 100%;
    padding: 10px 13px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--surface);
    transition: border-color 0.15s;
    outline: none;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
  }

  .hint {
    font-size: 12px;
    color: var(--text-3);
    margin-top: 5px;

<script>
// \u2500\u2500\u2500 COLE SUAS CREDENCIAIS AQUI \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// Substitua os valores abaixo pelos que voce copiou no Firebase Console
const firebaseConfig = {

};
// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500

firebase.initializeApp(firebaseConfig);
const db   = firebase.database();
const auth = firebase.auth();

// Cache local dos dados (atualizado pelo listener em tempo real)
window._fb = {
  cache:    {},
  ready:    false,
  pendingWrites: []
};

// Login anonimo automatico
auth.signInAnonymously()
  .then(() => console.log('[Firebase] Autenticado'))
  .catch(e => console.error('[Firebase] Erro de autenticacao:', e));

// Listener em tempo real - sincroniza TODOS os dados com o app
auth.onAuthStateChanged(user => {
  if (!user) return;
  window._fb.ready = true;
  if (typeof _gateStep === 'function') _gateStep('auth', 'Autenticado — carregando dados…');
  _flushPendingWrites(); // processa qualquer write que aconteceu antes do auth
  // Migrar estrutura de dados das unidades se necessário (uma vez só)
  setTimeout(_migrarEstruturaPizzaUnits, 2000);

  // ── Monitor de conectividade ─────────────────────────────────────────────
  // Ouve o nó especial .info/connected do Firebase para detectar drops de rede
  db.ref('.info/connected').on('value', snap => {
    const isConnected = snap.val() === true;
    const badge = document.getElementById('conn-badge');
    if (!badge) return;

    const dot   = document.getElementById('conn-dot');
    const label = document.getElementById('conn-label');
    if (isConnected) {
      badge.style.display = 'flex';
      badge.style.cssText += ';background:rgba(56,161,105,.15);color:#276749;border-color:rgba(56,161,105,.3)';
      if (dot)   { dot.style.background = '#38A169'; dot.style.animation = 'pulse 1s infinite'; }
      if (label) label.textContent = 'CONECTADO';
      clearTimeout(window._connHideTimer);
      window._connHideTimer = setTimeout(() => { badge.style.display = 'none'; }, 2000);

      // Reconectou — processar writes pendentes imediatamente
      if (window._fb && (window._fb.pendingWrites || []).length > 0) {
        console.log('[Firebase] Reconectado — sincronizando', window._fb.pendingWrites.length, 'writes pendentes');
        setTimeout(_flushPendingWrites, 500); // pequeno delay para estabilizar conexão
      }
    } else {
      clearTimeout(window._connHideTimer);
      badge.style.display = 'flex';
      badge.style.cssText += ';background:rgba(197,48,48,.15);color:#C53030;border-color:rgba(197,48,48,.3)';
      if (dot)   { dot.style.background = '#C53030'; dot.style.animation = 'none'; }
      if (label) label.textContent = 'SEM CONEXÃO';
      console.warn('[Firebase] Conexão perdida — dados em modo offline');
    }
  });

  // Publicar versão do app — qualquer dispositivo com versão mais recente atualiza
  setTimeout(() => {
    if (!window._APP_VERSION) return;
    db.ref('dados/pizza_app_version').once('value').then(snap => {
      const stored = snap.val();
      if (!stored || window._APP_VERSION > stored) {
        db.ref('dados/pizza_app_version').set(window._APP_VERSION)
          .then(() => console.log('[App] Versão ' + window._APP_VERSION + ' publicada'))
          .catch(e => console.warn('[App] Erro ao publicar versão:', e));
      }
    });
  }, 4000); // aguarda listeners inicializarem

  // ═══ LISTENERS SEPARADOS POR SUBNÓ (Fase 3) ════════════════════════════════
  // Cada dispositivo ouve apenas o que precisa — sem receber o banco inteiro
  // a cada mudança de qualquer outro dispositivo.

  // Helper: throttle de render para updates externos (compartilhado por todos os listeners)
  function _scheduleRender() {
    if (!session || window._fb.localWrite) return;
    clearTimeout(window._fb.renderThrottleTimer);
    window._fb.renderThrottleTimer = setTimeout(() => {
      if (!session || window._fb.localWrite) return;
      const hasRows = document.querySelectorAll('tr[data-item-id]').length > 0;
      if (hasRows && (currentView === 'cpd' || currentView === 'units')) {
        try {
          if (currentView === 'cpd') {
            patchStockValues(cpd, false, {});
          } else {
            const ustock = unitStock[activeUnit] || {};
            patchStockValues(ustock, false, {});
            if (isCPD()) patchUnitReadValues(ustock, activeUnit);
          }
          return;
        } catch(e) { console.warn('[Render] Patch falhou:', e); }
      }
      render();
    }, 800);
  }

  // ── 1. CATÁLOGO CPD (ouvir sempre — qualquer sessão pode precisar) ─────────
  db.ref('dados/pizza_catalog').on('value', snap => {
    const fbCatalog = snap.val();
    const fbCatalogLen = Array.isArray(fbCatalog) ? fbCatalog.length : 0;

    if (typeof catalog === 'undefined') return;

    // Migração de versão
    const CATALOG_VER = 'v15'; // catálogos independentes
    const APP_VERSION = '1.4.0';
    window._APP_VERSION = APP_VERSION;

    if (fbCatalogLen === 0) {
      // Banco vazio — primeira execução
      const catToSend = SEED_CATALOG.length > 0 ? SEED_CATALOG : catalog;
      if (catToSend.length > 0) {
        db.ref('dados/pizza_catalog').set(catToSend)
          .then(() => db.ref('dados/pizza_catalog_ver').set(CATALOG_VER))
          .catch(e => console.error('[Firebase] Erro catálogo inicial:', e));
        catalog.length = 0; catToSend.forEach(i => catalog.push(i));
      }
    } else {
      catalog.length = 0; fbCatalog.forEach(i => catalog.push(i));
      saveLocal('pizza_catalog', catalog);
      console.log('[Firebase] Catálogo CPD carregado:', fbCatalog.length, 'itens');
      _gateStep('catalog', 'Catálogo carregado…');
    }
  });

  // ── 2. CATÁLOGO UNIDADES ────────────────────────────────────────────────────
  // Catálogos por unidade: cada unidade tem seu próprio nó no Firebase
  // dados/pizza_unit_catalog/asa_sul, /sig, /vicente_pires, /delivery
  // O seed de cada unidade é empurrado automaticamente na primeira abertura
  const _unitSlugMap = {
    'Asa Sul': 'asa_sul', 'SIG': 'sig',
    'Vicente Pires': 'vicente_pires', 'Delivery': 'delivery'
  };
  Object.entries(_unitSlugMap).forEach(([unitName, slug]) => {
    db.ref('dados/pizza_unit_catalog/' + slug).on('value', snap => {
      if (!window._fb.ready) return;
      const val = snap.val();
      // Se é o catálogo da unidade logada, atualizar unitCatalog global
      // Guardar catálogo recebido em cache por slug (independente de sessão)
      if (val && Array.isArray(val) && val.length > 0) {
        if (!window._unitCatalogCache) window._unitCatalogCache = {};
        window._unitCatalogCache[slug] = val;
        try { localStorage.setItem('pizza_unit_catalog_' + slug, JSON.stringify(val)); } catch(e) {}
        // Se é a unidade logada, atualizar unitCatalog imediatamente
        // Usar localStorage para verificar sessão (session pode não existir no bloco Firebase)
        const _sess = (typeof session !== 'undefined' && session) ||
          (() => { try { return JSON.parse(localStorage.getItem('pizza_session')); } catch(e) { return null; } })();
        if (_sess && unitSlug(_sess.unit) === slug) {
          if (typeof unitCatalog !== 'undefined') unitCatalog = val;
          if (typeof _scheduleRender === 'function') _scheduleRender();
        }
      } else if (!window._unitCatalogPushed) {
        // Primeira vez: publicar os seeds de cada unidade no Firebase
        if (!window._unitCatalogPushing) window._unitCatalogPushing = {};
        if (!window._unitCatalogPushing[slug]) {
          window._unitCatalogPushing[slug] = true;
          const seed = getUnitCatalog(unitName).catalog;
          db.ref('dados/pizza_unit_catalog/' + slug).set(seed)
            .then(() => console.log('[Firebase] Seed ' + unitName + ' publicado:', seed.length, 'itens'))
            .catch(e => { console.error('[Firebase] Erro seed ' + unitName, e); window._unitCatalogPushing[slug] = false; });
        }
      }
    });
  });
  window._unitCatalogPushed = true; // marcar após registrar todos os listeners

  // ── 3. VERSÃO DO APP ────────────────────────────────────────────────────────
  db.ref('dados/pizza_app_version').on('value', snap => {
    const remoteVer = snap.val();
    if (remoteVer && remoteVer !== window._APP_VERSION && !window._updateBannerShown) {
      window._updateBannerShown = true;
      if (!document.getElementById('update-banner')) {
        const banner = document.createElement('div');
        banner.id = 'update-banner';
        banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#1a3a2a;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;font-family:DM Sans,sans-serif;font-size:14px;box-shadow:0 -4px 20px rgba(0,0,0,.3)';
        banner.innerHTML = '<span>\uD83D\uDD04 Nova vers\u00E3o dispon\u00EDvel (' + remoteVer + '). Recarregue para atualizar.</span><button onclick="location.reload(true)" style="background:#38A169;border:none;color:#fff;padding:7px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;margin-left:12px">Atualizar agora</button>';
        document.body.appendChild(banner);
      }
    }
  });

  // ── 4. ESTOQUE CPD ──────────────────────────────────────────────────────────
  db.ref('dados/pizza_cpd').on('value', snap => {
    if (!window._fb.ready || typeof cpd === 'undefined') return;
    const val = snap.val();
    if (!val) return;
    Object.keys(cpd).forEach(k => delete cpd[k]);
    Object.assign(cpd, val);
    saveLocal('pizza_cpd', cpd);
    _gateStep('stock', 'Estoque sincronizado…');
    _scheduleRender();
  });

  // ── 5. MÍNIMOS / PREÇOS / MÍNIMOS-UNIDADE ──────────────────────────────────
  db.ref('dados/pizza_minimums').on('value', snap => {
    if (!window._fb.ready || typeof minimums === 'undefined') return;
    const val = snap.val(); if (!val) return;
    Object.keys(minimums).forEach(k => delete minimums[k]);
    Object.assign(minimums, val);
    saveLocal('pizza_minimums', minimums);
    _scheduleRender();
  });
  db.ref('dados/pizza_prices').on('value', snap => {
    if (!window._fb.ready || typeof prices === 'undefined') return;
    const val = snap.val(); if (!val) return;
    Object.assign(prices, val);
    saveLocal('pizza_prices', prices);
  });
  db.ref('dados/pizza_unit_minimums').on('value', snap => {
    if (!window._fb.ready) return;
    const val = snap.val(); if (!val) return;
    if (!window.unitMinimums) window.unitMinimums = {};
    Object.keys(window.unitMinimums).forEach(k => delete window.unitMinimums[k]);
    Object.assign(window.unitMinimums, val);
    saveLocal('pizza_unit_minimums', window.unitMinimums);
  });

  // ── 6. MOVIMENTAÇÕES E PEDIDOS (só CPD precisa em tempo real) ──────────────

  db.ref('dados/pizza_orders').on('value', snap => {
    if (!window._fb.ready) return;
    const val = snap.val();
    orders.length = 0;
    if (Array.isArray(val)) val.forEach(o => orders.push(o));
    saveLocal('pizza_orders', orders);
  });

  // ── 7. ENVIOS, REMESSAS, PENDÊNCIAS, CONTADOS ──────────────────────────────



  db.ref('dados/pizza_counted').on('value', snap => {
    if (!window._fb.ready) return;
    const val = snap.val(); if (!val) return;
    countedMap = val;
    saveLocal('pizza_counted', countedMap);
  });

  // ── 8. ESTOQUE DAS UNIDADES (granular por unidade) ─────────────────────────
  // CPD ouve todas as unidades; cada unidade ouve apenas a si mesma
  // Determinar unidades a ouvir com base na sessão salva no localStorage
  // (mais seguro que isCPD() pois não depende de função do bloco principal)
  const _savedSession = (() => { try { return JSON.parse(localStorage.getItem('pizza_session')); } catch(e) { return null; } })();
  const _isCpdSession = _savedSession && _savedSession.unit === 'cpd';
  const unitsToWatch = _isCpdSession
    ? UNIT_NAMES                       // CPD ouve todas as unidades
    : (_savedSession ? [_savedSession.unit] : UNIT_NAMES); // Unidade ouve só a si

  const watchedUnitNames = Array.isArray(unitsToWatch) ? unitsToWatch : UNIT_NAMES;
  watchedUnitNames.forEach(unitName => {
    const slug = unitSlug(unitName);
    db.ref('dados/pizza_units/' + slug).on('value', snap => {
      if (!window._fb.ready) return;
      const val = snap.val() || {};

      // Proteção zero-flash AMPLIADA: não aceitar snapshot vazio SE
      // (a) a migração ainda está rodando OU
      // (b) não há confirmação de migração E já tínhamos dados locais
      const localKey = 'pizza_unit_' + slug;
      const hasLocalData = (() => {
        try { const d = localStorage.getItem(localKey); return d && JSON.parse(d) && Object.keys(JSON.parse(d)).length > 0; } catch(e) { return false; }
      })();
      if (Object.keys(val).length === 0) {
        const hasMemoryData = unitStock[unitName] && Object.keys(unitStock[unitName]).length > 0;
        if (window._migrandoUnits || (!window._migrationConfirmed && (hasLocalData || hasMemoryData))) {
          console.log('[Guard] Ignorando snapshot vazio para', unitName, '— dados locais preservados');
          // Restaurar dados do localStorage
          try {
            const local = JSON.parse(localStorage.getItem(localKey) || '{}');
            if (!unitStock[unitName]) unitStock[unitName] = {};
            Object.assign(unitStock[unitName], local);
          } catch(e) {}
          return;
        }
      }

      if (!unitStock[unitName]) unitStock[unitName] = {};
      Object.keys(unitStock[unitName]).forEach(k => delete unitStock[unitName][k]);
      Object.assign(unitStock[unitName], val);
      try { localStorage.setItem('pizza_unit_' + slug, JSON.stringify(val)); } catch(e) {}

      // Liberar gate de stock ao receber a própria unidade (ou qualquer unidade para o CPD)
      _gateStep('stock', 'Estoque sincronizado…');
      _scheduleRender();
    });
  });

  console.log('[Firebase] Listeners separados registrados.');

  // Notificacoes em tempo real para a unidade logada
  if (typeof session !== 'undefined' && session) {
    const notifPath = session.unit === 'cpd'
      ? 'notificacoes/cpd'
      : 'notificacoes/unidades/' + encodeURIComponent(session.unit);

    db.ref(notifPath).on('child_added', snap => {
      const n = snap.val();
      if (!n) return;
      if (typeof showPushNotif === 'function') {
        showPushNotif(n.titulo, n.corpo, []);
      }
      snap.ref.remove(); // remove apos exibir
    });
  }
});
</script>

// Mapa unidade → catálogo e categorias
function getUnitCatalog(unitName) {
  // Priorizar cache em memória (versão editada) sobre seed hardcoded
  const slug = typeof unitSlug === 'function' ? unitSlug(unitName) : (unitName||'').toLowerCase().replace(/[^a-z0-9]+/g,'_');
  if (window._unitCatalogCache && window._unitCatalogCache[slug]) {
    // Derivar categorias do catálogo em cache (preserva ordem de edição)
    const cachedCat = window._unitCatalogCache[slug];
    const cats = [...new Set(cachedCat.map(i => i.category))];
    return { catalog: cachedCat, categories: cats };
  }
  // Fallback: seed hardcoded
  switch(unitName) {
    case 'Asa Sul':       return { catalog: ASA_SUL_CATALOG,       categories: ASA_SUL_CATEGORIES };
    case 'SIG':           return { catalog: SIG_CATALOG,           categories: SIG_CATEGORIES };
    case 'Vicente Pires': return { catalog: VICENTE_PIRES_CATALOG, categories: VICENTE_PIRES_CATEGORIES };
    case 'Delivery':      return { catalog: DELIVERY_CATALOG,      categories: DELIVERY_CATEGORIES };
    default:              return { catalog: ASA_SUL_CATALOG,       categories: ASA_SUL_CATEGORIES };
  }
}

// Encoder PDF Latin-1/WinAnsi — usado em todas as funções de geração de PDF
function pdfStr(str) {
  let out = '';
  for (const ch of String(str)) {
    const code = ch.charCodeAt(0);
    if (ch === '(') out += '\\(';
    else if (ch === ')') out += '\\)';
    else if (ch === '\\') out += '\\\\';
    else if (code < 128) out += ch;
    else if (code <= 0xFF) out += '\\' + code.toString(8).padStart(3, '0');
    else {
      const norm = ch.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      out += (norm && norm.charCodeAt(0) < 128) ? norm : '?';
    }
  }
  return '(' + out + ')';
}

// Helper: classificar item por nome (normalizado)
function classificarItem(itemName) {
  const _n = s => (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
  const nm = _n(itemName);
  for (const p of ITENS_PRODUZIDOS) { if (_n(p) === nm) return 'produzido'; }
  for (const c of ITENS_COMPRADOS)  { if (_n(c) === nm) return 'comprado'; }
  return 'outro';
}

// Retorna mapa min_per_day para uma unidade
function getMinPerDay(unitName) {
  switch(unitName) {
    case 'Asa Sul':       return MIN_PER_DAY_ASA_SUL;
    case 'SIG':           return MIN_PER_DAY_SIG;
    case 'Vicente Pires': return MIN_PER_DAY_VICENTE_PIRES;
    case 'Delivery':      return MIN_PER_DAY_DELIVERY;
    default: return {};
  }
}

// Calcula quantidade a enviar para um item específico
// = max(0, Mínimo do Dia de Entrega - Estoque Atual)
function calcAEnviar(unitName, itemName, estoqueAtual, dayCode) {
  const minMap = getMinPerDay(unitName);
  const _norm = s => (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
  const key = Object.keys(minMap).find(k => _norm(k) === _norm(itemName));
  if (!key) return 0;
  const minDia = minMap[key][dayCode] || 0;
  return Math.max(0, minDia - (estoqueAtual || 0));
}

// Detecta o próximo dia de entrega (SEG/QUA/SEX)
function nextEnviarDay() {
  const dow = new Date().getDay();
  const dmap = {1:'SEG', 3:'QUA', 5:'SEX'};
  for (let d = 0; d <= 6; d++) {
    const dd = (dow + d) % 7;
    if (dmap[dd]) return dmap[dd];
  }
  return 'SEG';
}

function load(key, fallback) {
  try {
    const v = localStorage.getItem(key);
    if (!v) return fallback;
    const parsed = JSON.parse(v);
    // Return fallback if result is an empty array but fallback is not
    if (Array.isArray(parsed) && parsed.length === 0 && Array.isArray(fallback) && fallback.length > 0) return fallback;
    return parsed;
  }
  catch(e) { return fallback; }
}
// Salva APENAS no localStorage, sem disparar sync Firebase
// Usado pelo listener do Firebase para cachear dados recebidos
// ═══ GATE DE CARREGAMENTO ═══════════════════════════════════════════════════
// Controla a tela de carregamento com lógica de gate inteligente.
// A tela só some quando: auth OK + catálogo OK + estoque OK + migração OK.
const _gate = {
  auth:    false,
  catalog: false,
  stock:   false,
  migrate: false,
  released: false,
  _progress: 0,
};

function _gateStep(step, label) {
  if (_gate[step]) return; // já marcado
  _gate[step] = true;

  const dot = document.getElementById('ls-' + step);
  if (dot) { dot.classList.remove('active'); dot.classList.add('done'); }

  // Avançar ponto ativo para o próximo
  const order = ['auth','catalog','stock','migrate'];
  const nextIdx = order.indexOf(step) + 1;
  if (nextIdx < order.length) {
    const nextDot = document.getElementById('ls-' + order[nextIdx]);
    if (nextDot) nextDot.classList.add('active');
  }

  // Atualizar barra e label
  const done = order.filter(s => _gate[s]).length;
  const pct  = Math.round((done / order.length) * 100);
  const bar  = document.getElementById('loading-bar');
  const lbl  = document.getElementById('loading-label');
  if (bar) bar.style.width = pct + '%';
  if (lbl && label) lbl.textContent = label;

  console.log('[Gate] ' + step + ' ✓ — ' + pct + '%');

  // Verificar se todos os passos concluíram
  if (order.every(s => _gate[s])) _gateRelease();
}function _gateRelease() {
  if (_gate.released) return;
  _gate.released = true;
  console.log('[Gate] Todos os passos concluídos — liberando app');
  const bar = document.getElementById('loading-bar');
  const lbl = document.getElementById('loading-label');
  if (bar) bar.style.width = '100%';
  if (lbl) lbl.textContent = 'Pronto!';

  setTimeout(() => {
    const gate = document.getElementById('loading-gate');
    if (!gate) return;
    gate.classList.add('hiding');
    setTimeout(() => { gate.style.display = 'none'; }, 420);
  }, 300); // pequena pausa para o usuário ver 100%
}

// Timeout de segurança: se algum passo travar por >15s, libera mesmo assim
setTimeout(() => {
  if (!_gate.released) {
    console.warn('[Gate] Timeout de 15s — liberando app, alguns dados podem estar incompletos');
    // Marcar todos como concluídos para liberar o gate
    ['auth','catalog','stock','migrate'].forEach(s => {
      _gate[s] = true;
      const dot = document.getElementById('ls-' + s);
      if (dot && !dot.classList.contains('done')) dot.classList.add('error');
    });
    const lbl = document.getElementById('loading-label');
    if (lbl) lbl.textContent = 'Carregado (conex\u00E3o lenta)';
    _gateRelease();
  }
}, 15000);

// Salvar catálogo de uma unidade: atualiza cache em memória + Firebase
// Garante que viewUnits e contagem refletem a mudança imediatamente
function saveUnitCatalog(unitName, catalogData) {
  const slug = unitSlug(unitName);
  // 1. Atualizar cache em memória

  // 3. Atualizar unitCatalog global se for a unidade logada (para contagem imediata)
  if (typeof session !== 'undefined' && session && unitSlug(session.unit) === slug) {

  }
  // 4. Salvar no localStorage

// Chaves que devem sincronizar com o Firebase em tempo real
const FIREBASE_SYNC_KEYS = new Set([
  'pizza_cpd', 'pizza_orders',
  'pizza_catalog', 'pizza_minimums', 'pizza_prices', 'pizza_unit_minimums',
  'pizza_confirmados',
  'pizza_counted', 'pizza_validities'
  // pizza_unit_catalog é sincronizado por slug via listeners separados (não via FIREBASE_SYNC_KEYS)
  // Nota: pizza_units NÃO está aqui — salvo por unidade via saveUnit()
]);

// Converter nome de unidade em chave Firebase-safe (sem espaços, lowercase)
// Ex: 'Asa Sul' → 'asa_sul', 'Vicente Pires' → 'vicente_pires'
function unitSlug(unitName) {
  return (unitName || 'unknown')
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')  // remove acentos
    .replace(/[^a-z0-9]+/g, '_')
    .replace(/^_|_$/g, '');
}

// Salvar um item específico do CPD atomicamente (transação — evita conflitos simultâneos)
// Usa db.ref().transaction() que é atômico no Firebase: lê o valor atual e só escreve
// se ele não mudou desde a leitura. Em caso de conflito, repete automaticamente.
function saveItemAtomic(itemId, qty) {
  if (!window._fb || !window._fb.ready || typeof db === 'undefined') {
    // Offline: salvar localmente e enfileirar
    cpd[itemId] = qty;
    try { localStorage.setItem('pizza_cpd', JSON.stringify(cpd)); } catch(e) {}
    if (!window._fb) window._fb = { ready: false, pendingWrites: [] };
    window._fb.pendingWrites = window._fb.pendingWrites || [];
    window._fb.pendingWrites.push({ type: 'atomic', itemId, qty });
    return;
  }
  // Online: transação atômica no Firebase
  window._fb.localWrite = true;
  clearTimeout(window._fb.localWriteTimer);
  window._fb.localWriteTimer = setTimeout(() => { window._fb.localWrite = false; }, 5000);

  db.ref('dados/pizza_cpd/' + itemId).transaction(currentVal => {
    // currentVal é o valor atual no Firebase — retornar o novo valor
    // Se currentVal for null (item não existe), inicializa com 0 + nova qty
    return qty;
  }, (error, committed) => {
    clearTimeout(window._fb.localWriteTimer);
    if (error) {
      console.error('[Firebase] Transação falhou para', itemId, error);
      window._fb.localWrite = false;
      // Fallback: tentar save() normal
      save('pizza_cpd', cpd);
    } else if (committed) {
      // Transação bem-sucedida — confirmar no localStorage
      try { localStorage.setItem('pizza_cpd', JSON.stringify(cpd)); } catch(e) {}
      window._fb.localWriteTimer = setTimeout(() => { window._fb.localWrite = false; }, 300);
    } else {
      // Transação abortada (currentVal igual ao esperado — sem mudança necessária)
      window._fb.localWrite = false;
    }
  }, false); // false = não ouvir mudanças intermediárias
}

// Salvar estoque de UMA unidade específica (granular — não reescreve todas)
function saveUnit(unitName, stockData) {
  const slug = unitSlug(unitName);
  try { localStorage.setItem('pizza_unit_' + slug, JSON.stringify(stockData)); } catch(e) {}
  if (window._fb && window._fb.ready && typeof db !== 'undefined') {
    window._fb.localWrite = true;
    clearTimeout(window._fb.localWriteTimer);
    window._fb.localWriteTimer = setTimeout(() => { window._fb.localWrite = false; }, 5000);
    db.ref('dados/pizza_units/' + slug).set(stockData)
      .then(() => {
        clearTimeout(window._fb.localWriteTimer);
        window._fb.localWriteTimer = setTimeout(() => { window._fb.localWrite = false; }, 300);
      })
      .catch(e => {
        console.warn('[Firebase] Erro ao salvar unidade ' + unitName + ':', e);
        clearTimeout(window._fb.localWriteTimer);
        window._fb.localWrite = false;
      });
  } else {
    if (!window._fb) window._fb = { ready: false, pendingWrites: [] };
    window._fb.pendingWrites = window._fb.pendingWrites || [];
    window._fb.pendingWrites.push({ type: 'unit', unitName, data: stockData });
  }
}

function save(key, data) {
  // Sempre salva no localStorage (cache local e fallback offline)
  try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) {}

  // Sincroniza com Firebase se for uma chave operacional
  if (FIREBASE_SYNC_KEYS.has(key)) {
    try {
      if (window._fb && window._fb.ready && typeof db !== 'undefined') {
        // Marca write local: impede que o listener re-renderize a tela
        // quando recebe de volta o próprio dado que acabou de enviar
        window._fb.localWrite = true;
        clearTimeout(window._fb.localWriteTimer);
        // 5s de janela para cobrir writes lentos em conexões móveis
        window._fb.localWriteTimer = setTimeout(() => { window._fb.localWrite = false; }, 5000);
        db.ref('dados/' + key).set(data)
          .then(() => {
            // Resetar flag imediatamente após confirmação — não esperar o timer
            clearTimeout(window._fb.localWriteTimer);
            // Pequena janela residual para o listener processar o echo
            window._fb.localWriteTimer = setTimeout(() => { window._fb.localWrite = false; }, 300);
          })
          .catch(e => {
            console.warn('[Firebase] Erro ao salvar ' + key + ':', e);
            // Em caso de erro, liberar o flag para não travar o listener indefinidamente
            clearTimeout(window._fb.localWriteTimer);
            window._fb.localWrite = false;
          });
      } else {
        // Firebase ainda não pronto — enfileira para tentar em seguida
        if (!window._fb) window._fb = { ready: false, pendingWrites: [] };
        window._fb.pendingWrites = window._fb.pendingWrites || [];
        window._fb.pendingWrites.push({ key, data, ts: Date.now() });
      }
    } catch(e) {
      console.warn('[Firebase] save() erro inesperado:', e);
    }
  }
}

// Processa writes pendentes assim que o Firebase ficar pronto
function _flushPendingWrites() {
  if (!window._fb || !window._fb.pendingWrites) return;

  // Carregar também writes que sobreviveram a um refresh (persistidos no localStorage)
  try {
    const stored = JSON.parse(localStorage.getItem('_pendingWrites') || '[]');
    if (stored.length > 0) {
      window._fb.pendingWrites = [...stored, ...window._fb.pendingWrites];
      localStorage.removeItem('_pendingWrites');
    }
  } catch(e) {}

  const pending = window._fb.pendingWrites.splice(0);
  if (pending.length === 0) return;
  console.log('[Firebase] Processando', pending.length, 'writes pendentes...');

  // Processar em sequência (FIFO garantido) com retry em caso de erro
  let idx = 0;
  function processNext() {
    if (idx >= pending.length) {
      _updatePendingBadge(0);
      return;
    }
    const item = pending[idx++];
    let promise;
    if (item.type === 'unit') {
      promise = db.ref('dados/pizza_units/' + unitSlug(item.unitName)).set(item.data);
    } else if (item.type === 'atomic') {
      promise = db.ref('dados/pizza_cpd/' + item.itemId).set(item.qty);
    } else {
      promise = db.ref('dados/' + item.key).set(item.data);
    }
    promise
      .then(() => {
        _updatePendingBadge(pending.length - idx);
        processNext();
      })
      .catch(e => {
        console.warn('[Firebase] Erro no write pendente:', e);
        // Reinserir no início da fila para retry
        window._fb.pendingWrites.unshift(item);
        _updatePendingBadge(window._fb.pendingWrites.length);
      });
  }
  _updatePendingBadge(pending.length);
  processNext();
}

// Atualizar indicador visual de dados pendentes
function _updatePendingBadge(count) {
  const badge = document.getElementById('pending-badge');
  if (!badge) return;
  if (count > 0) {
    badge.textContent = count + (count === 1 ? ' dado pendente' : ' dados pendentes');
    badge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
  }
}

// Persistir fila de writes pendentes no localStorage ao sair/refresh
window.addEventListener('beforeunload', () => {
  if (window._fb && window._fb.pendingWrites && window._fb.pendingWrites.length > 0) {
    try {
      // Não persistir dados muito grandes (limite 50 items)
      const toSave = window._fb.pendingWrites.slice(0, 50);
      localStorage.setItem('_pendingWrites', JSON.stringify(toSave));
    } catch(e) {}
  }
});

// ── MIGRAÇÃO ESTRUTURA DE UNIDADES (pizza_units flat → pizza_units/<slug>) ──
// Detecta se pizza_units ainda tem estrutura antiga (objeto com chaves = nomes de unidades)
// e migra automaticamente para a nova estrutura granular.
function _migrarEstruturaPizzaUnits() {
  if (window._migrandoUnits) return;
  // Não rodar migração offline — dados do cache podem estar incompletos
  if (!window._fb || !window._fb.ready) {
    console.log('[Migração] Adiada — Firebase não está pronto');
    setTimeout(_migrarEstruturaPizzaUnits, 3000);
    return;
  }
  window._migrandoUnits = true;
  db.ref('dados/pizza_units').once('value').then(snap => {
    const val = snap.val();
    if (!val || typeof val !== 'object') {
      window._migrandoUnits = false;
      window._migrationConfirmed = true;
      _gateStep('migrate', 'Dados prontos!');
      return;
    }
    // Verificar se é estrutura antiga: chaves são nomes de unidade (ex: 'Asa Sul')
    const keys = Object.keys(val);
    // Estrutura antiga: chaves são nomes de unidade (ex: 'Asa Sul', 'SIG')
    // Estrutura nova: chaves são slugs (ex: 'asa_sul', 'sig')
    const unitSlugs = UNIT_NAMES.map(n => unitSlug(n));
    const isOldStructure = keys.some(k => UNIT_NAMES.includes(k));
    const isNewStructure = keys.some(k => unitSlugs.includes(k));
    if (!isOldStructure || isNewStructure) {
      // Já está na estrutura nova (ou vazia) — não migrar
      window._migrandoUnits = false;
      window._migrationConfirmed = true;
      _gateStep('migrate', 'Dados prontos!');
      return;
    }
    // Verificar conexão antes de escrever (evita sobrescrever com dados offline)
    db.ref('.info/connected').once('value').then(connSnap => {
      if (!connSnap.val()) {
        console.warn('[Migração] Abortada — sem conexão. Tentará novamente em 5s');
        window._migrandoUnits = false;
        setTimeout(_migrarEstruturaPizzaUnits, 5000);
        return;
      }
      console.log('[Migração] Migrando pizza_units para estrutura granular...');
      const writes = keys
        .filter(k => UNIT_NAMES.includes(k))
        .map(unitName => db.ref('dados/pizza_units/' + unitSlug(unitName)).set(val[unitName]));
      Promise.all(writes).then(() => {
      console.log('[Migração] Estrutura de unidades migrada!', keys.length, 'unidades');
        window._migrandoUnits = false;
        window._migrationConfirmed = true;
        _gateStep('migrate', 'Dados prontos!');
      }).catch(e => {
        console.error('[Migração] Erro:', e);
        window._migrandoUnits = false;
        window._migrationConfirmed = true;
        _gateStep('migrate', 'Pronto (com aviso)');
      });
    }); // .info/connected
  });
}

// Chave única da janela de contagem atual (ex: "2026-06-15-0" = domingo 15/06)
function windowKey() {
  const now = new Date();
  // Entre 0h e 3h, pertence ao dia anterior
  if (now.getHours() < 3) now.setDate(now.getDate() - 1);
  now.setHours(12, 0, 0, 0);
  const iso = now.toISOString().slice(0, 10);
  return iso + '-' + diaOperacional();
}

  if (!countedMap[unit]) countedMap[unit] = {};

  if (val) countedMap[unit][wk][itemId] = true;
  else delete countedMap[unit][wk][itemId];
  save('pizza_counted', countedMap);
}

// Verificar se item está confirmado na janela atual
function isConfirmed(unit, itemId) {
  const wk = windowKey();
  return !!(countedMap[unit] && countedMap[unit][wk] && countedMap[unit][wk][itemId]);
}

function pruneCountedMap() {
  Object.keys(countedMap).forEach(unit => {

    if (keys.length > 4) {
      keys.slice(0, keys.length - 4).forEach(k => delete countedMap[unit][k]);
    }
  });
}   // envios em trânsito/recebidos

// Senhas por unidade (n\u00E3o exibir em logs ou console)
// ═══ JANELAS DE CONTAGEM (unidades) ═══
// Dia operacional: 15h00 do dia até 03h00 da manhã seguinte.
// 0=Domingo, 1=Segunda, 2=Terça, 3=Quarta, 4=Quinta, 5=Sexta, 6=Sábado
// 'ALL' libera todas as categorias naquele dia.
// >>> EDITE AQUI quando a lista categoria × dia for definida <<<
const CONTAGEM_JANELAS = {
  0: ['ALL'],   // Domingo: todas as categorias
  2: ['ALL'],   // Terça: todas as categorias
  3: ['Bar'],     // Quarta: bar
  4: ['ALL'],   // Quinta: todas as categorias
};
const DIAS_SEMANA = ['Domingo','Segunda','Ter\u00E7a','Quarta','Quinta','Sexta','S\u00E1bado'];

// Retorna o dia operacional atual (0-6). Entre 0h-3h, conta como o dia anterior.
function diaOperacional() {
  const now = new Date();
  let d = now.getDay();
  if (now.getHours() < 3) d = (d + 6) % 7;
  return d;
}

// Está dentro do horário de funcionamento (15h-3h)?
function dentroDoHorario() {
  return true; // Trava de horário removida
}

// A categoria pode ser contada agora? (CPD sempre pode)
function categoriaLiberada(cat) {
  if (isCPD()) return true;
  const cats = session ? getUnitCatalog(session.unit).categories : UNIT_CATEGORIES;
  return cats.includes(cat);
}

// Próxima janela em que a categoria estará liberada (para mensagens)
function proximaJanela(cat) {
  const hoje = diaOperacional();
  for (let i = 0; i <= 7; i++) {
    const d = (hoje + i) % 7;
    const allowed = CONTAGEM_JANELAS[d];
    if (allowed && (allowed.includes('ALL') || allowed.includes(cat))) {
      if (i === 0 && !dentroDoHorario()) return DIAS_SEMANA[d] + ' a partir das 15h';
      if (i === 0) return 'hoje';
      return DIAS_SEMANA[d] + ' a partir das 15h';
    }
  }
  return 'a definir';
}

    // Prioridade: 1) cache do Firebase 2) localStorage 3) seed hardcoded
    if (window._unitCatalogCache && window._unitCatalogCache[slug]) {
      unitCatalog = window._unitCatalogCache[slug];
    } else {
      try {
        const local = localStorage.getItem('pizza_unit_catalog_' + slug);
        if (local) { unitCatalog = JSON.parse(local); }
        else { unitCatalog = getUnitCatalog(session.unit).catalog; }
      } catch(e) { unitCatalog = getUnitCatalog(session.unit).catalog; }
    }
  }

  // Navigate to default view
  currentView = defaultView();
  if (session.unit !== 'cpd') activeUnit = session.unit;
  // Após resolver unitCatalog, garantir re-render se já tinha renderizado
  if (session.unit !== 'cpd') {
    // Aguardar Firebase sincronizar o catálogo da unidade antes de renderizar
    setTimeout(() => {
      const slug = unitSlug(session.unit);
      if (window._unitCatalogCache && window._unitCatalogCache[slug]) {
        unitCatalog = window._unitCatalogCache[slug];
      }
      if (typeof render === 'function') render();
    }, 1500);
  }

  resolveUnitCatalog(); // carregar catálogo correto para esta unidade
  setView(currentView);
}
