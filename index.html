function viewBatchOperation(mode) {
  const isEntrada = mode === 'entrada';
  const isUnitUser = !isCPD();
  const myUnit = isUnitUser ? session.unit : null;
  const wrap = el('div', {});

  // Consume preload (set when CPD accepts an order)
  const preload = (!isEntrada && isCPD() && saidaPreload) ? saidaPreload : null;
  if (preload) saidaPreload = null; // consume once

  const cart = {}; // {itemId: qty}
  // Pre-fill cart from order if preloaded
  if (preload) {
    preload.items.forEach(({itemId, qty}) => { cart[itemId] = qty; });
  }
  let destUnit = preload ? preload.unit : UNIT_NAMES[0];

  // Destination unit selector (CPD sa\u00EDda only)
  let destSel = null;
  const INTERNAL_USE = '__interno__';

  if (!isEntrada && isCPD()) {
    const destBox = el('div', {cls:'dest-box'});
    if (preload) {
      // Show locked unit banner when coming from order
      const banner = el('div', {style:'display:flex;align-items:center;gap:10px'});
      banner.appendChild(el('label', {style:'margin-bottom:0'}, 'Pedido de'));
      banner.appendChild(el('div', {style:'font-size:16px;font-weight:700;color:var(--accent);font-family:"Playfair Display",serif'}, preload.unit));
      const changeLink = el('span', {style:'font-size:12px;color:var(--text-3);cursor:pointer;text-decoration:underline;margin-left:auto', onclick:()=>{
        destBox.innerHTML='';
        destBox.appendChild(el('label', {style:'margin-bottom:8px'}, 'Destino'));
        const sel2 = el('select', {});
        const optInt = el('option', {value:INTERNAL_USE}, '\uD83C\uDF55 Cozinha CPD');
        sel2.appendChild(optInt);
        UNIT_NAMES.forEach(u => { const opt=el('option',{value:u},u); if(u===destUnit) opt.selected=true; sel2.appendChild(opt); });
        sel2.addEventListener('change', () => { destUnit=sel2.value; renderRows(searchInp.value); });
        destBox.appendChild(sel2);
      }}, 'Alterar');
      banner.appendChild(changeLink);
      destBox.appendChild(banner);
    } else {
      destBox.appendChild(el('label', {style:'margin-bottom:8px'}, 'Destino'));
      destSel = el('select', {});

      // First option: internal CPD use
      const optInternal = el('option', {value: INTERNAL_USE}, '\uD83C\uDF55 Cozinha CPD');
      destSel.appendChild(optInternal);

      // Then the three units
      UNIT_NAMES.forEach(u => destSel.appendChild(el('option', {value:u}, u)));

      // Default: first unit (not internal)
      destSel.value = UNIT_NAMES[0];
      destUnit = UNIT_NAMES[0];

      destSel.addEventListener('change', () => {
        destUnit = destSel.value;
        renderRows(searchInp.value);
      });
      destBox.appendChild(destSel);
    }
    wrap.appendChild(destBox);
  }

  // For unit users doing entrada, show which unit is receiving
  if (isEntrada && isUnitUser) {
    const destBox = el('div', {cls:'dest-box'});
    destBox.appendChild(el('label', {style:'margin-bottom:4px'}, 'Registrando entrada para'));
    const unitLabel = el('div', {style:'font-size:16px;font-weight:700;color:var(--accent);font-family:"Playfair Display",serif'}, myUnit);
    destBox.appendChild(unitLabel);
    wrap.appendChild(destBox);
  }

  // Preload notice banner
  if (preload) {
    const notice = el('div', {style:'background:var(--accent-light);border:1.5px solid var(--accent);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:4px;font-size:13px;color:var(--accent-dark)'});
    notice.innerHTML = `<strong>\uD83D\uDCCB ${preload.items.length} ${preload.items.length===1?'item carregado':'itens carregados'} do pedido de ${preload.unit}.</strong> Ajuste as quantidades ou adicione mais itens antes de confirmar.`;
    wrap.appendChild(notice);
  }

  // Summary/actionbar
  const summaryCard = el('div', {cls:'batch-summary'});
  wrap.appendChild(summaryCard);

  function getCartEntries() {
    return Object.entries(cart).filter(([_, q]) => q > 0);
  }

  function updateSummary() {
    summaryCard.innerHTML = '';
    const entries = getCartEntries();
    const count = entries.length;

    const info = el('div', {cls:'batch-info'});
    if (count === 0) {
      info.appendChild(el('span', {cls:'batch-empty'}, isEntrada ? 'Adicione itens para registrar entrada' : 'Adicione itens para registrar sa\u00EDda'));
    } else {
      const num = el('strong', {cls:'batch-count'}, String(count));
      info.appendChild(num);
      info.appendChild(document.createTextNode(' ' + (count === 1 ? 'item no lote' : 'itens no lote')));
    }
    summaryCard.appendChild(info);

    const actions = el('div', {cls:'batch-actions'});
    if (count > 0) {
      const clearBtn = el('button', {cls:'btn btn-outline btn-sm', onclick: clearCart}, 'Limpar');
      actions.appendChild(clearBtn);
    }
    const confirmBtn = el('button', {cls:'btn btn-primary'},
      isEntrada ? `Confirmar Entrada${count > 0 ? ' (' + count + ')' : ''}` : `Confirmar Sa\u00EDda${count > 0 ? ' (' + count + ')' : ''}`
    );
    if (count === 0) {
      confirmBtn.disabled = true;
      confirmBtn.style.opacity = '0.45';
      confirmBtn.style.cursor = 'not-allowed';
    }
    confirmBtn.addEventListener('click', confirmBatch);
    actions.appendChild(confirmBtn);
    summaryCard.appendChild(actions);
  }

  function clearCart() {
    Object.keys(cart).forEach(k => delete cart[k]);
    renderRows(searchInp.value);
    updateSummary();
  }

  function confirmBatch() {
    const entries = getCartEntries();
    if (entries.length === 0) return;

    // For sa\u00EDda: validate availability
    if (!isEntrada) {
      const insufficient = [];
      entries.forEach(([itemId, qty]) => {
        const avail = cpd[itemId] || 0;
        if (qty > avail) {
          const item = activeCatalog().find(i => i.id === itemId);
          insufficient.push(`\u00B7 ${item?.name || itemId}: pedido ${qty}, dispon\u00EDvel ${avail}`);
        }
      });
      if (insufficient.length > 0) {
        alert('Estoque insuficiente para os itens:\n\n' + insufficient.join('\n'));
        return;
      }
    }

    // Apply all changes
    const batchId = 'batch_' + Date.now();
    const effectiveDest = isUnitUser ? myUnit : destUnit;
    const isInternal = effectiveDest === INTERNAL_USE;

    entries.forEach(([itemId, qty]) => {
      if (isEntrada) {
        if (isCPD()) {
          cpd[itemId] = (cpd[itemId] || 0) + qty;
          movements.unshift({id: Date.now() + Math.random(), batchId, type:'entrada', itemId, qty, note:'Lote', unitName:'CPD', date: new Date().toISOString()});
        } else {
          if (!unitStock[myUnit]) unitStock[myUnit] = {};
          unitStock[myUnit][itemId] = (unitStock[myUnit][itemId] || 0) + qty;
          movements.unshift({id: Date.now() + Math.random(), batchId, type:'entrada', itemId, qty, note:'Lote', unitName: myUnit, date: new Date().toISOString()});
        }
      } else {
        // Sa\u00EDda CPD: sempre desconta do estoque CPD
        cpd[itemId] = (cpd[itemId] || 0) - qty;
        if (isInternal) {
          // Cozinha CPD: s\u00F3 desconta do CPD, n\u00E3o vai para nenhuma unidade
          movements.unshift({id: Date.now() + Math.random(), batchId, type:'saida', itemId, qty, unitName: 'Cozinha CPD', note:'Cozinha CPD', date: new Date().toISOString()});
        } else {
          // Envio p/ unidade: fica EM TR\u00C2NSITO — s\u00F3 entra no estoque da
          // unidade quando o gerente confirmar o recebimento
          movements.unshift({id: Date.now() + Math.random(), batchId, type:'saida', itemId, qty, unitName: effectiveDest, note:'Em tr\u00E2nsito', date: new Date().toISOString()});
        }
      }
    });

    // Criar shipment em tr\u00E2nsito para envios a unidades
    if (!isEntrada && !isInternal) {
      shipments.unshift({
        id: 'ship_' + Date.now(),
        batchId,
        unit: effectiveDest,
        items: entries.map(([itemId, qty]) => ({itemId, qty})),
        status: 'em_transito',
        sentBy: session.name,
        date: new Date().toISOString()
      });
      save('pizza_shipments', shipments);
      // Limpar pend\u00EAncias da unidade que foram incorporadas neste envio
      if (pendencias[effectiveDest]) {
        delete pendencias[effectiveDest];
        save('pizza_pendencias', pendencias);
      }
    }

    save('pizza_cpd', cpd);
    // Salvar estoque de cada unidade afetada individualmente
    Object.keys(unitStock).forEach(u => saveUnit(u, unitStock[u]));
    save('pizza_movements', movements);

    const savedBatch = movements.filter(m => m.batchId === batchId);
    const batchQty = savedBatch.reduce((s, m) => s + m.qty, 0);
    const dest = isInternal ? 'Cozinha CPD' : destUnit;
    if (isEntrada) {
      logAction('entrada',
        `${session.name} registrou entrada de ${savedBatch.length} item${savedBatch.length!==1?'s':''} (${batchQty} unidades) no ${isCPD()?'CPD':unitKey()}`,
        {items: savedBatch.length, qty: batchQty}
      );
    } else {
      logAction('saida',
        `${session.name} registrou sa\u00EDda de ${savedBatch.length} item${savedBatch.length!==1?'s':''} (${batchQty} unidades) do CPD para ${dest}`,
        {items: savedBatch.length, qty: batchQty, dest}
      );
    }
    clearCart();
    showConfirmModal(savedBatch, isEntrada, isInternal ? 'Cozinha CPD' : destUnit);
  }

  updateSummary();

  // Searchbar
  const searchWrap = el('div', {cls:'search-wrap', style:'margin: 16px 0 12px'});
  searchWrap.appendChild(el('span', {cls:'search-icon', html:'<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>'}));
  const searchInp = el('input', {type:'text', placeholder:'Buscar item...'});
  searchWrap.appendChild(searchInp);
  wrap.appendChild(searchWrap);

  // Itemlisttable
  const tableWrap = el('div', {cls:'table-wrap'});
  const table = el('table', {cls:'stock-table'});
  const thead = el('thead', {});
  const stockColLabel = isEntrada
    ? (isCPD() ? 'Estoque CPD' : `Estoque ${myUnit}`)
    : 'Dispon\u00EDvel CPD';
  thead.innerHTML = `<tr><th>Item</th><th class="col-unit" style="width:22%;text-align:right">${stockColLabel}</th><th style="width:42%;text-align:right">Quantidade</th></tr>`;
  table.appendChild(thead);
  const tbody = el('tbody', {});
  table.appendChild(tbody);
  tableWrap.appendChild(table);
  wrap.appendChild(tableWrap);

  // openCats persiste entre renders usando um mapa global keyed por tableId
  // Assim categorias abertas não fecham quando o Firebase atualiza dados
  // _tableId = searchInp.id para garantir consistência com o setAttribute acima
  const _tableId = searchInp.id;
  if (!window._openCatsMap) window._openCatsMap = {};
  if (!window._openCatsMap[_tableId]) {
    window._openCatsMap[_tableId] = {};
  }
  const openCats = window._openCatsMap[_tableId];

  // Cache de linhas DOM por categoria — evita recriar elementos já montados
  if (!window._rowCache) window._rowCache = {};
  if (!window._rowCache[_tableId]) window._rowCache[_tableId] = {};
  const rowCache = window._rowCache[_tableId];
  CATEGORIES.forEach(c => {
    if (preload) {
      const hasItem = preload.items.some(({itemId}) => {
        const item = activeCatalog().find(i => i.id === itemId);
        return item?.category === c;
      });
      openCats[c] = hasItem;
    } else {
      openCats[c] = false;
    }
  });

  function renderRows(q) {
    tbody.innerHTML = '';
    const filtered = catalog.filter(i => i.name.toLowerCase().includes(q.toLowerCase()));
    if (!filtered.length) {
      tbody.appendChild(el('tr', {}, el('td', {colspan:'3', cls:'empty'}, 'Nenhum item encontrado')));
      return;
    }
    // Derivar categorias do próprio catSource (suporta CPD e Unidades com listas diferentes)
    const allCatsInSource = [...new Set(catSource.map(i => i.category))];
    const catOrder = (catSource === catalog ? CATEGORIES : UNIT_CATEGORIES)
      .filter(c => allCatsInSource.includes(c));
    // Categorias sem ordem definida ficam no fim
    const extraCats = allCatsInSource.filter(c => !catOrder.includes(c));
    const usedCats = [...catOrder, ...extraCats].filter(cat => filtered.some(i => i.category === cat));
    usedCats.forEach(cat => {
      const catItems = filtered.filter(i => i.category === cat);
      const itemsInCart = catItems.filter(i => (cart[i.id] || 0) > 0).length;
      const isOpen = openCats[cat] === true; // fechado por padrão

      const catTr = el('tr', {cls:'cat-row'});
      const catTd = document.createElement('td');
      catTd.setAttribute('colspan', '3');
      catTd.style.padding = '0';
      const togBtn = el('button', {cls:'cat-toggle' + (isOpen ? ' open' : '')});
      togBtn.appendChild(document.createTextNode(cat));
      let countText = `${catItems.length} itens`;
      if (itemsInCart > 0) countText = `${itemsInCart}/${catItems.length} no lote`;
      togBtn.appendChild(el('span', {cls:'cat-count'}, countText));
      togBtn.appendChild(el('span', {cls:'cat-chevron'}, '\u25BC'));
      togBtn.addEventListener('click', () => {
        openCats[cat] = !openCats[cat];
        togBtn.classList.toggle('open', openCats[cat]);
        tbody.querySelectorAll(`[data-cat="${CSS.escape(cat)}"]`).forEach(r => {
          r.style.display = openCats[cat] ? '' : 'none';
        });
      });
      catTd.appendChild(togBtn);
      catTr.appendChild(catTd);
      tbody.appendChild(catTr);

      catItems.forEach(item => {
        const stock = isEntrada
          ? (isCPD() ? (cpd[item.id] || 0) : (unitStock[myUnit]?.[item.id] || 0))
          : (cpd[item.id] || 0);
        const cartQty = cart[item.id] || 0;

        const tr = el('tr', {});
        tr.setAttribute('data-cat', cat);
        tr.setAttribute('data-item-id', item.id);   // patch cirúrgico
        tr.setAttribute('data-item-name', item.name); // busca sem recriar DOM
        if (!isOpen) tr.style.display = 'none';

        // Name + inline stock info (mobile)
        const nameTd = el('td', {cls:'item-name'});
        nameTd.textContent = item.name;
        nameTd.style.fontWeight = cartQty > 0 ? '600' : '400';
        const inline = el('span', {cls:'item-unit-inline'});
        const inlineLabel = isEntrada ? 'estoque' : 'disp';
        const isOver = !isEntrada && cartQty > stock;
        inline.textContent = `${item.unit} \u00B7 ${inlineLabel}: ${stock}`;
        if (isOver) { inline.style.color = 'var(--danger)'; inline.style.fontWeight = '600'; }
        nameTd.appendChild(inline);
        tr.appendChild(nameTd);

        // Stock column (desktop only)
        const stockTd = el('td', {cls:'col-unit', style:'text-align:right'});
        const stockSpan = el('span', {}, `${stock} ${item.unit}`);
        if (isOver) { stockSpan.style.color = 'var(--danger)'; stockSpan.style.fontWeight = '600'; }
        else { stockSpan.style.color = 'var(--text-2)'; }
        stockTd.appendChild(stockSpan);
        tr.appendChild(stockTd);

        // Quantity controls
        const ctrlTd = el('td', {cls:'qty-controls-cell', style:'text-align:right; padding: 6px 16px;'});
        const wrap2 = el('div', {cls:'qty-controls'});
        const minBtn = el('button', {cls:'qty-btn-sm'}, '-');
        const inp = el('input', {
          type: 'text',
          inputmode: 'decimal',
          pattern: '[0-9]*',
          cls: 'qty-inp-sm' + (cartQty > 0 ? ' has-val' : '') + (isOver ? ' has-error' : ''),
          value: cartQty > 0 ? String(cartQty) : '',
          placeholder: '0'
        });
        const plusBtn = el('button', {cls:'qty-btn-sm'}, '+');

        function setQty(newQty) {
          const q = Math.max(0, isNaN(newQty) ? 0 : newQty);
          if (q === 0) {
            delete cart[item.id];
            inp.value = '';
            nameTd.style.fontWeight = '400';
          } else {
            cart[item.id] = q;
            inp.value = String(q);
            nameTd.style.fontWeight = '600';
          }
          const overNow = !isEntrada && q > stock;
          inp.className = 'qty-inp-sm' + (q > 0 ? ' has-val' : '') + (overNow ? ' has-error' : '');
          if (overNow) {
            inline.style.color = 'var(--danger)';
            inline.style.fontWeight = '600';
            stockSpan.style.color = 'var(--danger)';
            stockSpan.style.fontWeight = '600';
          } else {
            inline.style.color = '';
            inline.style.fontWeight = '';
            stockSpan.style.color = 'var(--text-2)';
            stockSpan.style.fontWeight = '';
          }
          updateSummary();
        }

        minBtn.addEventListener('click', () => {
          const cur = parseFloat(inp.value.replace(',', '.')) || 0;
          setQty(cur - 1);
        });
        plusBtn.addEventListener('click', () => {
          const cur = parseFloat(inp.value.replace(',', '.')) || 0;
          setQty(cur + 1);
        });
        inp.addEventListener('change', () => setQty(parseFloat(inp.value.replace(',', '.'))));
        inp.addEventListener('blur',   () => setQty(parseFloat(inp.value.replace(',', '.'))));

        wrap2.appendChild(minBtn);
        wrap2.appendChild(inp);
        wrap2.appendChild(plusBtn);
        ctrlTd.appendChild(wrap2);
        tr.appendChild(ctrlTd);

        tbody.appendChild(tr);
      });
      rowCache[cat] = true; // marcar como montado no primeiro render
    });
  }

  renderRows('');
  searchInp.addEventListener('input', e => renderRows(e.target.value));

  return wrap;
}

    const item = {id: Date.now().toString(), name, category: catSel.value, unit: unitSel.value};
    targetCat2.push(item);
    save(targetKey2, targetCat2);
    document.getElementById('cat-name').value = '';

        const alertCount = catItems.filter(i => (stockObj[i.id]||0) === 0 && (activeMins[i.id]||0) > 0).length;
        togBtn.innerHTML = `<span class="cat-name">${cat}</span><span class="cat-count">${catItems.length} itens${alertCount > 0 ? ` \u00B7 \u26A0 ${alertCount}` : ''}</span><span class="cat-chevron">\u25B2</span>`;
        togBtn.addEventListener('click', () => {
          openCats[cat] = !openCats[cat];
          togBtn.classList.toggle('open', openCats[cat]);
          rows.forEach(r => { r.style.display = openCats[cat] ? '' : 'none'; });
        });
        catTd.appendChild(togBtn); catTr.appendChild(catTd); tbody.appendChild(catTr);

        const rows = [];
        catItems.forEach(item => {
          const qty   = stockObj[item.id] || 0;
          const min   = activeMins[item.id] || 0;
          const isZero = qty === 0 && min > 0;
          const isLow  = min > 0 && qty < min && !isZero;

          const tr = el('tr', {style: isZero ? 'background:var(--danger-bg)' : isLow ? 'background:var(--warning-bg)' : ''});
          if (!isOpen) tr.style.display = 'none';

          // Name cell
          const nameTd = el('td', {cls:'item-name'});
          const nameLabel = el('span', {}, item.name);
          const nameInp   = el('input', {type:'text', value:item.name, style:'display:none;width:100%;padding:3px 6px;border:1.5px solid var(--accent);border-radius:4px;font-size:13px;outline:none'});
          const catInline = el('span', {cls:'item-unit-inline', style: (isZero||isLow)?`color:${isZero?'var(--danger)':'#E8A020'};font-weight:600`:''}, item.unit);
          const saveNameFn = () => {
            const v = nameInp.value.trim() || item.name;
            item.name = v; nameLabel.textContent = v;
            save(isCpdTab ? 'pizza_catalog' : 'pizza_unit_catalog', tabCatalog);
            nameInp.style.display='none'; nameLabel.style.display='';
          };
          nameLabel.addEventListener('click', () => { nameLabel.style.display='none'; nameInp.style.display=''; nameInp.focus(); nameInp.select(); });
          nameInp.addEventListener('blur', saveNameFn);
          nameInp.addEventListener('keydown', e => { if(e.key==='Enter') saveNameFn(); if(e.key==='Escape'){nameInp.style.display='none';nameLabel.style.display='';} });
          nameTd.appendChild(nameLabel); nameTd.appendChild(nameInp); nameTd.appendChild(catInline);
          tr.appendChild(nameTd);

          // Medida cell (editable)
          const unitTd = el('td', {cls:'muted col-unit', style:'cursor:pointer;white-space:nowrap'});
          const unitSpan = el('span', {style:'font-size:12px;color:var(--text-2);border-bottom:1px dashed var(--border)'}, item.unit);
          const unitInp  = el('input', {type:'text', value:item.unit, style:'display:none;width:70px;padding:2px 5px;border:1.5px solid var(--accent);border-radius:4px;font-size:12px;outline:none'});
          unitSpan.addEventListener('click', () => { unitSpan.style.display='none'; unitInp.style.display=''; unitInp.focus(); unitInp.select(); });
          const saveUnitFn = () => {
            const v = unitInp.value.trim() || item.unit;
            item.unit = v; unitSpan.textContent = v; catInline.textContent = v;
            save(isCpdTab ? 'pizza_catalog' : 'pizza_unit_catalog', tabCatalog);
            unitInp.style.display='none'; unitSpan.style.display='';
          };
          unitInp.addEventListener('blur', saveUnitFn);
          unitInp.addEventListener('keydown', e => { if(e.key==='Enter') saveUnitFn(); if(e.key==='Escape'){unitInp.style.display='none';unitSpan.style.display='';} });
          unitTd.appendChild(unitSpan); unitTd.appendChild(unitInp);
          tr.appendChild(unitTd);

          // Qty cell (read-only in catalog)
          tr.appendChild(el('td', {cls: qty===0&&min>0?'danger':qty>0&&isLow?'warn':'', style:'text-align:right;font-weight:700'}, String(qty)));

          // Min cell — editable, per-tab (CPD = global minimums, unit = unit minimums)
          const minTd = el('td', {cls:'col-min', style:'text-align:right;cursor:pointer;padding-right:8px'});
          const minSpan = el('span', {style:'font-size:12px;color:var(--text-3);border-bottom:1px dashed var(--border)'}, min > 0 ? String(min) : '\u2014');
          const minInp  = el('input', {type:'number', inputmode:'decimal', value: min > 0 ? String(min) : '0',
            style:'display:none;width:54px;padding:3px 6px;border:1.5px solid #B8922A;border-radius:4px;font-size:12px;text-align:right;outline:none'});
          minSpan.addEventListener('click', () => { minSpan.style.display='none'; minInp.style.display=''; minInp.focus(); minInp.select(); });
          const saveMinFn = () => {
            const v = Math.max(0, parseFloat(minInp.value)||0);
            if (isCpdTab) {
              minimums[item.id] = v;
              save('pizza_minimums', minimums);
            } else {
              if (!window.unitMinimums[activeTab]) window.unitMinimums[activeTab] = {};
              window.unitMinimums[activeTab][item.id] = v;
              save('pizza_unit_minimums', window.unitMinimums);
            }
            minSpan.textContent = v > 0 ? String(v) : '\u2014';
            catInline.style.color = '';
            catInline.style.fontWeight = '';
            minInp.style.display='none'; minSpan.style.display='';
          };
          minInp.addEventListener('blur', saveMinFn);
          minInp.addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault();saveMinFn();} if(e.key==='Escape'){minInp.style.display='none';minSpan.style.display='';} });
          minTd.appendChild(minSpan); minTd.appendChild(minInp);
          tr.appendChild(minTd);

          // Price cell (CPD only)
          if (showPrices) {
            const price = prices[item.id] || 0;
            const priceTd = el('td', {style:'text-align:right;cursor:pointer'});
            const priceSpan = el('span', {style:'font-size:12px;color:var(--text-2);border-bottom:1px dashed var(--border)'},
              price > 0 ? price.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}) : '\u2014');
            const priceInp = el('input', {type:'number', inputmode:'decimal', value: price > 0 ? String(price) : '',
              style:'display:none;width:80px;padding:2px 5px;border:1.5px solid var(--accent);border-radius:4px;font-size:12px;text-align:right;outline:none'});
            priceSpan.addEventListener('click', () => { priceSpan.style.display='none'; priceInp.style.display=''; priceInp.focus(); priceInp.select(); });
            const savePriceFn = () => {
              const v = parseFloat(priceInp.value)||0;
              prices[item.id] = v; save('pizza_prices', prices);
              priceSpan.textContent = v > 0 ? v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}) : '\u2014';
              priceInp.style.display='none'; priceSpan.style.display='';
            };
            priceInp.addEventListener('blur', savePriceFn);
            priceInp.addEventListener('keydown', e => { if(e.key==='Enter') savePriceFn(); if(e.key==='Escape'){priceInp.style.display='none';priceSpan.style.display='';} });
            priceTd.appendChild(priceSpan); priceTd.appendChild(priceInp);
            tr.appendChild(priceTd);
            const totalVal2 = qty * (prices[item.id]||0);
            tr.appendChild(el('td', {style:'text-align:right;font-size:12px;color:var(--text-2)'},
              totalVal2 > 0 ? totalVal2.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}) : '\u2014'));
          }

          // Actions
          const actionsTd = el('td', {style:'text-align:right;white-space:nowrap'});
          const removeBtn = el('button', {cls:'btn btn-outline btn-sm', style:'color:var(--danger);border-color:var(--danger);font-size:11px', onclick:()=>{
            if (!confirm(`Remover "${item.name}" do cat\u00E1logo?`)) return;
            const idx = tabCatalog.indexOf(item);
            if (idx >= 0) tabCatalog.splice(idx, 1);
            save(isCpdTab ? 'pizza_catalog' : 'pizza_unit_catalog', tabCatalog);
            tr.remove();
            toast('Item removido');
          }}, 'Remover');
          actionsTd.appendChild(removeBtn);
          tr.appendChild(actionsTd);

          rows.push(tr);
          tbody.appendChild(tr);
        });
      });
    };

    searchInp.addEventListener('input', () => renderRows(searchInp.value));
    renderRows('');
    table.appendChild(tbody);
    tableBlock.appendChild(table);
    tableContainer.appendChild(tableBlock);
  }

  buildTable();
  return frag;
}

// RENDER
// ═══ PATCH CIRÚRGICO DE VALORES ══════════════════════════════════════════════
// Atualiza apenas os números no DOM já existente quando o Firebase sincroniza.
// Preserva: foco do teclado, categorias abertas, estado de digitação.
// Usado pelo listener Firebase em vez de render() completo.
function patchStockValues(stockObj, useMin, unitMins) {
  useMin  = useMin  || false;
  unitMins = unitMins || {};

  // Elemento com foco atual — não tocar nele
  const focused = document.activeElement;
  const focusedItemId = focused ? focused.getAttribute('data-qty-input') : null;

  // Percorrer todos os <tr> marcados com data-item-id
  const rows = document.querySelectorAll('tr[data-item-id]');
  rows.forEach(tr => {
    const itemId = tr.getAttribute('data-item-id');
    if (!itemId) return;

    const newQty = stockObj[itemId] || 0;
    const inp = tr.querySelector('[data-qty-input]');

    // Atualizar input apenas se: não está com foco E valor mudou
    if (inp && inp.getAttribute('data-qty-input') !== focusedItemId) {
      const curVal = parseFloat(inp.value.replace(',','.')) || 0;
      if (curVal !== newQty) {
        inp.value = String(newQty);
        // Atualizar classe visual do input
        const uMin = useMin ? (unitMins[itemId] || 0) : 0;
        if (newQty === 0 && uMin > 0) inp.className = 'qty-inp-sm has-error';
        else if (newQty > 0)         inp.className = 'qty-inp-sm has-val';
        else                          inp.className = 'qty-inp-sm';
      }
    }

    // Atualizar classe da linha (cor de fundo) sem recriar
    const uMin = useMin ? (unitMins[itemId] || 0) : 0;
    const newQtyN = stockObj[itemId] || 0;
    const isZero = newQtyN === 0;
    const isLow  = uMin > 0 && newQtyN < uMin && !isZero;

    // Só mudar se a classe realmente mudou (evita reflow desnecessário)
    const wantClass = isZero ? 'count-danger' : isLow ? 'count-warn' : '';
    const curClass  = tr.className || '';
    if (wantClass && !curClass.includes(wantClass)) {
      tr.className = wantClass;
      tr.style.background = '';
    } else if (!wantClass && (curClass.includes('count-'))) {
      tr.className = '';
      if (!useMin) tr.style.background = '';
    }
  });
}

// Versão especializada para o painel de unidades (read-only, coluna A Enviar)
function patchUnitReadValues(unitStockObj, unitName) {
  const focused = document.activeElement;
  const rows = document.querySelectorAll('tr[data-item-id]');
  const uMins = (window.unitMinimums && window.unitMinimums[unitName]) || {};

  rows.forEach(tr => {
    const itemId = tr.getAttribute('data-item-id');
    if (!itemId) return;
    const qty = unitStockObj[itemId] || 0;

    // Célula de quantidade (read-only: td com font-weight:700, não input)
    const qtyTd = tr.querySelector('td[data-qty-cell]');
    if (qtyTd) qtyTd.textContent = String(qty);

    // Célula A Enviar
    const envTd = tr.querySelector('td[data-aenviar-cell]');
    if (envTd) {
      const uMin = uMins[itemId] || 0;
      const aEnviar = Math.max(0, uMin - qty);
      envTd.textContent = aEnviar > 0 ? String(aEnviar) : '\u2014';
      envTd.style.color = aEnviar > 0 ? 'var(--accent-dark,#2a6049)' : 'var(--text-3)';
    }
  });
}

function render() {
  const contentEl = document.getElementById('content');

  // Guardar posição de scroll antes de recriar (melhora UX no fallback)
  const prevScrollY = window.scrollY || document.documentElement.scrollTop;

  contentEl.innerHTML = '';
  // Limpar cache de linhas DOM — foram destruídas pelo innerHTML=''
  // _openCatsMap é preservado (mantém categorias abertas/fechadas)
  window._rowCache = {};
  let node;
  if (currentView === 'cpd')         node = viewCpd();
  else if (currentView === 'units')      node = viewUnits();
  else if (currentView === 'envios')     node = viewEnvios();
  else if (currentView === 'saida')      node = viewSaida();
  else if (currentView === 'entrada')    node = viewEntrada();
  else if (currentView === 'catalogo')   node = viewCatalogo();
  else if (currentView === 'dashboard')  node = viewDashboard();
  if (node) contentEl.appendChild(node);

  // Restaurar scroll após render (evita que a tela "pule" para o topo)
  if (prevScrollY > 0) {
    requestAnimationFrame(() => window.scrollTo(0, prevScrollY));
  }

  // Notificações de recebimento pendentes
  setTimeout(checkPendingReceiptNotifications, 500);
}

// FERRAMENTA DE MIGRA\u00C7\u00C3O \u2014 use no console do browser (F12)
// para enviar dados do localStorage para o Firebase
// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
window.migrarParaFirebase = function() {
  const chaves = [
    'pizza_cpd', 'pizza_units', 'pizza_minimums',
    'pizza_orders', 'pizza_movements', 'pizza_catalog',
    'pizza_prices', 'pizza_templates'
  ];
  let migrados = 0;
  chaves.forEach(chave => {
    const dados = localStorage.getItem(chave);
    if (dados) {
      try {
        const parsed = JSON.parse(dados);
        db.ref('dados/' + chave).set(parsed)
          .then(() => {
            migrados++;
            console.log('[Migracao] OK:', chave);
            if (migrados === chaves.filter(c => localStorage.getItem(c)).length) {
              console.log('[Migracao] COMPLETA! Todos os dados foram enviados ao Firebase.');
              alert('Migracao concluida! ' + migrados + ' chaves enviadas ao Firebase.');
            }
          })
          .catch(e => console.error('[Migracao] ERRO:', chave, e));
      } catch(e) {
        console.error('[Migracao] Erro ao parsear:', chave);
      }
    }
  });
  console.log('[Migracao] Iniciada para', chaves.filter(c => localStorage.getItem(c)).length, 'chaves...');
};

window.verificarFirebase = function() {
  db.ref('dados').once('value').then(snap => {
    const data = snap.val();
    if (!data) { console.log('[Firebase] Banco vazio'); return; }
    Object.keys(data).forEach(k => {
      const val = data[k];
      const size = JSON.stringify(val).length;
      console.log('[Firebase]', k, '-', Array.isArray(val) ? val.length + ' itens' : size + ' bytes');
    });
  });
};

console.log('  verificarFirebase()  - lista o que esta no banco');
</script>
